<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TABI — 일본 여행</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f8f8f6;--w:#fff;--s1:#f2f1ef;--s2:#e8e7e4;
  --b1:#e4e3e0;--b2:#d0cfc9;
  --t1:#1a1a18;--t2:#6b6a66;--t3:#a8a7a2;
  --ac:#00c896;--ac2:#00b085;--acbg:#e6faf5;
  --red:#ff4757;--gold:#f0a500;
  --kl:#f4452a;--mr:#ff6b35;
  --nav:58px;--safe:env(safe-area-inset-bottom);
  --f:"Noto Sans KR",sans-serif;--fd:"Playfair Display",serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;-webkit-font-smoothing:antialiased;}
body{font-family:var(--f);background:var(--bg);color:var(--t1);}
.app{max-width:480px;margin:0 auto;height:100%;background:var(--w);}
.page{display:none;flex-direction:column;height:100vh;overflow:hidden;}
.page.active{display:flex;}
button{font-family:var(--f);}
::-webkit-scrollbar{display:none;}
img{display:block;}

/* HEADER */
.hd{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--b1);}
.hd-row{display:flex;align-items:center;gap:10px;padding:12px 16px 10px;}
.logo-wrap{flex:1;}
.logo{font-family:var(--fd);font-size:24px;font-weight:900;color:var(--t1);}
.logo span{color:var(--ac);}
.logo-sub{font-size:10px;color:var(--t3);letter-spacing:.5px;margin-top:1px;}
.hd-srch{width:36px;height:36px;border-radius:50%;background:var(--s1);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2);}
.hd-live{display:flex;align-items:center;gap:4px;background:var(--acbg);border-radius:20px;padding:4px 10px;font-size:10px;font-weight:700;color:var(--ac2);}
.hd-dot{width:5px;height:5px;border-radius:50%;background:var(--ac);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.srch-bar{background:var(--w);border-bottom:1px solid var(--b1);padding:8px 16px 10px;display:flex;gap:8px;}
.srch-bar.hidden{display:none;}
.sfield{flex:1;display:flex;align-items:center;gap:8px;background:var(--s1);border:1.5px solid var(--b1);border-radius:24px;padding:0 14px;}
.sfield:focus-within{border-color:var(--ac);background:var(--w);}
.sfield svg{color:var(--t3);flex-shrink:0;}
.sfield input{background:none;border:none;outline:none;color:var(--t1);font-size:14px;font-family:var(--f);width:100%;padding:9px 0;}
.sfield input::placeholder{color:var(--t3);}
.s-go{background:var(--ac);border:none;color:#fff;border-radius:24px;padding:0 18px;height:40px;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;}
.s-cancel{background:none;border:none;color:var(--t2);font-size:13px;font-weight:700;cursor:pointer;padding:0 4px;}

/* TABS */
.city-row{display:flex;overflow-x:auto;background:var(--w);border-bottom:1px solid var(--b1);padding:0 12px;}
.city-btn{flex-shrink:0;background:none;border:none;color:var(--t3);font-size:13px;font-weight:700;padding:10px 8px 8px;cursor:pointer;position:relative;white-space:nowrap;}
.city-btn.on{color:var(--ac);}
.city-btn.on::after{content:"";position:absolute;bottom:0;left:4px;right:4px;height:2.5px;background:var(--ac);border-radius:2px;}
.cat-row{display:flex;gap:7px;overflow-x:auto;padding:10px 16px 8px;background:var(--w);border-bottom:1px solid var(--b1);}
.cat-btn{flex-shrink:0;background:var(--s1);border:1.5px solid var(--b1);border-radius:20px;padding:6px 13px;font-size:12px;font-weight:700;color:var(--t2);cursor:pointer;white-space:nowrap;}
.cat-btn.on{background:var(--t1);border-color:var(--t1);color:#fff;}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* BOOKING STRIP */
.bk-strip{background:var(--w);border-bottom:1px solid var(--b1);}
.bk-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;}
.bk-lbl{font-size:13px;font-weight:800;color:var(--t1);}
.bk-badge{font-size:10px;font-weight:700;color:var(--ac);background:var(--acbg);border-radius:4px;padding:2px 7px;}
.bk-list{display:flex;gap:10px;padding:0 16px 14px;overflow-x:auto;}
.bk-card{flex-shrink:0;width:148px;background:var(--s1);border-radius:14px;overflow:hidden;cursor:pointer;border:1.5px solid var(--b1);}
.bk-img{height:74px;background:linear-gradient(135deg,#e8f5e9,#e3f2fd);display:flex;align-items:center;justify-content:center;position:relative;}
.bk-plat{position:absolute;top:5px;right:5px;font-size:9px;font-weight:800;color:#fff;padding:2px 5px;border-radius:3px;}
.bk-plat.kl{background:var(--kl);}.bk-plat.mr{background:var(--mr);}
.bk-body{padding:8px 10px 10px;}
.bk-nm{font-size:11px;font-weight:700;color:var(--t1);line-height:1.35;margin-bottom:3px;}
.bk-price{font-size:12px;font-weight:900;color:var(--ac);}
.bk-comm{font-size:9px;font-weight:700;color:var(--gold);}

/* SEC HEAD */
.sec-hd{display:flex;align-items:center;justify-content:space-between;padding:18px 16px 12px;}
.sec-title{font-size:18px;font-weight:900;color:var(--t1);}
.sec-cnt{font-size:12px;color:var(--t3);}

/* PLACE CARD */
.pc{background:var(--w);border-bottom:1px solid var(--b1);cursor:pointer;animation:fadeUp .3s cubic-bezier(.16,1,.3,1) both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.pc:active{background:var(--s1);}
.pc-img{width:100%;height:200px;background:var(--s2);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:56px;}
.pc-img img{width:100%;height:100%;object-fit:cover;}
.pc-grad{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(0,0,0,.35));}
.pc-rank{position:absolute;top:12px;left:12px;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);color:#fff;font-size:11px;font-weight:800;padding:4px 9px;border-radius:6px;}
.pc-badge{position:absolute;bottom:12px;left:12px;background:rgba(255,255,255,.92);color:var(--t1);font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;}
.pc-heart{position:absolute;top:10px;right:10px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.9);border:none;cursor:pointer;font-size:16px;color:var(--t3);box-shadow:0 2px 8px rgba(0,0,0,.12);}
.pc-heart.on{color:var(--red);}
.pc-info{padding:13px 16px 8px;}
.pc-name{font-size:17px;font-weight:800;margin-bottom:4px;letter-spacing:-.3px;line-height:1.25;}
.pc-addr{font-size:12px;color:var(--t3);margin-bottom:9px;}
.pc-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.stars{display:flex;gap:1px;}
.star{font-size:11px;color:var(--b2);}.star.on{color:var(--gold);}
.pc-num{font-size:13px;font-weight:800;}
.pc-cnt{font-size:11px;color:var(--t3);}
.pc-sep{width:1px;height:11px;background:var(--b2);}
.pc-open{font-size:11px;font-weight:700;color:var(--ac);}
.pc-closed{font-size:11px;font-weight:700;color:var(--red);}
.pc-cta{display:flex;border-top:1.5px solid var(--b1);margin-top:10px;}
.pc-cta a{flex:1;display:flex;align-items:center;justify-content:center;padding:11px 6px;text-decoration:none;font-size:12px;font-weight:800;font-family:var(--f);color:var(--t2);}
.pc-cta a+a{border-left:1.5px solid var(--b1);}
.pc-cta a.kl{color:var(--kl);}
.pc-cta a.mr{color:var(--mr);}

/* LOADING/EMPTY */
.loading{padding:80px 20px;text-align:center;}
.spinner{width:32px;height:32px;border:3px solid var(--b2);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-size:13px;color:var(--t3);}
.empty{padding:80px 20px;text-align:center;}
.etxt{font-size:13px;color:var(--t3);line-height:1.7;}

/* BOTTOM NAV */
.bot-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:300;background:rgba(255,255,255,.97);backdrop-filter:blur(20px);border-top:1px solid var(--b1);display:flex;height:calc(var(--nav) + var(--safe));padding-bottom:var(--safe);}
.nav-it{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;font-size:10px;font-weight:700;color:var(--t3);padding-top:6px;}
.nav-it.on{color:var(--ac);}
.nav-ic{font-size:22px;line-height:1;position:relative;}
.nav-badge{position:absolute;top:-4px;right:-6px;background:var(--red);color:#fff;font-size:9px;font-weight:800;border-radius:10px;padding:1px 5px;min-width:16px;text-align:center;display:none;line-height:1.4;}
.nav-badge.show{display:block;}

/* AI PAGE */
.ai-pg{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;}
.ai-hero{padding:28px 20px 24px;background:linear-gradient(160deg,#0a1628,#1a2d1a 50%,#0a2018);position:relative;overflow:hidden;}
.ai-hero::before{content:"";position:absolute;right:-30px;top:-30px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(0,200,150,.15),transparent 70%);}
.ai-sub{font-size:11px;font-weight:700;color:var(--ac);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;}
.ai-title{font-family:var(--fd);font-size:28px;font-weight:900;color:#fff;line-height:1.2;margin-bottom:6px;}
.ai-title em{color:var(--ac);font-style:italic;}
.ai-desc{font-size:13px;color:rgba(255,255,255,.6);line-height:1.65;}
.ai-form{margin:16px;background:var(--w);border-radius:16px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.07);border:1px solid var(--b1);}
.ai-sec{padding:16px 16px 0;}
.ai-lbl{font-size:10px;font-weight:800;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:7px;display:block;}
.ai-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.ai-sel{width:100%;background:var(--s1);border:1.5px solid var(--b1);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--t1);font-family:var(--f);font-weight:600;outline:none;appearance:none;}
.ai-sel:focus{border-color:var(--ac);}
.ai-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.ai-chip{background:var(--s1);border:1.5px solid var(--b1);border-radius:20px;padding:6px 12px;font-size:12px;font-weight:700;color:var(--t2);cursor:pointer;font-family:var(--f);}
.ai-chip.on{background:var(--t1);border-color:var(--t1);color:#fff;}
.ai-gen{width:100%;background:var(--ac);color:#fff;border:none;padding:16px;font-size:15px;font-weight:900;cursor:pointer;font-family:var(--f);}
.ai-gen:hover{background:var(--ac2);}
.ai-gen:disabled{opacity:.5;cursor:not-allowed;}

/* AI RESULT */
.tri-wrap{margin:16px;}
.tri-card{background:var(--w);border-radius:16px;overflow:hidden;border:1px solid var(--b1);box-shadow:0 2px 16px rgba(0,0,0,.07);}
.tri-top{padding:20px 18px 16px;background:linear-gradient(135deg,#0a1628,#1a2d1a);text-align:center;}
.tri-em{font-size:36px;margin-bottom:8px;}
.tri-title{font-family:var(--fd);font-size:20px;color:#fff;font-weight:700;margin-bottom:4px;}
.tri-title em{color:var(--ac);font-style:italic;}
.tri-sub{font-size:12px;color:rgba(255,255,255,.5);}
.tri-map{height:220px;position:relative;overflow:hidden;background:#e8eaf0;}
.tri-map iframe{width:100%;height:100%;border:none;display:block;}
.tri-pins{position:absolute;inset:0;pointer-events:none;}
.tri-pin{position:absolute;transform:translate(-50%,-50%);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.25);border:2px solid rgba(255,255,255,.8);pointer-events:all;cursor:pointer;}
.tri-pin:hover{transform:translate(-50%,-50%) scale(1.2);}
.tri-daytabs{display:flex;gap:6px;padding:12px 14px;border-bottom:1px solid var(--b1);overflow-x:auto;}
.tri-daytab{flex-shrink:0;padding:7px 18px;border-radius:20px;font-size:12px;font-weight:800;cursor:pointer;border:1.5px solid var(--b2);background:var(--w);color:var(--t3);font-family:var(--f);}
.tri-daytab.on{background:var(--t1);border-color:var(--t1);color:#fff;}
.tri-places{padding:4px 0;}
.tri-day-hd{display:flex;align-items:center;gap:8px;padding:12px 16px 8px;}
.tri-day-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;}
.tri-day-lbl{font-size:14px;font-weight:800;}
.tri-row{display:flex;gap:12px;padding:10px 16px 10px 46px;position:relative;}
.tri-row:hover{background:var(--s1);}
.tri-row::before{content:"";position:absolute;left:26px;top:0;bottom:0;width:1.5px;background:var(--b2);}
.tri-row:last-child::before{height:50%;}
.tri-ic{width:50px;height:50px;border-radius:12px;flex-shrink:0;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:22px;border:1px solid var(--b1);}
.tri-body{flex:1;min-width:0;}
.tri-pname{font-size:14px;font-weight:800;margin-bottom:2px;}
.tri-ptp{font-size:11px;color:var(--t3);margin-bottom:4px;}
.tri-tip{font-size:11px;color:var(--ac2);font-weight:700;line-height:1.5;}
.tri-tip::before{content:"Tip. ";}
.tri-time{font-size:10px;color:var(--t3);margin-top:3px;}
.tri-footer{border-top:1px solid var(--b1);}
.tri-tips{padding:14px 16px;background:var(--acbg);}
.tri-tips-ttl{font-size:11px;font-weight:900;color:var(--ac2);margin-bottom:6px;}
.tri-tips-item{font-size:12px;color:var(--t2);line-height:1.65;margin-bottom:2px;}
.tri-budget{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--b1);}
.tri-bud-l{font-size:11px;color:var(--t3);}
.tri-bud-r{font-size:14px;font-weight:900;}
.tri-acts{display:flex;gap:8px;padding:12px 16px 14px;border-top:1px solid var(--b1);}
.tri-act{flex:1;padding:12px;border-radius:10px;border:none;font-size:13px;font-weight:800;cursor:pointer;font-family:var(--f);}
.tri-act.p{background:var(--ac);color:#fff;}
.tri-act.s{background:var(--s1);color:var(--t1);border:1.5px solid var(--b2);}
.tri-loading{padding:40px 20px;text-align:center;}
.tri-dots{display:flex;justify-content:center;gap:7px;margin-bottom:14px;}
.tri-dots span{width:9px;height:9px;border-radius:50%;background:var(--ac);animation:bounce .8s ease-in-out infinite;}
.tri-dots span:nth-child(2){animation-delay:.14s;}
.tri-dots span:nth-child(3){animation-delay:.28s;background:var(--b2);}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}
.tri-ltxt{font-size:13px;color:var(--t3);font-weight:600;}

/* SAVED */
.saved-hd{padding:24px 20px 16px;border-bottom:1px solid var(--b1);}
.saved-hd-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.saved-title{font-family:var(--fd);font-size:24px;font-weight:900;}
.saved-clear{background:none;border:none;font-size:12px;font-weight:700;color:var(--t3);cursor:pointer;font-family:var(--f);}
.saved-city{font-size:10px;font-weight:800;letter-spacing:.8px;color:var(--t3);text-transform:uppercase;padding:16px 16px 8px;display:block;background:var(--bg);}
.saved-empty{padding:80px 20px;text-align:center;}
.saved-empty-ic{font-size:52px;margin-bottom:14px;opacity:.4;}
.saved-empty-tx{font-size:14px;color:var(--t3);line-height:1.7;}

/* DETAIL */
.detail{position:fixed;inset:0;z-index:400;background:var(--w);overflow-y:auto;transform:translateX(100%);transition:transform .32s cubic-bezier(.16,1,.3,1);}
.detail.open{transform:translateX(0);}
.d-nav{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--b1);padding:12px 16px;display:flex;align-items:center;gap:12px;}
.d-back{background:var(--s1);border:none;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--t2);}
.d-ttl{font-size:15px;font-weight:800;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.d-hero{width:100%;height:260px;background:var(--s2);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:80px;}
.d-hero img{width:100%;height:100%;object-fit:cover;}
.d-fade{position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(transparent,var(--w));}
.d-body{padding:0 0 120px;}
.d-title-sec{padding:16px 16px 14px;border-bottom:1px solid var(--b1);}
.d-name{font-family:var(--fd);font-size:24px;font-weight:900;letter-spacing:-.4px;margin-bottom:4px;line-height:1.2;}
.d-type{font-size:12px;color:var(--t3);}
.d-rat-sec{padding:16px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:16px;}
.d-big{font-family:var(--fd);font-size:48px;font-weight:900;line-height:1;}
.d-stars{display:flex;gap:2px;margin-bottom:3px;}
.d-star{font-size:16px;color:var(--gold);}.d-star.off{color:var(--b2);}
.d-rcnt{font-size:12px;color:var(--t3);}
.d-info-sec{padding:14px 16px;border-bottom:1px solid var(--b1);background:var(--bg);}
.d-info-lbl{font-size:10px;font-weight:800;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;}
.d-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.d-cell{background:var(--w);border-radius:12px;padding:11px 12px;border:1px solid var(--b1);}
.d-cell-lbl{font-size:9px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;font-weight:800;}
.d-cell-val{font-size:13px;font-weight:700;line-height:1.4;}
.d-bk-sec{background:var(--w);border-bottom:1px solid var(--b1);}
.d-bk-hd{padding:12px 16px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;}
.d-bk-title{font-size:11px;font-weight:800;color:var(--t2);letter-spacing:.5px;text-transform:uppercase;}
.d-bk-sub{font-size:10px;font-weight:800;color:var(--ac);}
.d-bk-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;border:none;background:none;width:100%;font-family:var(--f);}
.d-bk-row:hover{background:var(--s1);}
.d-bk-row+.d-bk-row{border-top:1px solid var(--b1);}
.dbr-l{display:flex;align-items:center;gap:10px;}
.dbr-logo{width:48px;height:19px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:#fff;}
.dbr-logo.kl{background:var(--kl);}.dbr-logo.mr{background:var(--mr);}
.dbr-nm{font-size:12px;font-weight:800;text-align:left;}
.dbr-dc{font-size:10px;color:var(--t3);margin-top:1px;text-align:left;}
.dbr-price{font-size:13px;font-weight:900;color:var(--ac);}
.dbr-comm{font-size:9px;font-weight:800;color:var(--gold);margin-top:1px;}
.d-actions{padding:14px 16px;display:flex;flex-direction:column;gap:9px;}
.d-btn{width:100%;padding:14px;border-radius:12px;border:none;font-size:14px;font-weight:800;cursor:pointer;font-family:var(--f);display:flex;align-items:center;justify-content:center;gap:7px;}
.d-btn.p{background:var(--ac);color:#fff;}
.d-btn.s{background:var(--s1);color:var(--t1);border:1.5px solid var(--b2);}
.d-btn.h{background:var(--s1);color:var(--t3);border:1.5px solid var(--b1);}
.d-btn.h.on{color:var(--red);border-color:rgba(255,71,87,.3);background:rgba(255,71,87,.06);}
</style>
</head>
<body>
<div class="app">

<!-- EXPLORE -->
<div class="page active" id="pg-explore">

/* ── State ────────────────────────────────── */
var city   = CITIES[0].kr;
var cityEn = CITIES[0].en;
var cat    = CATS[0].key;
var saved  = JSON.parse(localStorage.getItem('tabi_saved')||'[]');
var places = [];
var srchOn = false;

/* ── DOM helpers ──────────────────────────── */
function el(tag, cls, txt){
  var e = document.createElement(tag);
  if(cls) e.className = cls;
  if(txt !== undefined) e.textContent = txt;
  return e;
}
function $id(id){ return document.getElementById(id); }

/* ── Init ─────────────────────────────────── */
function init(){
  /* city buttons */
  var cr = $id('cityRow');
  CITIES.forEach(function(c, i){
    var b = el('button','city-btn'+(i===0?' on':''), c.kr);
    b.addEventListener('click', function(){
      document.querySelectorAll('.city-btn').forEach(function(x){ x.classList.remove('on'); });
      b.classList.add('on');
      city = c.kr; cityEn = c.en;
      load();
    });
    cr.appendChild(b);
  });

  /* category buttons */
  var catRow = $id('catRow');
  CATS.forEach(function(c, i){
    var b = el('button','cat-btn'+(i===0?' on':''), c.label);
    b.addEventListener('click', function(){
      document.querySelectorAll('.cat-btn').forEach(function(x){ x.classList.remove('on'); });
      b.classList.add('on');
      cat = c.key;
      load();
    });
    catRow.appendChild(b);
  });

  /* AI city select */
  var sel = $id('ai-city');
  CITIES.forEach(function(c){
    var o = document.createElement('option');
    o.value = c.kr; o.textContent = c.kr;
    sel.appendChild(o);
  });

  /* chips */
  $id('chipsWrap').querySelectorAll('.ai-chip').forEach(function(ch){
    ch.addEventListener('click', function(){ ch.classList.toggle('on'); });
  });

  /* nav */
  ['explore','ai','saved'].forEach(function(p){
    $id('nav-'+p).addEventListener('click', function(){ switchPage(p); });
  });

  /* search */
  $id('btnSrch').addEventListener('click', function(){
    srchOn = !srchOn;
    $id('srchBar').classList.toggle('hidden', !srchOn);
    if(srchOn) setTimeout(function(){ $id('srchInput').focus(); }, 50);
  });
  $id('btnSrchGo').addEventListener('click', doSearch);
  $id('btnSrchCancel').addEventListener('click', function(){
    srchOn = false; $id('srchBar').classList.add('hidden');
  });
  $id('srchInput').addEventListener('keydown', function(e){
    if(e.key==='Enter') doSearch();
  });

  /* saved clear */
  $id('btnClearAll').addEventListener('click', clearAll);

  /* detail back */
  $id('btnDetailBack').addEventListener('click', closeDetail);

  /* AI gen */
  $id('btnGen').addEventListener('click', genItinerary);
}

function switchPage(p){
  document.querySelectorAll('.page').forEach(function(x){ x.classList.remove('active'); });
  document.querySelectorAll('.nav-it').forEach(function(x){ x.classList.remove('on'); });
  $id('pg-'+p).classList.add('active');
  $id('nav-'+p).classList.add('on');
  if(p==='saved') renderSaved();
}

function doSearch(){
  var q = $id('srchInput').value.trim();
  if(!q) return;
  fetchPlaces(q+' Japan', null);
  srchOn = false; $id('srchBar').classList.add('hidden');
}

/* ── Fetch ─────────────────────────────────── */
function load(){ fetchPlaces(cityEn+' '+catMap[cat], cat); }

async function fetchPlaces(query, type){
  showLoading();
  try {
    var p = new URLSearchParams({query:query, language:'ko'});
    if(type) p.append('type', type);
    var res  = await fetch(PROXY+'/api/places?'+p);
    var data = await res.json();
    if(!data.results||!data.results.length){ showEmpty(); return; }
    places = data.results.map(function(r){
      return {
        name:  r.name,
        addr:  r.formatted_address,
        rating:r.rating,
        cnt:   r.user_ratings_total,
        open:  r.opening_hours && r.opening_hours.open_now,
        types: (r.types||[]).slice(0,3),
        ref:   r.photos && r.photos[0] && r.photos[0].photo_reference,
        pid:   r.place_id,
        url:   'https://maps.google.com/?cid='+r.place_id
      };
    });
    renderList(places);
  } catch(e) {
    console.error(e); showError();
  }
}

function pUrl(ref, size){
  if(!ref) return '';
  return PROXY+'/api/photo?photo_reference='+ref+'&maxwidth='+(size||400);
}

function showLoading(){
  var mc = $id('mainContent');
  mc.innerHTML = '';
  var d = el('div','loading');
  d.appendChild(el('div','spinner'));
  d.appendChild(el('div','ltxt', city+' 정보를 불러오는 중...'));
  mc.appendChild(d);
}
function showEmpty(){
  var mc = $id('mainContent');
  mc.innerHTML = '';
  var d = el('div','empty');
  var ic = el('div',''); ic.style.fontSize='48px'; ic.style.marginBottom='12px'; ic.textContent='🔍';
  d.appendChild(ic);
  d.appendChild(el('div','etxt','검색 결과가 없습니다.'));
  mc.appendChild(d);
}
function showError(){
  var mc = $id('mainContent');
  mc.innerHTML = '';
  var d = el('div','empty');
  var ic = el('div',''); ic.style.fontSize='48px'; ic.style.marginBottom='12px'; ic.textContent='⚠️';
  d.appendChild(ic);
  d.appendChild(el('div','etxt','데이터를 불러오지 못했어요.
잠시 후 다시 시도해 주세요.'));
  mc.appendChild(d);
}

/* ── Stars ─────────────────────────────────── */
function mkStars(r, cls){
  var wrap = el('div', 'stars');
  for(var i=0;i<5;i++){
    var s = el('span', 'star'+(r>=i+1?' on':''), '★');
    wrap.appendChild(s);
  }
  return wrap;
}

/* ── Booking strip ─────────────────────────── */
function buildBkStrip(data){
  if(!data||!data.length) return null;
  var strip = el('div','bk-strip');
  var hd = el('div','bk-hd');
  hd.appendChild(el('span','bk-lbl','예약 추천'));
  hd.appendChild(el('span','bk-badge','제휴 할인'));
  strip.appendChild(hd);
  var list = el('div','bk-list');
  data.forEach(function(b){
    var card = el('div','bk-card');
    var img  = el('div','bk-img');
    var plat = el('span','bk-plat '+b.cls, b.logo);
    img.appendChild(plat);
    var body = el('div','bk-body');
    body.appendChild(el('div','bk-nm', b.nm));
    body.appendChild(el('div','bk-price', b.pr));
    body.appendChild(el('div','bk-comm', b.cm));
    card.appendChild(img); card.appendChild(body);
    card.addEventListener('click', function(){ window.open(b.url,'_blank'); });
    list.appendChild(card);
  });
  strip.appendChild(list);
  return strip;
}

/* ── CTA row ───────────────────────────────── */
function buildCTA(p){
  var cta  = el('div','pc-cta');
  var bk   = BKP[p.name];
  if(bk && bk.length){
    bk.slice(0,2).forEach(function(b){
      var a = document.createElement('a');
      a.className = b.cls;
      a.href = b.url; a.target = '_blank';
      a.textContent = '🔖 '+b.logo+' 예약';
      a.addEventListener('click', function(e){ e.stopPropagation(); });
      cta.appendChild(a);
    });
  } else {
    var gurl = p.url || 'https://maps.google.com/?q='+encodeURIComponent(p.name);
    var nurl = 'https://map.naver.com/v5/search/'+encodeURIComponent(p.name+' '+city);
    var ag = document.createElement('a');
    ag.className='gm'; ag.href=gurl; ag.target='_blank'; ag.textContent='🗺 Google 지도';
    ag.addEventListener('click', function(e){ e.stopPropagation(); });
    var an = document.createElement('a');
    an.className='gm'; an.href=nurl; an.target='_blank'; an.textContent='🟢 네이버';
    an.addEventListener('click', function(e){ e.stopPropagation(); });
    cta.appendChild(ag); cta.appendChild(an);
  }
  return cta;
}

/* ── Render list ───────────────────────────── */
function renderList(ps){
  if(!ps.length){ showEmpty(); return; }
  var mc = $id('mainContent');
  mc.innerHTML = '';

  /* booking strip */
  var strip = buildBkStrip(CBK[city]);
  if(strip) mc.appendChild(strip);

  /* section head */
  var sh = el('div','sec-hd');
  sh.appendChild(el('span','sec-title', city+' '+catMap[cat]));
  sh.appendChild(el('span','sec-cnt', ps.length+'곳'));
  mc.appendChild(sh);

  /* cards */
  var list = el('div','');
  ps.forEach(function(p, i){
    var card = makeCard(p, i);
    card.style.animationDelay = (i%8*0.05)+'s';
    list.appendChild(card);
  });
  mc.appendChild(list);
}

function makeCard(p, i){
  var isSaved = saved.some(function(s){ return s.name===p.name; });
  var card = el('div','pc');

  /* image area */
  var imgWrap = el('div','pc-img');
  var pu = pUrl(p.ref, i===0?600:400);
  if(pu){
    var img = document.createElement('img');
    img.src = pu; img.alt = p.name; img.loading = 'lazy';
    img.addEventListener('error', function(){ img.style.display='none'; });
    imgWrap.appendChild(img);
  }
  imgWrap.appendChild(el('div','pc-grad'));
  imgWrap.appendChild(el('div','pc-rank','#'+(i+1)));
  var badge = el('div','pc-badge');
  badge.textContent = (p.types||[catMap[cat]])[0] || catMap[cat];
  imgWrap.appendChild(badge);

  var heart = el('button','pc-heart'+(isSaved?' on':''), isSaved?'♥':'♡');
  heart.addEventListener('click', function(e){
    e.stopPropagation();
    toggleSC(p.name, heart, i);
  });
  imgWrap.appendChild(heart);
  card.appendChild(imgWrap);

  /* info area */
  var info = el('div','pc-info');
  info.appendChild(el('div','pc-name', p.name));
  info.appendChild(el('div','pc-addr', p.addr||''));
  var meta = el('div','pc-meta');
  if(p.rating){
    meta.appendChild(mkStars(p.rating));
    meta.appendChild(el('span','pc-num', ''+p.rating));
    if(p.cnt) meta.appendChild(el('span','pc-cnt', '('+p.cnt.toLocaleString()+'건)'));
    var sep = el('span','pc-sep'); meta.appendChild(sep);
  }
  if(p.open===true)  meta.appendChild(el('span','pc-open','● 영업중'));
  if(p.open===false) meta.appendChild(el('span','pc-closed','● 영업종료'));
  info.appendChild(meta);
  card.appendChild(info);
  card.appendChild(buildCTA(p));

  card.addEventListener('click', function(){ openDetail(i); });
  return card;
}

/* ── Save ──────────────────────────────────── */
function toggleSC(name, btn, idx){
  var place = places[idx]||{name:name};
  var i = saved.findIndex(function(s){ return s.name===name; });
  if(i===-1){ saved.push({name:name,city:city,cat:cat,data:place}); btn.textContent='♥'; btn.classList.add('on'); }
  else       { saved.splice(i,1); btn.textContent='♡'; btn.classList.remove('on'); }
  localStorage.setItem('tabi_saved', JSON.stringify(saved));
  updateBadge();
}
function toggleSD(name){
  var i   = saved.findIndex(function(s){ return s.name===name; });
  var btn = $id('dHeartBtn');
  if(i===-1){
    var pl = places.find(function(p){ return p.name===name; })||{name:name};
    saved.push({name:name,city:city,cat:cat,data:pl});
    if(btn){ btn.textContent='♥ 저장됨'; btn.classList.add('on'); }
  } else {
    saved.splice(i,1);
    if(btn){ btn.textContent='♡ 저장하기'; btn.classList.remove('on'); }
  }
  localStorage.setItem('tabi_saved', JSON.stringify(saved));
  updateBadge();
}
function clearAll(){
  if(!saved.length) return;
  if(confirm('저장한 모든 장소를 삭제할까요?')){
    saved=[]; localStorage.setItem('tabi_saved',JSON.stringify(saved)); updateBadge(); renderSaved();
  }
}
function updateBadge(){
  var b = $id('savedBadge');
  if(saved.length){ b.textContent=saved.length; b.classList.add('show'); }
  else b.classList.remove('show');
}

/* ── Saved page ────────────────────────────── */
function renderSaved(){
  var sc = $id('savedContent');
  sc.innerHTML = '';
  if(!saved.length){
    var d = el('div','saved-empty');
    var ic = el('div','saved-empty-ic','🗺'); d.appendChild(ic);
    d.appendChild(el('div','saved-empty-tx','아직 저장한 장소가 없어요.
탐색 탭에서 ♡ 버튼을 눌러 저장해보세요!'));
    sc.appendChild(d); return;
  }
  var groups={};
  saved.forEach(function(s){ var k=s.city||'기타'; if(!groups[k]) groups[k]=[]; groups[k].push(s); });
  Object.keys(groups).forEach(function(c){
    sc.appendChild(el('span','saved-city', c));
    var list = el('div','');
    groups[c].forEach(function(s){
      var p  = s.data||{name:s.name};
      var pu = pUrl(p.ref||p.photo_ref, 400);
      var card = el('div','pc');
      var imgWrap = el('div','pc-img');
      if(pu){
        var img = document.createElement('img');
        img.src=pu; img.alt=p.name; img.loading='lazy';
        img.addEventListener('error', function(){ img.style.display='none'; });
        imgWrap.appendChild(img);
      }
      imgWrap.appendChild(el('div','pc-grad'));
      var heart = el('button','pc-heart on','♥');
      var sname = s.name;
      heart.addEventListener('click', function(e){
        e.stopPropagation(); removeSaved(sname); renderSaved();
      });
      imgWrap.appendChild(heart);
      card.appendChild(imgWrap);
      var info = el('div','pc-info');
      info.appendChild(el('div','pc-name',p.name));
      info.appendChild(el('div','pc-addr',p.addr||''));
      var meta = el('div','pc-meta');
      if(p.rating){ meta.appendChild(mkStars(p.rating)); meta.appendChild(el('span','pc-num',''+p.rating)); }
      info.appendChild(meta);
      card.appendChild(info);
      card.appendChild(buildCTA(p));
      card.addEventListener('click', function(){
        var sv = saved.find(function(x){ return x.name===sname; });
        if(sv){ places=[sv.data||{name:sname}]; openDetail(0); }
      });
      list.appendChild(card);
    });
    sc.appendChild(list);
  });
}
function removeSaved(name){
  var i = saved.findIndex(function(s){ return s.name===name; });
  if(i!==-1){ saved.splice(i,1); localStorage.setItem('tabi_saved',JSON.stringify(saved)); }
  updateBadge();
}

/* ── Detail ────────────────────────────────── */

      bl.appendChild(el('div','dbr-logo '+b.cls, b.logo));

      bt.appendChild(el('div','dbr-nm',b.nm));

function closeDetail(){ $id('detailPanel').classList.remove('open'); }

/* ── AI map/places ─────────────────────────── */
function buildMap(di){
  var d  = window._td[di];
  var tc = window._tc||'도쿄';
  var co = COORDS[tc]||{lat:35.6762,lng:139.6503};
  var bb = (co.lng-.04)+'%2C'+(co.lat-.03)+'%2C'+(co.lng+.04)+'%2C'+(co.lat+.03);
  var src= 'https://www.openstreetmap.org/export/embed.html?bbox='+bb+'&layer=mapnik&marker='+co.lat+'%2C'+co.lng;
  var wrap = el('div','');
  wrap.style.position='relative'; wrap.style.height='100%';
  var iframe = document.createElement('iframe');
  iframe.src=src; iframe.style.width='100%'; iframe.style.height='100%'; iframe.style.border='none';
  wrap.appendChild(iframe);
  var pts = [{x:72,y:60},{x:38,y:45},{x:60,y:28},{x:22,y:62},{x:58,y:76},{x:82,y:40}];
  d.places.forEach(function(pl, i){
    var pos  = pts[i]||{x:28+i*13,y:38+i*12};
    var pin  = el('div','tri-pin',''+(i+1));
    pin.style.left=pos.x+'%'; pin.style.top=pos.y+'%'; pin.style.background=d.col;
    var gurl = 'https://maps.google.com/?q='+encodeURIComponent(pl.name+' '+tc);
    pin.addEventListener('click', function(){ window.open(gurl,'_blank'); });
    wrap.appendChild(pin);
  });
  return wrap;
}
function buildPlaces(di){
  var d = window._td[di];
  var wrap = el('div','tri-places');
  var hd   = el('div','tri-day-hd');
  var dot  = el('div','tri-day-dot',''+(di+1)); dot.style.background=d.col;
  hd.appendChild(dot); hd.appendChild(el('div','tri-day-lbl',d.label));
  wrap.appendChild(hd);
  d.places.forEach(function(pl, pi){
    var info = gpi(pl.name);
    var row  = el('div','tri-row'); row.id='tpi-'+di+'-'+pi;
    row.appendChild(el('div','tri-ic', info.ic));
    var body = el('div','tri-body');
    body.appendChild(el('div','tri-pname',pl.name));
    body.appendChild(el('div','tri-ptp',info.tp));
    body.appendChild(el('div','tri-tip',pl.tip||info.cm));
    if(pl.time) body.appendChild(el('div','tri-time','⏰ '+pl.time));
    row.appendChild(body);
    wrap.appendChild(row);
  });
  return wrap;
}
function switchTD(di){
  if(!window._td) return;
  document.querySelectorAll('.tri-daytab').forEach(function(t,i){ t.classList.toggle('on',i===di); });
  var m = $id('triMap'); if(m){ m.innerHTML=''; m.appendChild(buildMap(di)); }
  var p = $id('triPlaces'); if(p){ p.parentNode.replaceChild(buildPlaces(di), p); }
}

function buildTriResult(days, aiCity, aiDays, aiStyle, aiPeople){
  var total = parseInt(aiDays)+1;
  window._td = days.map(function(d,i){
    return {label:d.label, col:PIN_C[i%PIN_C.length], places:d.places.map(function(p){ return Object.assign({},p); })};
  });
  window._tc = aiCity;

  var result = $id('aiResult');
  result.innerHTML = '';
  var wrap = el('div','tri-wrap');
  var card = el('div','tri-card');

  /* top */
  var top = el('div','tri-top');
  top.appendChild(el('div','tri-em', aiCity.charAt(0)));
  var ttl = el('div','tri-title'); ttl.innerHTML = aiCity+' '+aiDays+'박'+total+'일 <em>맞춤일정</em>';
  top.appendChild(ttl);
  top.appendChild(el('div','tri-sub', aiPeople+' '+aiStyle+' 코스 · Claude AI 설계'));
  card.appendChild(top);

  /* map */
  var mapDiv = el('div','tri-map'); mapDiv.id='triMap';
  mapDiv.appendChild(buildMap(0));
  card.appendChild(mapDiv);

  /* day tabs */
  var tabsDiv = el('div','tri-daytabs');
  days.forEach(function(_,i){
    var btn = el('button','tri-daytab'+(i===0?' on':''),'Day '+(i+1));
    (function(idx){ btn.addEventListener('click', function(){ switchTD(idx); }); })(i);
    tabsDiv.appendChild(btn);
  });
  card.appendChild(tabsDiv);

  /* places */
  card.appendChild(buildPlaces(0));

  /* footer */
  var footer = el('div','tri-footer');
  var tips = el('div','tri-tips');
  tips.appendChild(el('div','tri-tips-ttl','💡 여행 꿀팁'));
  tips.appendChild(el('div','tri-tips-item','· IC카드(Suica/ICOCA) 미리 충전 - 교통·편의점 결제 모두 가능'));
  tips.appendChild(el('div','tri-tips-item','· 인기 식당은 구글맵 사전 예약 or 개점 30분 전 줄서기'));
  tips.appendChild(el('div','tri-tips-item','· 100엔 숍(다이소·세리아) 기념품 - 가성비 최고!'));
  footer.appendChild(tips);

  var bud = el('div','tri-budget');
  bud.appendChild(el('span','tri-bud-l','예상 하루 예산 (숙박 별도)'));
  var bv = aiStyle==='가성비'?'8,000~12,000엔':aiStyle==='럭셔리'?'30,000~60,000엔':'15,000~25,000엔';
  bud.appendChild(el('span','tri-bud-r','약 '+bv+'/인'));
  footer.appendChild(bud);

  var acts = el('div','tri-acts');
  var cpyBtn = el('button','tri-act s','📋 일정 복사');
  cpyBtn.addEventListener('click', function(){
    var txt = (window._td||[]).map(function(d,i){
      return '[DAY '+(i+1)+' - '+d.label+']
'+d.places.map(function(p){ return '  '+(p.time||'')+' '+p.name; }).join('
');
    }).join('

');
    navigator.clipboard.writeText(txt).then(function(){ alert('일정이 복사됐어요!'); }).catch(function(){ alert('복사에 실패했어요.'); });
  });
  var expBtn = el('button','tri-act p','🗾 장소 탐색');
  expBtn.addEventListener('click', function(){ switchPage('explore'); });
  acts.appendChild(cpyBtn); acts.appendChild(expBtn);
  footer.appendChild(acts);

  card.appendChild(footer);
  wrap.appendChild(card);
  result.appendChild(wrap);
}

async function genItinerary(){
  var btn      = $id('btnGen');
  var aiCity   = $id('ai-city').value;
  var aiDays   = $id('ai-days').value;
  var aiStyle  = $id('ai-style').value;
  var aiPeople = $id('ai-people').value;
  var interests = [];
  document.querySelectorAll('.ai-chip.on').forEach(function(c){ interests.push(c.textContent.trim()); });
  var totalDays = parseInt(aiDays)+1;

  btn.disabled=true; btn.textContent='생성 중...';
  var ar = $id('aiResult');
  ar.innerHTML = '';
  var wrap = el('div','tri-wrap');
  var card = el('div','tri-card');
  var ldiv = el('div','tri-loading');
  var dots = el('div','tri-dots');
  dots.appendChild(el('span','')); dots.appendChild(el('span','')); dots.appendChild(el('span',''));
  ldiv.appendChild(dots);
  ldiv.appendChild(el('div','tri-ltxt','Claude AI가 '+aiCity+' '+aiDays+'박'+totalDays+'일
맞춤 일정을 설계하고 있어요...'));
  card.appendChild(ldiv); wrap.appendChild(card); ar.appendChild(wrap);

  var prompt =
    '당신은 일본 여행 전문 컨설턴트입니다. 아래 조건의 여행 일정을 JSON으로 작성해주세요.

' +
    '조건: 도시='+aiCity+', 기간='+aiDays+'박'+totalDays+'일, 스타일='+aiStyle+', 동행='+aiPeople+', 관심사='+(interests.join(', ')||'전반적 관광')+'

' +
    '규칙: days 배열에 '+totalDays+'개 day, 각 day에 5~6개 장소, 장소명은 한국어, time은 HH:MM, tip은 실용적 꿀팁 1~2문장

' +
    '형식(JSON만): {"days":[{"label":"테마","places":[{"name":"장소명","time":"09:00","tip":"꿀팁"}]}]}';

  try {
    var res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2500,messages:[{role:'user',content:prompt}]})
    });
    if(!res.ok) throw new Error('api '+res.status);
    var data = await res.json();
    if(data.error) throw new Error(data.error.message);
    var text = (data.content||[]).map(function(b){ return b.text||''; }).join('');
    var days = null;
    try {
      var clean = text.replace(/\u0060{3}json|\u0060{3}/g,'').trim();
      days = JSON.parse(clean).days;
    } catch(e) {
      var m = text.match(/\{[\s\S]*"days"[\s\S]*\}/);
      if(m) try{ days=JSON.parse(m[0]).days; }catch(e2){}
    }
    if(days && days.length){
      buildTriResult(days, aiCity, aiDays, aiStyle, aiPeople);
    } else throw new Error('parse failed');
  } catch(e) {
    console.warn('AI 폴백:', e.message);
    var fb = AI_DB[aiCity]||AI_DB['도쿄'];
    var sl = fb.slice(0,totalDays).map(function(d){
      return {label:d.label, places:d.places.map(function(p){ return Object.assign({},p); })};
    });
    while(sl.length<totalDays){
      var idx=sl.length%fb.length;
      sl.push({label:fb[idx].label+' ('+(sl.length+1)+'일차)', places:fb[idx].places.map(function(p){ return Object.assign({},p); })});
    }
    buildTriResult(sl, aiCity, aiDays, aiStyle, aiPeople);
  }
  btn.disabled=false; btn.textContent='AI 맞춤 일정 생성하기';
}
