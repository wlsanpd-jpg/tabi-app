<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TABI</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f6f4;--w:#fff;--sf:#f0efed;--sf2:#e6e5e2;
  --bd:#e0dfd9;--bd2:#cccbc5;
  --tx:#18181a;--tx2:#64635f;--tx3:#a3a29e;
  --ac:#00c896;--ac2:#00a87e;--acbg:#e2f9f3;
  --red:#ff3b4e;--gold:#f5a623;
  --kl:#f4452a;--mr:#ff6b35;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.06);
  --shadow-lg:0 2px 8px rgba(0,0,0,.08),0 8px 32px rgba(0,0,0,.1);
  --nav:60px;--safe:env(safe-area-inset-bottom);
  --r:14px;
  --f:"Noto Sans KR",sans-serif;--fd:"Playfair Display",serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;-webkit-font-smoothing:antialiased;}
body{font-family:var(--f);background:var(--bg);color:var(--tx);}
.app{max-width:480px;margin:0 auto;height:100%;background:var(--w);}
.page{display:none;flex-direction:column;height:100vh;overflow:hidden;}
.page.active{display:flex;}
button{font-family:var(--f);}
::-webkit-scrollbar{display:none;}

/* ─── Header ─── */
.hd{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);}
.hd-inner{display:flex;align-items:center;gap:10px;padding:14px 16px 11px;}
.logo-wrap{flex:1;}
.logo{font-family:var(--fd);font-size:26px;font-weight:900;color:var(--tx);letter-spacing:-.5px;}
.logo-dot{color:var(--ac);}
.logo-sub{font-size:10px;color:var(--tx3);letter-spacing:.6px;margin-top:1px;font-weight:500;}
.hd-srch{width:38px;height:38px;border-radius:50%;background:var(--sf);border:1px solid var(--bd);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx2);transition:background .15s;}
.hd-srch:active{background:var(--sf2);}
.hd-live{display:flex;align-items:center;gap:5px;background:var(--acbg);border-radius:20px;padding:5px 11px;font-size:10px;font-weight:700;color:var(--ac2);letter-spacing:.2px;}
.hd-dot{width:5px;height:5px;border-radius:50%;background:var(--ac);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

/* ─── Search bar ─── */
.srch-bar{background:var(--w);border-bottom:1px solid var(--bd);padding:9px 16px 11px;display:flex;gap:8px;}
.srch-bar.off{display:none;}
.sf{flex:1;display:flex;align-items:center;gap:8px;background:var(--sf);border:1.5px solid var(--bd);border-radius:24px;padding:0 14px;transition:border-color .2s;}
.sf:focus-within{border-color:var(--ac);background:var(--w);}
.sf input{background:none;border:none;outline:none;color:var(--tx);font-size:14px;font-family:var(--f);width:100%;padding:10px 0;}
.sf input::placeholder{color:var(--tx3);}
.s-go{background:var(--ac);border:none;color:#fff;border-radius:24px;padding:0 20px;height:42px;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;transition:background .15s;}
.s-go:active{background:var(--ac2);}
.s-x{background:none;border:none;color:var(--tx2);font-size:13px;font-weight:700;cursor:pointer;padding:0 4px;}

/* ─── City / Category tabs ─── */
.city-row{display:flex;overflow-x:auto;background:var(--w);border-bottom:1px solid var(--bd);padding:0 12px;}
.city-btn{flex-shrink:0;background:none;border:none;color:var(--tx3);font-size:13px;font-weight:700;padding:11px 8px 9px;cursor:pointer;font-family:var(--f);position:relative;white-space:nowrap;transition:color .15s;}
.city-btn.on{color:var(--ac);}
.city-btn.on::after{content:"";position:absolute;bottom:0;left:4px;right:4px;height:2.5px;background:var(--ac);border-radius:2px;}
.cat-row{display:flex;gap:7px;overflow-x:auto;padding:10px 16px 9px;background:var(--w);border-bottom:1px solid var(--bd);}
.cat-btn{flex-shrink:0;background:var(--sf);border:1.5px solid transparent;border-radius:22px;padding:7px 14px;font-size:12px;font-weight:700;color:var(--tx2);cursor:pointer;white-space:nowrap;font-family:var(--f);transition:all .15s;}
.cat-btn:active{background:var(--sf2);}
.cat-btn.on{background:var(--tx);border-color:var(--tx);color:#fff;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* ─── Booking strip ─── */
.bk-strip{background:var(--w);border-bottom:1px solid var(--bd);}
.bk-hd{display:flex;align-items:center;justify-content:space-between;padding:15px 16px 8px;}
.bk-lbl{font-size:13px;font-weight:800;color:var(--tx);}
.bk-badge{font-size:10px;font-weight:700;color:var(--ac);background:var(--acbg);border-radius:6px;padding:2px 8px;}
.bk-list{display:flex;gap:10px;padding:0 16px 14px;overflow-x:auto;}
.bk-card{flex-shrink:0;width:152px;background:var(--w);border-radius:var(--r);overflow:hidden;cursor:pointer;border:1.5px solid var(--bd);transition:transform .15s,box-shadow .15s;}
.bk-card:active{transform:scale(.97);}
.bk-img{height:76px;background:linear-gradient(135deg,#e8f5e9,#e3f2fd);display:flex;align-items:center;justify-content:center;font-size:30px;position:relative;}
.bk-plat{position:absolute;top:6px;right:6px;font-size:9px;font-weight:800;color:#fff;padding:2px 6px;border-radius:4px;}
.bk-plat.kl{background:var(--kl);}.bk-plat.mr{background:var(--mr);}
.bk-body{padding:9px 10px 11px;}
.bk-nm{font-size:11px;font-weight:700;color:var(--tx);line-height:1.4;margin-bottom:3px;}
.bk-pr{font-size:12px;font-weight:900;color:var(--ac);}

/* ─── Section header ─── */
.sec-hd{display:flex;align-items:center;justify-content:space-between;padding:20px 16px 12px;background:var(--w);}
.sec-ttl{font-size:18px;font-weight:900;color:var(--tx);}
.sec-cnt{font-size:12px;color:var(--tx3);}

/* ─── Place cards ─── */
.place-list{display:flex;flex-direction:column;gap:0;}
.pc{background:var(--w);border-bottom:1px solid var(--bd);cursor:pointer;animation:fadeUp .35s cubic-bezier(.16,1,.3,1) both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.pc:active{background:var(--sf);}
.pc-img{width:100%;height:210px;background:var(--sf2);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:56px;}
.pc-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .3s;}
.pc:active .pc-img img{transform:scale(1.02);}
.pc-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0) 40%,rgba(0,0,0,.45) 100%);}
.pc-rank{position:absolute;top:12px;left:12px;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);color:#fff;font-size:11px;font-weight:800;padding:4px 10px;border-radius:8px;letter-spacing:.2px;}
.pc-badge{position:absolute;bottom:12px;left:12px;background:rgba(255,255,255,.93);backdrop-filter:blur(4px);color:var(--tx);font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;}
.pc-heart{position:absolute;top:10px;right:10px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.92);backdrop-filter:blur(4px);border:none;cursor:pointer;font-size:16px;color:var(--tx3);box-shadow:0 2px 10px rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center;transition:transform .15s,background .15s;}
.pc-heart:active{transform:scale(.88);}
.pc-heart.on{color:var(--red);}
.pc-info{padding:14px 16px 8px;}
.pc-name{font-size:17px;font-weight:800;color:var(--tx);margin-bottom:3px;line-height:1.25;}
.pc-addr{font-size:12px;color:var(--tx3);margin-bottom:10px;display:flex;align-items:center;gap:3px;}
.pc-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.pc-stars{display:flex;gap:1px;}
.pc-star{font-size:11px;color:var(--bd2);}.pc-star.on{color:var(--gold);}
.pc-rnum{font-size:13px;font-weight:800;color:var(--tx);}
.pc-rcnt{font-size:11px;color:var(--tx3);}
.pc-sep{width:1px;height:12px;background:var(--bd2);}
.pc-open{font-size:11px;font-weight:700;color:var(--ac);}
.pc-closed{font-size:11px;font-weight:700;color:var(--red);}
.pc-cta{display:flex;border-top:1px solid var(--bd);margin-top:12px;}
.pc-cta a{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:12px 6px;text-decoration:none;font-size:12px;font-weight:800;font-family:var(--f);color:var(--tx2);transition:background .12s;}
.pc-cta a:active{background:var(--sf);}
.pc-cta a+a{border-left:1px solid var(--bd);}
.pc-cta a.kl{color:var(--kl);}

/* ─── Loading / Empty ─── */
.loading{padding:80px 20px;text-align:center;}
.spinner{width:34px;height:34px;border:3px solid var(--bd2);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-size:13px;color:var(--tx3);}
.empty{padding:80px 20px;text-align:center;}
.etxt{font-size:13px;color:var(--tx3);line-height:1.7;margin-top:10px;}

/* ─── Bottom navigation ─── */
.bot-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:300;background:rgba(255,255,255,.98);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--bd);display:flex;align-items:stretch;height:calc(var(--nav) + var(--safe));padding-bottom:var(--safe);}
.nav-it{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:none;border:none;cursor:pointer;font-family:var(--f);font-size:10px;font-weight:700;color:var(--tx3);padding-top:6px;transition:color .15s;}
.nav-it.on{color:var(--ac);}
.nav-ic{width:26px;height:26px;display:flex;align-items:center;justify-content:center;position:relative;}
.nav-ic svg{transition:transform .2s cubic-bezier(.34,1.56,.64,1);}
.nav-it.on .nav-ic svg{transform:scale(1.15);}
.nav-badge{position:absolute;top:-5px;right:-9px;background:var(--red);color:#fff;font-size:9px;font-weight:800;border-radius:10px;padding:1px 5px;min-width:16px;text-align:center;display:none;line-height:1.4;}
.nav-badge.show{display:block;}
/* ─── AI page ─── */
.ai-pg{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;}
.ai-hero{padding:32px 20px 28px;background:linear-gradient(160deg,#08111f,#0f2218 55%,#0a1a14);position:relative;overflow:hidden;}
.ai-hero::before{content:"";position:absolute;right:-40px;top:-40px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(0,200,150,.18),transparent 70%);}
.ai-hero::after{content:"";position:absolute;left:-20px;bottom:-20px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(0,150,200,.08),transparent 70%);}
.ai-hero-sub{font-size:11px;font-weight:700;color:var(--ac);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.ai-hero-sub::before{content:"";width:18px;height:1.5px;background:var(--ac);border-radius:2px;}
.ai-hero-h{font-family:var(--fd);font-size:30px;font-weight:900;color:#fff;line-height:1.2;margin-bottom:8px;}
.ai-hero-p{font-size:13px;color:rgba(255,255,255,.55);line-height:1.7;}
.ai-form{margin:16px;background:var(--w);border-radius:18px;overflow:hidden;box-shadow:var(--shadow-lg);border:1px solid var(--bd);}
.ai-sec{padding:18px 16px 0;}
.ai-lbl{font-size:10px;font-weight:800;color:var(--tx3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;display:block;}
.ai-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.ai-sel{width:100%;background:var(--sf);border:1.5px solid var(--bd);border-radius:12px;padding:11px 12px;font-size:13px;color:var(--tx);font-family:var(--f);font-weight:600;outline:none;appearance:none;transition:border-color .2s;}
.ai-sel:focus{border-color:var(--ac);background:var(--w);}
.ai-chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px;}
.ai-chip{background:var(--sf);border:1.5px solid var(--bd);border-radius:22px;padding:7px 13px;font-size:12px;font-weight:700;color:var(--tx2);cursor:pointer;font-family:var(--f);transition:all .15s;}
.ai-chip:active{transform:scale(.95);}
.ai-chip.on{background:var(--tx);border-color:var(--tx);color:#fff;}
.ai-gen{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;border:none;padding:18px;font-size:15px;font-weight:900;cursor:pointer;font-family:var(--f);transition:opacity .15s;}
.ai-gen:disabled{opacity:.5;cursor:not-allowed;}
.ai-gen:not(:disabled):active{opacity:.85;}

/* ─── Itinerary card ─── */
.tri-wrap{margin:16px;}
.tri-card{background:var(--w);border-radius:18px;overflow:hidden;border:1px solid var(--bd);box-shadow:var(--shadow-lg);}
.tri-top{padding:22px 20px 18px;background:linear-gradient(135deg,#08111f,#0f2218);text-align:center;position:relative;overflow:hidden;}
.tri-top::before{content:"";position:absolute;right:-30px;top:-30px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(0,200,150,.12),transparent 70%);}
.tri-em{font-size:44px;margin-bottom:10px;}
.tri-title{font-family:var(--fd);font-size:22px;color:#fff;font-weight:700;margin-bottom:5px;line-height:1.3;}
.tri-sub{font-size:12px;color:rgba(255,255,255,.45);}
.tri-map{display:none;}
.tri-pin{position:absolute;transform:translate(-50%,-50%);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;z-index:2;box-shadow:0 2px 8px rgba(0,0,0,.25);border:2px solid rgba(255,255,255,.8);pointer-events:all;cursor:pointer;}
.tri-daytabs{display:flex;gap:6px;padding:13px 14px;border-bottom:1px solid var(--bd);overflow-x:auto;}
.tri-daytab{flex-shrink:0;padding:8px 18px;border-radius:22px;font-size:12px;font-weight:800;cursor:pointer;border:1.5px solid var(--bd2);background:var(--w);color:var(--tx3);font-family:var(--f);transition:all .15s;}
.tri-daytab.on{background:var(--tx);border-color:var(--tx);color:#fff;}
.tri-places{padding:4px 0;}
.tri-day-hd{display:flex;align-items:center;gap:8px;padding:13px 16px 8px;}
.tri-day-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;}
.tri-day-lbl{font-size:14px;font-weight:800;color:var(--tx);}
.tri-place-row{display:flex;gap:12px;padding:10px 16px 10px 46px;position:relative;}
.tri-place-row::before{content:"";position:absolute;left:27px;top:0;bottom:0;width:1.5px;background:var(--bd2);}
.tri-place-row:last-child::before{height:50%;}
.tri-place-ic{width:52px;height:52px;border-radius:14px;flex-shrink:0;background:var(--sf2);display:flex;align-items:center;justify-content:center;font-size:24px;border:1px solid var(--bd);}
.tri-place-body{flex:1;min-width:0;}
.tri-place-name{font-size:14px;font-weight:800;color:var(--tx);margin-bottom:2px;}
.tri-place-tp{font-size:11px;color:var(--tx3);margin-bottom:5px;}
.tri-place-cm{font-size:11px;color:var(--ac2);font-weight:700;line-height:1.55;background:var(--acbg);padding:5px 9px;border-radius:8px;display:inline-block;}
.tri-place-cm::before{content:"Tip. ";}
.tri-place-time{font-size:10px;color:var(--tx3);margin-top:4px;}
.tri-footer{border-top:1px solid var(--bd);}
.tri-tip{padding:15px 16px;background:var(--acbg);}
.tri-tip-h{font-size:11px;font-weight:900;color:var(--ac2);margin-bottom:7px;}
.tri-tip-p{font-size:12px;color:var(--tx2);line-height:1.7;margin-bottom:2px;}
.tri-budget{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-top:1px solid var(--bd);}
.tri-bud-l{font-size:11px;color:var(--tx3);}
.tri-bud-r{font-size:14px;font-weight:900;color:var(--tx);}
.tri-acts{display:flex;gap:8px;padding:12px 16px 14px;border-top:1px solid var(--bd);}
.tri-act{flex:1;padding:13px;border-radius:12px;border:none;font-size:13px;font-weight:800;cursor:pointer;font-family:var(--f);transition:opacity .15s;}
.tri-act:active{opacity:.8;}
.tri-act.p{background:var(--ac);color:#fff;}
.tri-act.s{background:var(--sf);color:var(--tx);border:1.5px solid var(--bd2);}
.tri-loading{padding:48px 20px;text-align:center;}
.tri-dots{display:flex;justify-content:center;gap:7px;margin-bottom:14px;}
.tri-dots span{width:9px;height:9px;border-radius:50%;background:var(--ac);animation:bounce .8s ease-in-out infinite;}
.tri-dots span:nth-child(2){animation-delay:.14s;}
.tri-dots span:nth-child(3){animation-delay:.28s;background:var(--bd2);}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-9px)}}
.tri-ltxt{font-size:13px;color:var(--tx3);font-weight:600;}

/* ─── Saved page ─── */
.saved-hd{padding:24px 20px 16px;border-bottom:1px solid var(--bd);background:var(--w);}
.saved-hd-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.saved-title{font-family:var(--fd);font-size:26px;font-weight:900;color:var(--tx);}
.saved-clear{background:none;border:none;font-size:12px;font-weight:700;color:var(--tx3);cursor:pointer;font-family:var(--f);}
.saved-city-lbl{font-size:10px;font-weight:800;letter-spacing:.8px;color:var(--tx3);text-transform:uppercase;padding:16px 16px 8px;display:block;background:var(--bg);}
.saved-empty{padding:80px 20px;text-align:center;}
.saved-empty-ic{font-size:52px;margin-bottom:14px;opacity:.4;}
.saved-empty-tx{font-size:14px;color:var(--tx3);line-height:1.7;}

/* ─── Detail panel ─── */
.detail{position:fixed;inset:0;z-index:400;background:var(--w);overflow-y:auto;transform:translateX(100%);transition:transform .32s cubic-bezier(.16,1,.3,1);}
.detail.open{transform:translateX(0);}
.d-nav{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);padding:13px 16px;display:flex;align-items:center;gap:12px;}
.d-back{background:var(--sf);border:1px solid var(--bd);border-radius:12px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2);transition:background .15s;}
.d-back:active{background:var(--sf2);}
.d-back svg{width:18px;height:18px;stroke:currentColor;stroke-width:2.5;fill:none;}
.d-nav-ttl{font-size:15px;font-weight:800;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.d-hero{width:100%;height:270px;background:var(--sf2);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:80px;cursor:grab;}
.d-hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.d-hero-fade{position:absolute;bottom:0;left:0;right:0;height:90px;background:linear-gradient(transparent,var(--w));}
.hero-dots{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:5;}
.hero-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.5);cursor:pointer;transition:all .22s;}
.hero-dot.on{background:#fff;width:20px;border-radius:3px;}
.hero-arr{position:absolute;top:50%;transform:translateY(-50%);z-index:6;background:rgba(0,0,0,.38);border:none;color:#fff;font-size:24px;line-height:1;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.hero-arr-l{left:10px;}
.hero-arr-r{right:10px;}
.d-body{padding-bottom:120px;}
.d-title-sec{padding:18px 16px 14px;border-bottom:1px solid var(--bd);}
.d-name{font-family:var(--fd);font-size:26px;font-weight:900;color:var(--tx);letter-spacing:-.5px;margin-bottom:4px;line-height:1.2;}
.d-type{font-size:12px;color:var(--tx3);font-weight:500;}
.d-rating-sec{padding:16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:16px;}
.d-big{font-family:var(--fd);font-size:52px;font-weight:900;color:var(--tx);line-height:1;}
.d-stars{display:flex;gap:2px;margin-bottom:4px;}

// ── DOM helper
function mk(tag,cls,txt){
  var e=document.createElement(tag);
  if(cls)e.className=cls;
  if(txt!==undefined)e.textContent=txt;
  return e;
}
function on(id,ev,fn){document.getElementById(id).addEventListener(ev,fn);}

function buildCityTabs(){
  var row=document.getElementById('cityRow');
  row.innerHTML='';
  CITIES.forEach(function(c,i){
    var btn=mk('button','city-btn'+(i===0?' on':''),c.kr);
    btn.addEventListener('click',function(){
      row.querySelectorAll('.city-btn').forEach(function(b){b.classList.remove('on');});
      btn.classList.add('on');city=c.kr;cityEn=c.en;load();
    });
    row.appendChild(btn);
  });
}
function buildCatTabs(){
  var row=document.getElementById('catRow');
  row.innerHTML='';
  CATS.forEach(function(c,i){
    var btn=mk('button','cat-btn'+(i===0?' on':''),c.label);
    btn.addEventListener('click',function(){
      row.querySelectorAll('.cat-btn').forEach(function(b){b.classList.remove('on');});
      btn.classList.add('on');cat=c.key;
      // 5번: 맛집 세부탭 표시/숨김 + 버튼 상태 초기화
      foodSubCat='all';

      if(foodRow){
        foodRow.style.display=(c.key==='restaurant')?'flex':'none';
        foodRow.querySelectorAll('.food-sub-btn').forEach(function(b){b.classList.remove('on');});
        var allBtn=foodRow.querySelector('[data-key="all"]');
        if(allBtn)allBtn.classList.add('on');
      }
      // 6번: 정렬바 표시
      var sortRow=document.getElementById('sortRow');

    var c=e.target.closest('.ai-chip');if(c)c.classList.toggle('on');
  });
  on('btnClearAll','click',clearAll);
  on('btnBack','click',closeDetail);
  // 5번: 맛집 세부탭 이벤트
  document.getElementById('foodSubRow').addEventListener('click',function(e){
    var btn=e.target.closest('.food-sub-btn');if(!btn)return;
    document.querySelectorAll('.food-sub-btn').forEach(function(b){b.classList.remove('on');});
    btn.classList.add('on');
    foodSubCat=btn.dataset.key;
    load();
  });
  // 6번: 정렬/필터 - 하나만 선택, 선택시 초록색+체크
  function setSortFilter(key){
    if(key==='open'){
      onlyOpen=!onlyOpen;
      sortBy='none';
    } else {
      sortBy=(sortBy===key)?'none':key;
      onlyOpen=false;
    }
    document.querySelectorAll('.sort-btn').forEach(function(b){
      b.classList.remove('on');
      b.textContent=b.dataset.label||b.textContent.replace(' ✓','');
    });
    var activeKey=(key==='open'&&onlyOpen)?'open':(sortBy!=='none'?sortBy:'none');
    if(activeKey!=='none'){
      var activeBtn=document.querySelector('.sort-btn[data-key="'+activeKey+'"]');
      if(activeBtn){activeBtn.classList.add('on');activeBtn.textContent=(activeBtn.dataset.label||'')+' ✓';}
    }
    renderList(_places);
  }
  on('btnSortRating','click',function(){setSortFilter('rating_desc');});
  on('btnOnlyOpen','click',function(){setSortFilter('open');});
  on('btnSortCnt','click',function(){setSortFilter('cnt_desc');});
}

function switchPage(p){

  document.querySelectorAll('.nav-it').forEach(function(x){x.classList.remove('on');});
  document.getElementById('page-'+p).classList.add('active');
  document.getElementById('nav-'+p).classList.add('on');
  if(p==='saved')renderSaved();
}

async function fetchPlaces(query,type){
  showMsg('loading');
  try{
    var p=new URLSearchParams({query:query,language:'ko'});
    if(type)p.append('type',type);
    var res=await fetch(PROXY+'/api/places?'+p);
    var d=await res.json();
    // 5번: 맛집은 최대 60개 (pagetoken으로 추가 요청)
    if(type==='restaurant'&&d.next_page_token){
      try{
        await new Promise(function(r){setTimeout(r,2000);}); // pagetoken 활성화 대기
        var p2=new URLSearchParams({pagetoken:d.next_page_token,language:'ko'});
        var res2=await fetch(PROXY+'/api/places?'+p2);
        var d2=await res2.json();
        if(d2.results)d.results=(d.results||[]).concat(d2.results);
        if(d2.next_page_token){
          await new Promise(function(r){setTimeout(r,2000);});
          var p3=new URLSearchParams({pagetoken:d2.next_page_token,language:'ko'});
          var res3=await fetch(PROXY+'/api/places?'+p3);
          var d3=await res3.json();
          if(d3.results)d.results=d.results.concat(d3.results);
        }
      }catch(e){console.warn('pagetoken fetch failed',e);}
    }
    if(!d.results||!d.results.length){showMsg('empty');return;}
    var raw=d.results.map(function(r){
      return{
        name:r.name,addr:r.formatted_address,rating:r.rating,cnt:r.user_ratings_total,
        open:r.opening_hours&&r.opening_hours.open_now,
        types:(r.types||[]).slice(0,3),
        photo_ref:r.photos&&r.photos[0]&&r.photos[0].photo_reference,
        photo_refs:r.photos?r.photos.slice(0,5).map(function(ph){return ph.photo_reference;}):null,
        place_id:r.place_id,
        url:r.place_id?('https://maps.google.com/maps?place_id='+r.place_id):null,
        editorial_summary:r.editorial_summary&&r.editorial_summary.overview||null
      };
    });
    // 1번: 리뷰 50개 미만 + 평점 3.5 미만 필터
    var minCnt=['삳포로','나라','가마쿠라','나고야','하코네','히로시마','요코하마','고베','벳푸','나가사키','가나자와','닛코'].indexOf(city)>=0?30:100;
    _places=raw.filter(function(r){return(r.cnt||0)>=minCnt&&(r.rating||0)>=3.5;});
    if(!_places.length){showMsg('empty');return;}
    renderList(_places);
  }catch(e){console.error(e);showMsg('error');}
}

function mkCard(p,idx){

  card.style.animationDelay=((idx%8)*0.05)+'s';
  var imgW=mk('div','pc-img');

  imgW.appendChild(mk('div','pc-grad'));
  imgW.appendChild(mk('div','pc-rank','#'+(idx+1)));

  var info=mk('div','pc-info');
  info.appendChild(mk('div','pc-name',p.name));
  info.appendChild(mk('div','pc-addr',p.addr||''));
  var meta=mk('div','pc-meta');
  meta.appendChild(mkStars(p.rating));

  if(p.cnt)meta.appendChild(mk('span','pc-rcnt','('+p.cnt.toLocaleString()+'\uac74)'));
  if(p.open===true){meta.appendChild(mk('span','pc-sep'));meta.appendChild(mk('span','pc-open','\u25cf \uc601\uc5c5\uc911'));}
  if(p.open===false){meta.appendChild(mk('span','pc-sep'));meta.appendChild(mk('span','pc-closed','\u25cf \uc601\uc5c5\uc885\ub8cc'));}
  info.appendChild(meta);
  card.appendChild(imgW);card.appendChild(info);card.appendChild(mkCTA(p));

// ── Detail
function openDetail(idx){
  var p=_places[idx];if(!p)return;
  document.getElementById('dTitle').textContent=p.name;
  var hero=document.getElementById('dHero');hero.innerHTML='';hero.style.fontSize='';
  hero.appendChild(mk('div','d-hero-fade'));
  // 2번: Wikipedia 사진 우선, Google 사진 스와이프
  var heroImgs=[];
  var currentHeroIdx=0;
  var _heroAnimating=false;
  function showHeroImg(nextIdx,dir){
    if(!heroImgs.length||_heroAnimating)return;
    _heroAnimating=true;
    var existing=hero.querySelector('img.hero-img');
    var img=document.createElement('img');
    img.className='hero-img';
    img.alt=p.name;
    var fromX=dir===0?'0%':(dir>0?'100%':'-100%');
    img.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:translateX('+fromX+');transition:transform .32s cubic-bezier(.25,.46,.45,.94);will-change:transform;';
    img.src=heroImgs[nextIdx];
    img.addEventListener('error',function(){
      heroImgs.splice(nextIdx,1);_heroAnimating=false;
      if(heroImgs.length)showHeroImg(Math.min(currentHeroIdx,heroImgs.length-1),0);
      else{hero.style.fontSize='80px';hero.textContent=gpi(p.name).ic;}
    });
    hero.insertBefore(img,hero.firstChild);
    // 인디케이터 업데이트
    var dots=hero.querySelectorAll('.hero-dot');
    dots.forEach(function(d,i){d.classList.toggle('on',i===nextIdx);});
    if(dir!==0&&existing){
      existing.style.transition='transform .32s cubic-bezier(.25,.46,.45,.94)';
      existing.style.willChange='transform';
    }
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        img.style.transform='translateX(0)';
        if(dir!==0&&existing){
          existing.style.transform='translateX('+(dir>0?'-100%':'100%')+')';
        }
        setTimeout(function(){
          if(existing&&existing.parentNode)existing.remove();
          _heroAnimating=false;
        },340);
      });
    });
  }
  function buildHeroWithImgs(imgs){
    heroImgs=imgs;currentHeroIdx=0;
    if(!imgs.length){hero.style.fontSize='80px';hero.textContent=gpi(p.name).ic;return;}
    showHeroImg(0,0);
    if(imgs.length>1){
      var dotsWrap=mk('div','hero-dots');
      imgs.forEach(function(_,i){
        var dot=mk('div','hero-dot'+(i===0?' on':''));
        dot.addEventListener('click',function(){
          if(i===currentHeroIdx)return;
          var d=i>currentHeroIdx?1:-1;currentHeroIdx=i;showHeroImg(i,d);
        });
        dotsWrap.appendChild(dot);
      });
      hero.appendChild(dotsWrap);
      // 좌우 화살표
      var arL=mk('button','hero-arr hero-arr-l','‹');
      var arR=mk('button','hero-arr hero-arr-r','›');
      arL.addEventListener('click',function(){if(_heroAnimating)return;currentHeroIdx=(currentHeroIdx-1+heroImgs.length)%heroImgs.length;showHeroImg(currentHeroIdx,-1);});
      arR.addEventListener('click',function(){if(_heroAnimating)return;currentHeroIdx=(currentHeroIdx+1)%heroImgs.length;showHeroImg(currentHeroIdx,1);});
      hero.appendChild(arL);hero.appendChild(arR);
      // 스와이프
      var startX=0,startY=0;
      hero.addEventListener('touchstart',function(e){startX=e.touches[0].clientX;startY=e.touches[0].clientY;},{passive:true});
      hero.addEventListener('touchend',function(e){
        var dx=e.changedTouches[0].clientX-startX;
        var dy=e.changedTouches[0].clientY-startY;
        if(Math.abs(dx)>40&&Math.abs(dx)>Math.abs(dy)){
          var dir=dx<0?1:-1;
          currentHeroIdx=(currentHeroIdx+dir+heroImgs.length)%heroImgs.length;
          showHeroImg(currentHeroIdx,dir);
        }
      },{passive:true});
    }
  }
  // Google Places 사진 여러 장 + Wikipedia 썸네일
  var imgs=[];
  if(p.photo_refs&&p.photo_refs.length){
    p.photo_refs.forEach(function(ref){var u=photoUrl(ref,800);if(u)imgs.push(u);});
  } else if(p.photo_ref){
    imgs.push(photoUrl(p.photo_ref,800));
  }
  fetch('https://en.wikipedia.org/api/rest_v1/page/summary/'+encodeURIComponent(p.name))
    .then(function(r){return r.json();})
    .then(function(w){
      var allImgs=imgs.slice();
      if(w.thumbnail&&w.thumbnail.source&&allImgs.indexOf(w.thumbnail.source)<0)
        allImgs.push(w.thumbnail.source);
      buildHeroWithImgs(allImgs.slice(0,6));
    })
    .catch(function(){buildHeroWithImgs(imgs);});
  var body=document.getElementById('dBody');body.innerHTML='';
  var ts=mk('div','d-title-sec');
  ts.appendChild(mk('div','d-name',p.name));
  ts.appendChild(mk('div','d-type',(p.types||[]).join(' \u00b7 ')));
  body.appendChild(ts);
  // 7번: 세부 설명 (관광명소=Wikipedia, 나머지=editorial_summary)
  if(p.editorial_summary){
    var descSec=mk('div','d-desc-sec');

  } else if(cat==='tourist_attraction'){
    // Wikipedia API 비동기 로드

    fetch('https://ja.wikipedia.org/api/rest_v1/page/summary/'+encodeURIComponent(p.name))
      .then(function(r){return r.json();})
      .then(function(w){
        if(w.extract){
          // 일본어 요약을 그대로 표시 (첫 200자)
          descTxt.textContent=w.extract.slice(0,200)+(w.extract.length>200?'...':'');
        } else {

  hd.appendChild(dot);hd.appendChild(mk('div','tri-day-lbl',d.label));
  wrap.appendChild(hd);
  d.places.forEach(function(pl,pi){
    var info=gpi(pl.name);
    var row=mk('div','tri-place-row');row.id='tpi-'+di+'-'+pi;
    row.appendChild(mk('div','tri-place-ic',info.ic));
    var body=mk('div','tri-place-body');
    body.appendChild(mk('div','tri-place-name',pl.name));
    body.appendChild(mk('div','tri-place-tp',info.tp));
    body.appendChild(mk('div','tri-place-cm',pl.tip||info.cm));
    if(pl.time)body.appendChild(mk('div','tri-place-time','\u23f0 '+pl.time));
    row.appendChild(body);wrap.appendChild(row);
  });
  return wrap;
}
function switchTD(di){
  if(!_tdays)return;
  document.querySelectorAll('.tri-daytab').forEach(function(t,i){t.classList.toggle('on',i===di);});
  var op=document.getElementById('triPlaces');if(op)op.replaceWith(mkPlaces(di));
}
function copyTri(){
  var lines=(_tdays||[]).map(function(d,i){
    var rows=d.places.map(function(p){return '  '+(p.time||'')+' '+p.name;});
    return['[DAY '+(i+1)+' - '+d.label+']'].concat(rows).join('\n');
  });
  navigator.clipboard.writeText(lines.join('\n\n'))
    .then(function(){alert('\uc77c\uc815\uc774 \ubcf5\uc0ac\ub418\uc5c8\uc5b4\uc694!');})
    .catch(function(){alert('\ubcf5\uc0ac\uc5d0 \uc2e4\ud328\ud588\uc5b4\uc694.');});
}
function buildTriResult(days,aiCity,aiDays,aiStyle,aiPeople){
  var total=parseInt(aiDays)+1;
  _tdays=days.map(function(d,i){
    return{label:d.label,col:PIN_C[i%PIN_C.length],places:d.places.map(function(p){return Object.assign({},p);})};
  });
  _tcity=aiCity;
  var result=document.getElementById('aiResult');result.innerHTML='';
  var wrap=mk('div','tri-wrap'),card=mk('div','tri-card');
  var top=mk('div','tri-top');
  top.appendChild(mk('div','tri-em',aiCity.charAt(0)));
  top.appendChild(mk('div','tri-title',aiCity+' '+aiDays+'\ubc15'+total+'\uc77c \ub9de\ucda4\uc77c\uc815'));
  top.appendChild(mk('div','tri-sub',aiPeople+' '+aiStyle+' \ucf54\uc2a4 \u00b7 Claude AI \uc124\uacc4'));
  card.appendChild(top);
  
  var tabs=mk('div','tri-daytabs');
  days.forEach(function(_,i){
    var btn=mk('button','tri-daytab'+(i===0?' on':''),'Day '+(i+1));
    btn.addEventListener('click',function(){switchTD(i);});
    tabs.appendChild(btn);
  });
  card.appendChild(tabs);
  card.appendChild(mkPlaces(0));
  var footer=mk('div','tri-footer');
  var tip=mk('div','tri-tip');
  tip.appendChild(mk('div','tri-tip-h','\ud83d\udca1 \uc5ec\ud589 \uaffc\ud301'));
  tip.appendChild(mk('div','tri-tip-p','\u00b7 IC\uce74\ub4dc(Suica/ICOCA) \ubbf8\ub9ac \ucda9\uc804 - \uad50\ud1b5\u00b7\ud3b8\uc758\uc810 \uacb0\uc81c \ubaa8\ub450 \uac00\ub2a5'));
  tip.appendChild(mk('div','tri-tip-p','\u00b7 \uc778\uae30 \uc2dd\ub2f9\uc740 \uad6c\uae00\ub9f5 \uc0ac\uc804 \uc608\uc57d or \uac1c\uc810 30\ubd84 \uc804 \uc904\uc11c\uae30'));
  tip.appendChild(mk('div','tri-tip-p','\u00b7 100\uc5d4 \uc49b(\ub2e4\uc774\uc18c\u00b7\uc138\ub9ac\uc544) \uae30\ub150\ud488 - \uac00\uc131\ube44 \ucd5c\uace0!'));
  footer.appendChild(tip);
  var bud=mk('div','tri-budget');
  var budVal=aiStyle==='\uac00\uc131\ube44'?'8,000~12,000\uc5d4':aiStyle==='\ub7ed\uc154\ub9ac'?'30,000~60,000\uc5d4':'15,000~25,000\uc5d4';
  bud.appendChild(mk('span','tri-bud-l','\uc608\uc0c1 \ud558\ub8e8 \uc608\uc0b0 (\uc219\ubc15 \ubcc4\ub3c4)'));
  bud.appendChild(mk('span','tri-bud-r','\uc57d '+budVal+'/\uc778'));
  footer.appendChild(bud);
  var acts=mk('div','tri-acts');
  var copyBtn=mk('button','tri-act s','\ud83d\udccb \uc77c\uc815 \ubcf5\uc0ac');
  copyBtn.addEventListener('click',copyTri);
  var explBtn=mk('button','tri-act p','\ud83d\uddfa \uc7a5\uc18c \ud0d0\uc0c9');
  explBtn.addEventListener('click',function(){switchPage('explore');});
  acts.appendChild(copyBtn);acts.appendChild(explBtn);
  footer.appendChild(acts);
  card.appendChild(footer);wrap.appendChild(card);result.appendChild(wrap);
}

// ── AI generate
async function genItinerary(){
  var btn=document.getElementById('btnGen');
  var aiCity=document.getElementById('aiCity').value;
  var aiDays=document.getElementById('aiDays').value;
  var aiStyle=document.getElementById('aiStyle').value;
  var aiPeople=document.getElementById('aiPeople').value;
  var interests=[];
  document.querySelectorAll('.ai-chip.on').forEach(function(c){interests.push(c.textContent.trim());});
  var total=parseInt(aiDays)+1;
  btn.disabled=true;btn.textContent='\uc0dd\uc131 \uc911...';
  var result=document.getElementById('aiResult');result.innerHTML='';
  var wrap=mk('div','tri-wrap'),card=mk('div','tri-card'),loading=mk('div','tri-loading');
  var dots=mk('div','tri-dots');
  dots.appendChild(mk('span'));dots.appendChild(mk('span'));dots.appendChild(mk('span'));
  loading.appendChild(dots);
  loading.appendChild(mk('div','tri-ltxt','Claude AI\uac00 '+aiCity+' '+aiDays+'\ubc15'+total+'\uc77c \ub9de\ucda4 \uc77c\uc815\uc744 \uc124\uacc4\ud558\uace0 \uc788\uc5b4\uc694...'));
  card.appendChild(loading);wrap.appendChild(card);result.appendChild(wrap);
  var promptParts=[
    '\ub2f9\uc2e0\uc740 \uc77c\ubcf8 \uc5ec\ud589 \uc804\ubb38 \ucf58\uc124\ud134\ud2b8\uc785\ub2c8\ub2e4. \uc544\ub798 \uc870\uac74\uc5d0 \ub9de\ub294 \uc5ec\ud589 \uc77c\uc815\uc744 JSON\uc73c\ub85c \uc791\uc131\ud574\uc8fc\uc138\uc694.',
    '',
    '\uc870\uac74: \ub3c4\uc2dc='+aiCity+', \uae30\uac04='+aiDays+'\ubc15'+total+'\uc77c, \uc2a4\ud0c0\uc77c='+aiStyle+', \ub3d9\ud589='+aiPeople+', \uad00\uc2ec\uc0ac='+(interests.join(', ')||'\uc804\ubc18\uc801 \uad00\uad11'),
    '',
    '\uaddc\uce59: days \ubc30\uc5f4\uc5d0 '+total+'\uac1c day \uac1d\uccb4, \uac01 day\uc5d0 5~6\uac1c \uc7a5\uc18c, \uc7a5\uc18c\uba85\uc740 \ud55c\uad6d\uc5b4, time\uc740 HH:MM, tip\uc740 \uc2e4\uc6a9\uc801 \uaf00\ud301 1~2\ubb38\uc7a5',
    '',
    '\ud615\uc2dd(JSON\ub9cc, \ub2e4\ub978 \ud14d\uc2a4\ud2b8 \uc5c6\uc774): {"days":[{"label":"\ud14c\ub9c8","places":[{"name":"\uc7a5\uc18c\uba85","time":"09:00","tip":"\uaf00\ud301"}]}]}'
  ];
  var prompt=promptParts.join('\n');
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2500,messages:[{role:'user',content:prompt}]})
    });
    if(!res.ok)throw new Error('api '+res.status);
    var data=await res.json();
    if(data.error)throw new Error(data.error.message);
    var text=(data.content||[]).map(function(b){return b.text||'';}).join('');
    var days=null;
    try{
      var clean=text.replace(/\u0060\u0060\u0060json\n?|\u0060\u0060\u0060/g,'').trim();
      days=JSON.parse(clean).days;
    }catch(e){
      var match=text.match(/\{[\s\S]*"days"[\s\S]*\}/);
      if(match)try{days=JSON.parse(match[0]).days;}catch(e2){}
    }
    if(days&&days.length){buildTriResult(days,aiCity,aiDays,aiStyle,aiPeople);}
    else throw new Error('parse failed');
  }catch(e){
    console.warn('AI fallback:',e.message);
    var fb=AI_DB[aiCity]||AI_DB['\ub3c4\ucfc4'];
    var sliced=fb.slice(0,total).map(function(d){
      return{label:d.label,places:d.places.map(function(p){return Object.assign({},p);})};
    });
    while(sliced.length<total){
      var fi=sliced.length%fb.length;
      sliced.push({
        label:fb[fi].label+' ('+(sliced.length+1)+'\uc77c\ucc28)',
        places:fb[fi].places.map(function(p){return Object.assign({},p);})
      });
    }
    buildTriResult(sliced,aiCity,aiDays,aiStyle,aiPeople);
  }
  btn.disabled=false;btn.textContent='AI \ub9de\ucda4 \uc77c\uc815 \uc0dd\uc131\ud558\uae30';
}
})();
