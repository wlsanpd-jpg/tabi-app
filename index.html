<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TABI — 일본 여행</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e0f;
  --surface: #181819;
  --surface2: #212123;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0ede8;
  --text2: #9e9b96;
  --text3: #5a5855;
  --accent: #e85d3a;
  --accent2: #ff8060;
  --gold: #d4a843;
  --gold2: #f5c96a;
  --green: #5aad7a;
  --blue: #4a8fcb;
  --r-sm: 12px; --r-md: 18px; --r-lg: 24px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
body::after { content:''; position:fixed; inset:0; z-index:9999; pointer-events:none; opacity:.02; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }
.app { max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }

/* HEADER */
header { position:sticky; top:0; z-index:100; background:rgba(14,14,15,0.94); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); padding:16px 20px 12px; }
.hrow1 { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.logo { display:flex; align-items:baseline; gap:10px; }
.logo-main { font-family:'Shippori Mincho',serif; font-size:26px; font-weight:700; letter-spacing:5px; color:var(--text); position:relative; }
.logo-main::after { content:''; position:absolute; bottom:-2px; left:0; right:0; height:1px; background:linear-gradient(90deg,var(--accent),transparent); }
.logo-sub { font-size:11px; color:var(--text3); letter-spacing:2px; font-weight:300; }
.status-pill { display:flex; align-items:center; gap:5px; background:var(--surface2); border:1px solid rgba(90,173,122,.35); border-radius:20px; padding:6px 12px; font-size:11px; color:var(--green); }
.status-dot { width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 5px var(--green); flex-shrink:0; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.search-row { display:flex; gap:8px; }
.sfield { flex:1; display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm); padding:0 14px; transition:border-color .2s; }
.sfield:focus-within { border-color:var(--border2); }
.sfield svg { opacity:.3; flex-shrink:0; }
.sfield input { background:none; border:none; outline:none; color:var(--text); font-size:13px; font-family:'Noto Sans KR',sans-serif; width:100%; padding:10px 0; }
.sfield input::placeholder { color:var(--text3); }
.sbtn { background:var(--accent); border:none; color:#fff; border-radius:var(--r-sm); padding:0 18px; font-size:13px; font-weight:500; cursor:pointer; font-family:'Noto Sans KR',sans-serif; transition:background .2s; white-space:nowrap; }
.sbtn:hover { background:var(--accent2); }

/* CITY TABS */
.city-row { display:flex; overflow-x:auto; background:var(--surface); border-bottom:1px solid var(--border); padding:0 20px; }
.city-row::-webkit-scrollbar { display:none; }
.city-btn { flex-shrink:0; background:none; border:none; color:var(--text3); font-size:12px; font-weight:500; letter-spacing:.5px; padding:12px 14px; cursor:pointer; font-family:'Noto Sans KR',sans-serif; position:relative; transition:color .2s; white-space:nowrap; }
.city-btn.active { color:var(--text); }
.city-btn.active::after { content:''; position:absolute; bottom:0; left:14px; right:14px; height:2px; background:var(--accent); border-radius:1px; }

/* CATEGORIES */
.cat-row { display:flex; gap:6px; padding:14px 20px; overflow-x:auto; }
.cat-row::-webkit-scrollbar { display:none; }
.cat-btn { flex-shrink:0; display:flex; align-items:center; gap:5px; background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm); padding:8px 14px; font-size:12px; color:var(--text2); cursor:pointer; font-family:'Noto Sans KR',sans-serif; transition:all .2s; white-space:nowrap; }
.cat-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.cat-btn:hover:not(.active) { border-color:var(--border2); color:var(--text); }

/* HERO */
.hero-section { padding:0 20px 20px; }
.hero-card { border-radius:var(--r-lg); overflow:hidden; position:relative; height:190px; cursor:pointer; box-shadow:0 8px 32px rgba(0,0,0,.5); transition:transform .25s; }
.hero-card:hover { transform:scale(1.01); }
.hero-bg { position:absolute; inset:0; background:linear-gradient(135deg,#1a0a0a 0%,#2d1a0e 40%,#1a1a2e 100%); }
.hero-pat { position:absolute; inset:0; opacity:.05; background-image:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 20.5V18H0v5h5v5H0v5h20v-2.5h-5v-5h5v-5h-5zm8.5 8V18H18v5h5v5h-5v5h20v-2.5h-5v-5h5v-5h-5z' fill='%23fff'/%3E%3C/svg%3E"); }
.hero-glow { position:absolute; inset:0; background:radial-gradient(ellipse at 70% 30%,rgba(232,93,58,.2) 0%,transparent 65%); }
.hero-img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:.4; }
.hero-emoji { position:absolute; top:18px; right:20px; font-size:54px; opacity:.65; }
.hero-content { position:absolute; bottom:0; left:0; right:0; padding:20px; background:linear-gradient(transparent,rgba(0,0,0,.78)); }
.hero-eye { display:inline-flex; align-items:center; gap:4px; background:var(--accent); border-radius:4px; font-size:9px; color:#fff; padding:3px 8px; letter-spacing:1.5px; font-weight:600; margin-bottom:8px; }
.hero-title { font-family:'Shippori Mincho',serif; font-size:22px; font-weight:700; color:#fff; line-height:1.2; }
.hero-sub { font-size:11px; color:rgba(255,255,255,.55); margin-top:3px; }
.hero-rating { display:flex; align-items:center; gap:6px; margin-top:8px; }
.hero-stars { display:flex; gap:1px; }
.hero-star { font-size:12px; color:var(--gold); }
.hero-rnum { font-size:13px; font-weight:700; color:#fff; }
.hero-rcnt { font-size:11px; color:rgba(255,255,255,.5); }

/* SECTION LABEL */
.sec-label { display:flex; align-items:center; justify-content:space-between; padding:0 20px 12px; }
.sec-title { font-family:'Shippori Mincho',serif; font-size:17px; font-weight:600; }
.sec-count { font-size:11px; color:var(--text3); }

/* PLACE CARD */
.places-list { padding:0 20px; display:flex; flex-direction:column; gap:10px; }
.pcard { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-md); padding:16px; display:flex; gap:14px; cursor:pointer; transition:all .2s; animation:fadeUp .4s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.pcard:hover { border-color:var(--border2); background:var(--surface2); transform:translateY(-1px); box-shadow:0 8px 24px rgba(0,0,0,.3); }
.pthumb { width:76px; height:76px; border-radius:var(--r-sm); background:var(--surface2); flex-shrink:0; overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:30px; border:1px solid var(--border); }
.pthumb img { width:100%; height:100%; object-fit:cover; }
.pbody { flex:1; min-width:0; }
.pname { font-size:14px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
.ptype { font-size:10px; color:var(--text3); letter-spacing:.5px; margin-bottom:7px; }
.rrow { display:flex; align-items:center; gap:6px; margin-bottom:7px; }
.smini { display:flex; gap:1px; }
.s { font-size:11px; color:var(--text3); }
.s.on { color:var(--gold); }
.rnum { font-size:13px; font-weight:700; color:var(--text); }
.rcnt { font-size:10px; color:var(--text3); }
.tags { display:flex; gap:4px; flex-wrap:wrap; }
.tag { font-size:10px; padding:3px 8px; border-radius:6px; background:var(--surface2); color:var(--text2); border:1px solid var(--border); }
.tag.open { color:var(--green); border-color:rgba(90,173,122,.25); background:rgba(90,173,122,.08); }
.tag.closed { color:var(--accent); border-color:rgba(232,93,58,.2); background:rgba(232,93,58,.07); }
.tag.gold { color:var(--gold); border-color:rgba(212,168,67,.25); background:rgba(212,168,67,.08); }
.pright { display:flex; flex-direction:column; align-items:flex-end; gap:8px; flex-shrink:0; }
.sbtn2 { background:none; border:none; cursor:pointer; font-size:18px; color:var(--text3); transition:color .2s; padding:2px; line-height:1; }
.sbtn2.on { color:var(--accent); }
.tipbadge { font-size:9px; color:var(--text3); background:var(--surface2); border:1px solid var(--border); border-radius:4px; padding:2px 6px; text-align:center; line-height:1.4; max-width:58px; }

/* LOADING / EMPTY */
.loading-wrap { padding:60px 20px; text-align:center; }
.spinner { width:32px; height:32px; border:2px solid var(--surface2); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 12px; }
@keyframes spin { to{transform:rotate(360deg)} }
.ltxt { font-size:12px; color:var(--text3); }
.empty { padding:60px 20px; text-align:center; }
.eicon { font-size:44px; margin-bottom:12px; }
.etxt { font-size:13px; color:var(--text3); }

/* DETAIL */
.detail { position:fixed; inset:0; z-index:150; background:var(--bg); overflow-y:auto; transform:translateX(100%); transition:transform .35s cubic-bezier(.4,0,.2,1); }
.detail.open { transform:translateX(0); }
.dnav { position:sticky; top:0; z-index:10; background:rgba(14,14,15,.9); backdrop-filter:blur(16px); border-bottom:1px solid var(--border); padding:14px 20px; display:flex; align-items:center; gap:12px; }
.backbtn { background:none; border:1px solid var(--border); border-radius:8px; color:var(--text2); cursor:pointer; width:34px; height:34px; display:flex; align-items:center; justify-content:center; font-size:16px; transition:all .2s; }
.backbtn:hover { border-color:var(--border2); color:var(--text); }
.dnavtitle { font-size:14px; font-weight:500; color:var(--text); }
.dhero { width:100%; height:210px; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:80px; overflow:hidden; position:relative; }
.dhero img { width:100%; height:100%; object-fit:cover; }
.dhero-fade { position:absolute; bottom:0; left:0; right:0; height:80px; background:linear-gradient(transparent,var(--bg)); pointer-events:none; }
.dbody { padding:20px; }
.dname { font-family:'Shippori Mincho',serif; font-size:24px; font-weight:700; margin-bottom:4px; }
.dtype { font-size:11px; color:var(--text3); letter-spacing:.5px; margin-bottom:18px; }
.drating { display:flex; align-items:center; gap:16px; background:var(--surface); border:1px solid var(--border); border-radius:var(--r-md); padding:16px 20px; margin-bottom:16px; }
.dbignum { font-family:'Shippori Mincho',serif; font-size:42px; font-weight:700; line-height:1; }
.dright { flex:1; }
.dstars { display:flex; gap:3px; margin-bottom:3px; }
.dstar { font-size:15px; color:var(--gold); }
.dstar.off { color:var(--text3); }
.drev { font-size:11px; color:var(--text3); }
.dgrid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
.dcell { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm); padding:13px 14px; }
.dclabel { font-size:9px; color:var(--text3); letter-spacing:1px; text-transform:uppercase; margin-bottom:5px; }
.dcval { font-size:13px; color:var(--text); font-weight:500; line-height:1.4; }
.dtips-title { font-size:11px; color:var(--text3); letter-spacing:.5px; text-transform:uppercase; margin-bottom:10px; }
.dtip { display:flex; gap:10px; align-items:flex-start; background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm); padding:12px; margin-bottom:8px; }
.dtip-icon { font-size:16px; flex-shrink:0; }
.dtip-txt { font-size:12px; color:var(--text2); line-height:1.6; }
.dactions { display:flex; flex-direction:column; gap:8px; margin-top:18px; }
.dbtn { width:100%; padding:14px; border-radius:var(--r-sm); border:none; font-size:14px; font-weight:600; cursor:pointer; font-family:'Noto Sans KR',sans-serif; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:7px; }
.dbtn.p { background:var(--accent); color:#fff; }
.dbtn.p:hover { background:var(--accent2); }
.dbtn.s { background:var(--surface); color:var(--text); border:1px solid var(--border2); }
.dbtn.s:hover { background:var(--surface2); }
</style>
</head>
<body>
<div class="app">

<header>
  <div class="hrow1">
    <div class="logo">
      <span class="logo-main">TABI</span>
      <span class="logo-sub">旅 · 일본 여행 가이드</span>
    </div>
    <div class="status-pill">
      <span class="status-dot"></span>
      <span>Google API 연결됨</span>
    </div>
  </div>
  <div class="search-row">
    <div class="sfield">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="장소, 지역, 키워드 검색..." onkeydown="if(event.key==='Enter')doSearch()">
    </div>
    <button class="sbtn" onclick="doSearch()">검색</button>
  </div>
</header>

<div class="city-row">
  <button class="city-btn active" onclick="setCity(this,'도쿄','Tokyo Japan')">도쿄</button>
  <button class="city-btn" onclick="setCity(this,'오사카','Osaka Japan')">오사카</button>
  <button class="city-btn" onclick="setCity(this,'교토','Kyoto Japan')">교토</button>
  <button class="city-btn" onclick="setCity(this,'후쿠오카','Fukuoka Japan')">후쿠오카</button>
  <button class="city-btn" onclick="setCity(this,'삿포로','Sapporo Japan')">삿포로</button>
  <button class="city-btn" onclick="setCity(this,'나라','Nara Japan')">나라</button>
  <button class="city-btn" onclick="setCity(this,'가마쿠라','Kamakura Japan')">가마쿠라</button>
</div>

<div class="cat-row">
  <button class="cat-btn active" onclick="setCat(this,'tourist_attraction')">🏛 관광명소</button>
  <button class="cat-btn" onclick="setCat(this,'restaurant')">🍣 맛집</button>
  <button class="cat-btn" onclick="setCat(this,'cafe')">☕ 카페</button>
  <button class="cat-btn" onclick="setCat(this,'lodging')">🏨 숙박</button>
  <button class="cat-btn" onclick="setCat(this,'shopping_mall')">🛍 쇼핑</button>
  <button class="cat-btn" onclick="setCat(this,'park')">🌸 공원·자연</button>
  <button class="cat-btn" onclick="setCat(this,'museum')">🎌 박물관</button>
  <button class="cat-btn" onclick="setCat(this,'amusement_park')">🎢 테마파크</button>
  <button class="cat-btn" onclick="setCat(this,'spa')">♨️ 온천</button>
</div>

<div id="mainContent" style="flex:1;padding-bottom:32px"></div>
</div>

<!-- DETAIL -->
<div class="detail" id="detailPanel">
  <div class="dnav">
    <button class="backbtn" onclick="closeDetail()">←</button>
    <span class="dnavtitle" id="dNavTitle">장소 상세</span>
  </div>
  <div class="dhero" id="dHero"><div class="dhero-fade"></div></div>
  <div class="dbody" id="dBody"></div>
</div>

<script>
// ── Vercel 프록시 주소 ──
const PROXY = 'https://v0-wlsanpd.vercel.app';

let city='도쿄', cityEn='Tokyo Japan', cat='tourist_attraction';
let saved = JSON.parse(localStorage.getItem('tabi_saved')||'[]');
let _places = [];

const catLabel = { tourist_attraction:'관광명소', restaurant:'맛집', cafe:'카페', lodging:'숙박', shopping_mall:'쇼핑', park:'공원·자연', museum:'박물관', amusement_park:'테마파크', spa:'온천·스파' };
const catEmoji = { tourist_attraction:'🏛', restaurant:'🍣', cafe:'☕', lodging:'🏨', shopping_mall:'🛍', park:'🌸', museum:'🎌', amusement_park:'🎢', spa:'♨️' };

function setCity(btn,c,en){
  document.querySelectorAll('.city-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); city=c; cityEn=en; load();
}
function setCat(btn,c){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); cat=c; load();
}
function doSearch(){
  const q=document.getElementById('searchInput').value.trim();
  if(!q)return;
  fetchPlaces(q+' Japan',null);
}

function load(){ fetchPlaces(`${cityEn} ${catLabel[cat]}`, cat); }

async function fetchPlaces(query, type){
  showLoading();
  try {
    const params = new URLSearchParams({ query, language:'ko' });
    if(type) params.append('type', type);
    const res = await fetch(`${PROXY}/api/places?${params}`);
    const data = await res.json();
    if(!data.results?.length){ showEmpty(); return; }
    _places = data.results.map(r=>({
      name: r.name,
      addr: r.formatted_address,
      rating: r.rating,
      cnt: r.user_ratings_total,
      open: r.opening_hours?.open_now,
      icon: catEmoji[cat]||'📍',
      types: r.types?.slice(0,3)||[],
      photo_ref: r.photos?.[0]?.photo_reference,
      place_id: r.place_id,
      url: `https://maps.google.com/?cid=${r.place_id}`,
    }));
    renderList(_places);
  } catch(e) {
    console.error(e);
    showError();
  }
}

function showLoading(){
  document.getElementById('mainContent').innerHTML=`<div class="loading-wrap"><div class="spinner"></div><div class="ltxt">${city} 정보를 불러오는 중...</div></div>`;
}
function showEmpty(){
  document.getElementById('mainContent').innerHTML=`<div class="empty"><div class="eicon">🔍</div><div class="etxt">검색 결과가 없습니다.</div></div>`;
}
function showError(){
  document.getElementById('mainContent').innerHTML=`<div class="empty"><div class="eicon">⚠️</div><div class="etxt">데이터를 불러오지 못했어요.<br>잠시 후 다시 시도해 주세요.</div></div>`;
}

function photoUrl(ref, size=400){
  if(!ref) return null;
  return `${PROXY}/api/photo?photo_reference=${ref}&maxwidth=${size}`;
}

function renderList(places){
  if(!places.length){showEmpty();return;}
  const first=places[0];
  const pUrl = first.photo_ref ? photoUrl(first.photo_ref, 480) : null;

  const heroSection=`
    <div class="hero-section">
      <div class="hero-card" onclick="openDetail(0)">
        <div class="hero-bg"></div>
        <div class="hero-pat"></div>
        <div class="hero-glow"></div>
        ${pUrl?`<img class="hero-img" src="${pUrl}" alt="${first.name}">`:''}
        ${!pUrl?`<div class="hero-emoji">${first.icon||catEmoji[cat]||'🗾'}</div>`:''}
        <div class="hero-content">
          <div class="hero-eye">✦ ${catLabel[cat]||'추천'}</div>
          <div class="hero-title">${first.name}</div>
          <div class="hero-sub">${first.addr||''}</div>
          ${first.rating?`
          <div class="hero-rating">
            <div class="hero-stars">${mkStars(first.rating)}</div>
            <span class="hero-rnum">${first.rating}</span>
            <span class="hero-rcnt">(${(first.cnt||0).toLocaleString()}건)</span>
          </div>`:''}
        </div>
      </div>
    </div>`;

  const listHTML = places.slice(1).map((p,i)=>cardHTML(p,i+1)).join('');

  document.getElementById('mainContent').innerHTML=`
    ${heroSection}
    <div class="sec-label">
      <span class="sec-title">${city} · ${catLabel[cat]}</span>
      <span class="sec-count">${places.length}곳</span>
    </div>
    <div class="places-list">${listHTML}</div>`;
}

function cardHTML(p,i){
  const isSaved=saved.includes(p.name);
  const openTag=p.open===true?'<span class="tag open">영업중</span>':p.open===false?'<span class="tag closed">영업종료</span>':'';
  const pUrl = p.photo_ref ? photoUrl(p.photo_ref, 120) : null;
  let thumb = pUrl
    ? `<div class="pthumb"><img src="${pUrl}" alt="${p.name}" onerror="this.parentElement.innerHTML='${p.icon||'📍'}'"></div>`
    : `<div class="pthumb">${p.icon||catEmoji[cat]||'📍'}</div>`;
  return `
  <div class="pcard" style="animation-delay:${(i%8)*.05}s" onclick="openDetail(${i})">
    ${thumb}
    <div class="pbody">
      <div class="pname">${p.name}</div>
      <div class="ptype">${(p.types||[]).join(' · ')}</div>
      <div class="rrow">
        <div class="smini">${mkStars(p.rating)}</div>
        <span class="rnum">${p.rating||'—'}</span>
        <span class="rcnt">${p.cnt?'('+p.cnt.toLocaleString()+'건)':''}</span>
      </div>
      <div class="tags">${openTag}</div>
    </div>
    <div class="pright">
      <button class="sbtn2 ${isSaved?'on':''}" onclick="event.stopPropagation();toggleSave('${p.name.replace(/'/g,"\\'")}',this)">${isSaved?'♥':'♡'}</button>
    </div>
  </div>`;
}

function mkStars(r){
  if(!r)return`<span style="font-size:10px;color:var(--text3)">평점없음</span>`;
  return Array.from({length:5},(_,i)=>`<span class="s ${r>=i+1?'on':''}">★</span>`).join('');
}

function openDetail(idx){
  const p=_places[idx]; if(!p)return;
  document.getElementById('dNavTitle').textContent=p.name;
  const hero=document.getElementById('dHero');
  const pUrl = p.photo_ref ? photoUrl(p.photo_ref, 480) : null;
  if(pUrl){
    hero.innerHTML=`<img src="${pUrl}" alt="${p.name}"><div class="dhero-fade"></div>`;
    hero.style.fontSize='';
  } else {
    hero.innerHTML=`${p.icon||catEmoji[cat]||'🗾'}<div class="dhero-fade"></div>`;
    hero.style.fontSize='80px';
  }
  const starsH=p.rating?Array.from({length:5},(_,i)=>`<span class="dstar ${p.rating>=i+1?'':'off'}">★</span>`).join(''):'';
  const gurl=p.url||`https://maps.google.com/?q=${encodeURIComponent(p.name)}`;
  const nurl=`https://map.naver.com/v5/search/${encodeURIComponent(p.name+' '+city)}`;
  document.getElementById('dBody').innerHTML=`
    <div class="dname">${p.name}</div>
    <div class="dtype">${(p.types||[]).join(' · ')}</div>
    ${p.rating?`
    <div class="drating">
      <div class="dbignum">${p.rating}</div>
      <div class="dright">
        <div class="dstars">${starsH}</div>
        <div class="drev">리뷰 ${(p.cnt||0).toLocaleString()}건 · Google 기준</div>
      </div>
    </div>`:''}
    <div class="dgrid">
      <div class="dcell"><div class="dclabel">📍 주소</div><div class="dcval">${p.addr||'정보없음'}</div></div>
      <div class="dcell"><div class="dclabel">🕐 영업</div><div class="dcval" style="color:${p.open===true?'var(--green)':p.open===false?'var(--accent)':'var(--text2)'}">
        ${p.open===true?'🟢 영업중':p.open===false?'🔴 영업종료':'정보없음'}
      </div></div>
    </div>
    <div class="dactions">
      <button class="dbtn p" onclick="window.open('${gurl}','_blank')">🗺 Google 지도에서 보기</button>
      <button class="dbtn s" onclick="window.open('${nurl}','_blank')">🟢 네이버 지도 검색</button>
    </div>`;
  document.getElementById('detailPanel').classList.add('open');
}
function closeDetail(){ document.getElementById('detailPanel').classList.remove('open'); }

function toggleSave(name,btn){
  const i=saved.indexOf(name);
  if(i===-1){saved.push(name);btn.textContent='♥';btn.classList.add('on');}
  else{saved.splice(i,1);btn.textContent='♡';btn.classList.remove('on');}
  localStorage.setItem('tabi_saved',JSON.stringify(saved));
}

window.onload=()=>load();
</script>
</body>
</html>
