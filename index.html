<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TABI</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f8f8f6;--white:#fff;--sf:#f2f1ef;--sf2:#e8e7e4;
  --bd:#e4e3e0;--bd2:#d0cfc9;
  --tx:#1a1a18;--tx2:#6b6a66;--tx3:#a8a7a2;
  --ac:#00c896;--ac2:#00b085;--acbg:#e6faf5;
  --red:#ff4757;--gold:#f0a500;
  --klook:#f4452a;--mrt:#ff6b35;
  --nav:58px;--safe:env(safe-area-inset-bottom);
  --f:"Noto Sans KR",sans-serif;--fd:"Playfair Display",serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;-webkit-font-smoothing:antialiased;}
body{font-family:var(--f);background:var(--bg);color:var(--tx);}
.app{max-width:480px;margin:0 auto;height:100%;background:var(--white);}
.page{display:none;flex-direction:column;height:100vh;overflow:hidden;}
.page.active{display:flex;}
button,a{font-family:var(--f);}
::-webkit-scrollbar{display:none;}
img{display:block;}

/* HEADER */
.hd{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);}
.hd-inner{display:flex;align-items:center;gap:10px;padding:12px 16px 10px;}
.logo{font-family:var(--fd);font-size:24px;font-weight:900;color:var(--tx);flex:1;}
.logo span{color:var(--ac);}
.logo-sub{font-size:10px;color:var(--tx3);font-weight:400;letter-spacing:.5px;margin-top:1px;}
.hd-srch-btn{width:36px;height:36px;border-radius:50%;background:var(--sf);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx2);}
.hd-status{display:flex;align-items:center;gap:4px;background:var(--acbg);border-radius:20px;padding:4px 10px;font-size:10px;font-weight:700;color:var(--ac2);}
.hd-dot{width:5px;height:5px;border-radius:50%;background:var(--ac);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.srch-bar{background:var(--white);border-bottom:1px solid var(--bd);padding:8px 16px 10px;display:flex;gap:8px;}
.srch-bar.hidden{display:none;}
.sfield{flex:1;display:flex;align-items:center;gap:8px;background:var(--sf);border:1.5px solid var(--bd);border-radius:24px;padding:0 14px;transition:border-color .2s;}
.sfield:focus-within{border-color:var(--ac);background:var(--white);}
.sfield svg{color:var(--tx3);flex-shrink:0;}
.sfield input{background:none;border:none;outline:none;color:var(--tx);font-size:14px;font-family:var(--f);width:100%;padding:9px 0;}
.sfield input::placeholder{color:var(--tx3);}
.s-go{background:var(--ac);border:none;color:#fff;border-radius:24px;padding:0 18px;height:40px;font-size:13px;font-weight:800;cursor:pointer;}
.s-cancel{background:none;border:none;color:var(--tx2);font-size:13px;font-weight:700;cursor:pointer;padding:0 4px;}

/* CITY / CAT */
.city-row{display:flex;overflow-x:auto;background:var(--white);border-bottom:1px solid var(--bd);padding:0 12px;}
.city-btn{flex-shrink:0;background:none;border:none;color:var(--tx3);font-size:13px;font-weight:700;padding:10px 8px 8px;cursor:pointer;font-family:var(--f);position:relative;transition:color .15s;white-space:nowrap;}
.city-btn.on{color:var(--ac);}
.city-btn.on::after{content:"";position:absolute;bottom:0;left:4px;right:4px;height:2.5px;background:var(--ac);border-radius:2px;}
.cat-row{display:flex;gap:7px;overflow-x:auto;padding:10px 16px 8px;background:var(--white);border-bottom:1px solid var(--bd);}
.cat-btn{flex-shrink:0;background:var(--sf);border:1.5px solid var(--bd);border-radius:20px;padding:6px 13px;font-size:12px;font-weight:700;color:var(--tx2);cursor:pointer;white-space:nowrap;transition:all .15s;font-family:var(--f);}
.cat-btn.on{background:var(--tx);border-color:var(--tx);color:#fff;}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* BOOKING STRIP */
.bk-strip{background:var(--white);border-bottom:1px solid var(--bd);}
.bk-strip-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;}
.bk-strip-lbl{font-size:13px;font-weight:800;color:var(--tx);}
.bk-strip-badge{font-size:10px;font-weight:700;color:var(--ac);background:var(--acbg);border-radius:4px;padding:2px 7px;}
.bk-list{display:flex;gap:10px;padding:0 16px 14px;overflow-x:auto;}
.bk-card{flex-shrink:0;width:148px;background:var(--sf);border-radius:14px;overflow:hidden;cursor:pointer;border:1.5px solid var(--bd);transition:transform .2s;}
.bk-card:hover{transform:translateY(-2px);}
.bk-card-img{height:74px;background:linear-gradient(135deg,#e8f5e9,#e3f2fd);display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;}
.bk-plat{position:absolute;top:5px;right:5px;font-size:9px;font-weight:800;color:#fff;padding:2px 5px;border-radius:3px;}
.bk-plat.kl{background:var(--klook);}.bk-plat.mr{background:var(--mrt);}
.bk-body{padding:8px 10px 10px;}
.bk-nm{font-size:11px;font-weight:700;color:var(--tx);line-height:1.35;margin-bottom:3px;}
.bk-price{font-size:12px;font-weight:900;color:var(--ac);}
.bk-comm{font-size:9px;font-weight:700;color:var(--gold);margin-top:2px;}

/* SECTION HEAD */
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:18px 16px 12px;background:var(--white);}
.sec-title{font-size:18px;font-weight:900;color:var(--tx);}
.sec-count{font-size:12px;color:var(--tx3);}

/* PLACE CARD */
.place-list{display:flex;flex-direction:column;}
.pc{background:var(--white);border-bottom:1px solid var(--bd);cursor:pointer;animation:fadeUp .3s cubic-bezier(.16,1,.3,1) both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.pc:active{background:var(--sf);}
.pc-img{width:100%;height:200px;background:var(--sf2);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:56px;}
.pc-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s;}
.pc:hover .pc-img img{transform:scale(1.03);}
.pc-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0) 50%,rgba(0,0,0,.35) 100%);}
.pc-rank{position:absolute;top:12px;left:12px;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);color:#fff;font-size:11px;font-weight:800;padding:4px 9px;border-radius:6px;}
.pc-badge{position:absolute;bottom:12px;left:12px;background:rgba(255,255,255,.92);color:var(--tx);font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;}
.pc-heart{position:absolute;top:10px;right:10px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.9);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--tx3);box-shadow:0 2px 8px rgba(0,0,0,.12);}
.pc-heart.on{color:var(--red);}
.pc-info{padding:13px 16px 8px;}
.pc-name{font-size:17px;font-weight:800;color:var(--tx);margin-bottom:4px;letter-spacing:-.3px;line-height:1.25;}
.pc-addr{font-size:12px;color:var(--tx3);margin-bottom:9px;}
.pc-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.pc-stars{display:flex;gap:1px;}
.pc-star{font-size:11px;color:var(--bd2);}.pc-star.on{color:var(--gold);}
.pc-rnum{font-size:13px;font-weight:800;color:var(--tx);}
.pc-rcnt{font-size:11px;color:var(--tx3);}
.pc-sep{width:1px;height:11px;background:var(--bd2);}
.pc-open{font-size:11px;font-weight:700;color:var(--ac);}
.pc-closed{font-size:11px;font-weight:700;color:var(--red);}
.pc-cta{display:flex;border-top:1.5px solid var(--bd);margin-top:10px;}
.pc-cta a{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:11px 6px;text-decoration:none;font-size:12px;font-weight:800;font-family:var(--f);color:var(--tx2);}
.pc-cta a+a{border-left:1.5px solid var(--bd);}
.pc-cta a.kl{color:var(--klook);}
.pc-cta a.mr{color:var(--mrt);}

/* LOADING / EMPTY */
.loading{padding:80px 20px;text-align:center;}
.spinner{width:32px;height:32px;border:3px solid var(--bd2);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-size:13px;color:var(--tx3);}
.empty{padding:80px 20px;text-align:center;}
.etxt{font-size:13px;color:var(--tx3);line-height:1.7;}

/* BOTTOM NAV */
.bot-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:300;background:rgba(255,255,255,.97);backdrop-filter:blur(20px);border-top:1px solid var(--bd);display:flex;align-items:stretch;height:calc(var(--nav) + var(--safe));padding-bottom:var(--safe);}
.nav-it{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;font-family:var(--f);font-size:10px;font-weight:700;color:var(--tx3);transition:color .15s;padding-top:6px;}
.nav-it.on{color:var(--ac);}
.nav-ic{font-size:22px;line-height:1;position:relative;}
.nav-badge{position:absolute;top:-4px;right:-6px;background:var(--red);color:#fff;font-size:9px;font-weight:800;border-radius:10px;padding:1px 5px;min-width:16px;text-align:center;display:none;line-height:1.4;}
.nav-badge.show{display:block;}

/* AI PAGE */
.ai-pg{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;}
.ai-hero{padding:28px 20px 24px;background:linear-gradient(160deg,#0a1628,#1a2d1a 50%,#0a2018);position:relative;overflow:hidden;}
.ai-hero::before{content:"";position:absolute;right:-30px;top:-30px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(0,200,150,.15),transparent 70%);}
.ai-hero-sub{font-size:11px;font-weight:700;color:var(--ac);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;}
.ai-hero-title{font-family:var(--fd);font-size:28px;font-weight:900;color:#fff;line-height:1.2;margin-bottom:6px;}
.ai-hero-title em{color:var(--ac);font-style:italic;}
.ai-hero-desc{font-size:13px;color:rgba(255,255,255,.6);line-height:1.65;}
.ai-form{margin:16px;background:var(--white);border-radius:16px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.07);border:1px solid var(--bd);}
.ai-sec{padding:16px 16px 0;}
.ai-lbl{font-size:10px;font-weight:800;color:var(--tx3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:7px;display:block;}
.ai-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.ai-sel{width:100%;background:var(--sf);border:1.5px solid var(--bd);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--tx);font-family:var(--f);font-weight:600;outline:none;appearance:none;}
.ai-sel:focus{border-color:var(--ac);}
.ai-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.ai-chip{background:var(--sf);border:1.5px solid var(--bd);border-radius:20px;padding:6px 12px;font-size:12px;font-weight:700;color:var(--tx2);cursor:pointer;font-family:var(--f);}
.ai-chip.on{background:var(--tx);border-color:var(--tx);color:#fff;}
.ai-gen{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--ac);color:#fff;border:none;padding:16px;font-size:15px;font-weight:900;cursor:pointer;font-family:var(--f);}
.ai-gen:hover{background:var(--ac2);}
.ai-gen:disabled{opacity:.5;cursor:not-allowed;}

/* AI RESULT */
.tri-wrap{margin:16px;}
.tri-card{background:var(--white);border-radius:16px;overflow:hidden;border:1px solid var(--bd);box-shadow:0 2px 16px rgba(0,0,0,.07);}
.tri-top{padding:20px 18px 16px;background:linear-gradient(135deg,#0a1628,#1a2d1a);text-align:center;border-bottom:1px solid var(--bd);}
.tri-em{font-size:40px;margin-bottom:10px;}
.tri-title{font-family:var(--fd);font-size:20px;color:#fff;font-weight:700;margin-bottom:4px;line-height:1.3;}
.tri-title em{color:var(--ac);font-style:italic;}
.tri-sub{font-size:12px;color:rgba(255,255,255,.5);}
.tri-map{height:220px;position:relative;overflow:hidden;background:#e8eaf0;}
.tri-map iframe{width:100%;height:100%;border:none;display:block;}
.tri-map-pins{position:absolute;inset:0;pointer-events:none;}
.tri-pin{position:absolute;transform:translate(-50%,-50%);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;z-index:2;box-shadow:0 2px 8px rgba(0,0,0,.25);border:2px solid rgba(255,255,255,.8);pointer-events:all;cursor:pointer;}
.tri-pin:hover{transform:translate(-50%,-50%) scale(1.2);}
.tri-daytabs{display:flex;gap:6px;padding:12px 14px;border-bottom:1px solid var(--bd);overflow-x:auto;}
.tri-daytab{flex-shrink:0;padding:7px 18px;border-radius:20px;font-size:12px;font-weight:800;cursor:pointer;border:1.5px solid var(--bd2);background:var(--white);color:var(--tx3);font-family:var(--f);}
.tri-daytab.on{background:var(--tx);border-color:var(--tx);color:#fff;}
.tri-places{padding:4px 0;}
.tri-day-hd{display:flex;align-items:center;gap:8px;padding:12px 16px 8px;}
.tri-day-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;}
.tri-day-lbl{font-size:14px;font-weight:800;color:var(--tx);}
.tri-place-row{display:flex;gap:12px;padding:10px 16px 10px 46px;position:relative;transition:background .12s;}
.tri-place-row:hover{background:var(--sf);}
.tri-place-row::before{content:"";position:absolute;left:26px;top:0;bottom:0;width:1.5px;background:var(--bd2);}
.tri-place-row:last-child::before{height:50%;}
.tri-place-ic{width:50px;height:50px;border-radius:12px;flex-shrink:0;background:var(--sf2);display:flex;align-items:center;justify-content:center;font-size:22px;border:1px solid var(--bd);}
.tri-place-body{flex:1;min-width:0;}
.tri-place-name{font-size:14px;font-weight:800;color:var(--tx);margin-bottom:2px;}
.tri-place-tp{font-size:11px;color:var(--tx3);margin-bottom:4px;}
.tri-place-cm{font-size:11px;color:var(--ac2);font-weight:700;line-height:1.5;}
.tri-place-cm::before{content:"Tip. ";}
.tri-place-time{font-size:10px;color:var(--tx3);margin-top:3px;}
.tri-footer{border-top:1px solid var(--bd);}
.tri-tip{padding:14px 16px;background:var(--acbg);}
.tri-tip-title{font-size:11px;font-weight:900;color:var(--ac2);margin-bottom:6px;}
.tri-tip-item{font-size:12px;color:var(--tx2);line-height:1.65;margin-bottom:2px;}
.tri-budget{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--bd);}
.tri-bud-lbl{font-size:11px;color:var(--tx3);font-weight:600;}
.tri-bud-val{font-size:14px;font-weight:900;color:var(--tx);}
.tri-acts{display:flex;gap:8px;padding:12px 16px 14px;border-top:1px solid var(--bd);}
.tri-act{flex:1;padding:12px;border-radius:10px;border:none;font-size:13px;font-weight:800;cursor:pointer;font-family:var(--f);}
.tri-act.p{background:var(--ac);color:#fff;}
.tri-act.s{background:var(--sf);color:var(--tx);border:1.5px solid var(--bd2);}
.tri-loading{padding:40px 20px;text-align:center;}
.tri-dots{display:flex;justify-content:center;gap:7px;margin-bottom:14px;}
.tri-dots span{width:9px;height:9px;border-radius:50%;background:var(--ac);animation:bounce .8s ease-in-out infinite;}
.tri-dots span:nth-child(2){animation-delay:.14s;}
.tri-dots span:nth-child(3){animation-delay:.28s;background:var(--bd2);}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}
.tri-ltxt{font-size:13px;color:var(--tx3);font-weight:600;}

/* SAVED */
.saved-hd{padding:24px 20px 16px;border-bottom:1px solid var(--bd);background:var(--white);}
.saved-hd-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.saved-title{font-family:var(--fd);font-size:24px;font-weight:900;color:var(--tx);}
.saved-clear{background:none;border:none;font-size:12px;font-weight:700;color:var(--tx3);cursor:pointer;font-family:var(--f);}
.saved-city-lbl{font-size:10px;font-weight:800;letter-spacing:.8px;color:var(--tx3);text-transform:uppercase;padding:16px 16px 8px;display:block;background:var(--bg);}
.saved-empty{padding:80px 20px;text-align:center;}
.saved-empty-ic{font-size:52px;margin-bottom:14px;opacity:.4;}
.saved-empty-tx{font-size:14px;color:var(--tx3);line-height:1.7;}

/* DETAIL */
.detail{position:fixed;inset:0;z-index:400;background:var(--white);overflow-y:auto;transform:translateX(100%);transition:transform .32s cubic-bezier(.16,1,.3,1);}
.detail.open{transform:translateX(0);}
.d-nav{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);padding:12px 16px;display:flex;align-items:center;gap:12px;}
.d-back{background:var(--sf);border:none;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--tx2);}
.d-nav-ttl{font-size:15px;font-weight:800;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.d-hero{width:100%;height:260px;background:var(--sf2);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:80px;}
.d-hero img{width:100%;height:100%;object-fit:cover;}
.d-hero-fade{position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(transparent,var(--white));}
.d-body{padding:0 0 120px;}
.d-title-sec{padding:16px 16px 14px;border-bottom:1px solid var(--bd);}
.d-name{font-family:var(--fd);font-size:24px;font-weight:900;color:var(--tx);letter-spacing:-.4px;margin-bottom:4px;line-height:1.2;}
.d-type{font-size:12px;color:var(--tx3);}
.d-rating-sec{padding:16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:16px;}
.d-big{font-family:var(--fd);font-size:48px;font-weight:900;color:var(--tx);line-height:1;}
.d-stars{display:flex;gap:2px;margin-bottom:3px;}
.d-star{font-size:16px;color:var(--gold);}.d-star.off{color:var(--bd2);}
.d-rcnt{font-size:12px;color:var(--tx3);}
.d-info-sec{padding:14px 16px;border-bottom:1px solid var(--bd);background:var(--bg);}
.d-info-lbl{font-size:10px;font-weight:800;color:var(--tx3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;}
.d-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.d-cell{background:var(--white);border-radius:12px;padding:11px 12px;border:1px solid var(--bd);}
.d-cell-lbl{font-size:9px;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;font-weight:800;}
.d-cell-val{font-size:13px;color:var(--tx);font-weight:700;line-height:1.4;}
.d-bk-sec{background:var(--white);border-bottom:1px solid var(--bd);}
.d-bk-hd{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;}
.d-bk-title{font-size:11px;font-weight:800;color:var(--tx2);letter-spacing:.5px;text-transform:uppercase;}
.d-bk-sub{font-size:10px;font-weight:800;color:var(--ac);}
.d-bk-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;border:none;background:none;width:100%;font-family:var(--f);}
.d-bk-row:hover{background:var(--sf);}
.d-bk-row:not(:last-child){border-bottom:1px solid var(--bd);}
.dbr-l{display:flex;align-items:center;gap:10px;}
.dbr-logo{width:48px;height:19px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:#fff;}
.dbr-logo.kl{background:var(--klook);}.dbr-logo.mr{background:var(--mrt);}
.dbr-nm{font-size:12px;font-weight:800;color:var(--tx);text-align:left;}
.dbr-dc{font-size:10px;color:var(--tx3);margin-top:1px;text-align:left;}
.dbr-price{font-size:13px;font-weight:900;color:var(--ac);}

// ── Init
function initUI() {
  var cityRow = document.getElementById('cityRow');
  cityRow.innerHTML = '';
  CITIES.forEach(function(c, i) {
    var btn = document.createElement('button');
    btn.className = 'city-btn' + (i === 0 ? ' on' : '');
    btn.textContent = c.kr;
    btn.addEventListener('click', function() {
      document.querySelectorAll('.city-btn').forEach(function(b){ b.classList.remove('on'); });

    var btn = document.createElement('button');

// ── Search
function doSearch() {
  var q = document.getElementById('srchInput').value.trim();
  if (!q) return;
  fetchPlaces(q + ' Japan', null);
  srchOpen = false;
  document.getElementById('srchBar').classList.add('hidden');

// ── Fetch
function load() { fetchPlaces(cityEn + ' ' + catLabel[cat], cat); }

async function fetchPlaces(query, type) {
  showLoading();
  try {
    var params = new URLSearchParams({query: query, language: 'ko'});
    if (type) params.append('type', type);
    var res  = await fetch(PROXY + '/api/places?' + params);
    var data = await res.json();
    if (!data.results || !data.results.length) { showEmpty(); return; }
    _places = data.results.map(function(r) {
      return {
        name:      r.name,
        addr:      r.formatted_address,
        rating:    r.rating,
        cnt:       r.user_ratings_total,
        open:      r.opening_hours && r.opening_hours.open_now,
        types:     (r.types || []).slice(0, 3),
        photo_ref: r.photos && r.photos[0] && r.photos[0].photo_reference,
        place_id:  r.place_id,
        url:       'https://maps.google.com/?cid=' + r.place_id
      };
    });
    renderList(_places);
  } catch(e) {
    console.error(e);
    showError();
  }
}

function photoUrl(ref, size) {
  if (!ref) return null;
  return PROXY + '/api/photo?photo_reference=' + ref + '&maxwidth=' + (size || 400);
}

function showLoading() {
  document.getElementById('mainContent').innerHTML =

}

}

// ── Stars
function mkStars(r) {
  if (!r) return '<span style="font-size:10px;color:var(--tx3)">평점없음</span>';
  var s = '';
  for (var i = 0; i < 5; i++)
    s += '<span class="pc-star' + (r >= i+1 ? ' on' : '') + '">★</span>';
  return s;
}

// ── Booking strip
function buildBkStrip(data) {
  if (!data || !data.length) return '';
  var html = '<div class="bk-strip"><div class="bk-strip-hd"><span class="bk-strip-lbl">예약 추천</span><span class="bk-strip-badge">제휴 할인</span></div><div class="bk-list">';
  data.forEach(function(b) {
    var div = document.createElement('div');
    div.className = 'bk-card';
    div.innerHTML =
      '<div class="bk-card-img"><span class="bk-plat ' + b.cls + '">' + b.logo + '</span></div>' +
      '<div class="bk-body"><div class="bk-nm">' + b.nm + '</div>' +
      '<div class="bk-price">' + b.pr + '</div>' +
      '<div class="bk-comm">' + b.cm + '</div></div>';
    div.addEventListener('click', function(){ window.open(b.url, '_blank'); });
    // We'll inject as HTML for now - serialize
    html += div.outerHTML;
  });
  html += '</div></div>';
  return html;
}

// ── CTA
function buildCTA(p) {
  var gurl = p.url || ('https://maps.google.com/?q=' + encodeURIComponent(p.name));
  var nurl = 'https://map.naver.com/v5/search/' + encodeURIComponent(p.name + ' ' + city);
  var bk = BKP[p.name];
  var html = '<div class="pc-cta">';
  if (bk && bk.length) {
    bk.slice(0, 2).forEach(function(b) {
      html += '<a class="' + b.cls + '" href="' + b.url + '" target="_blank">🔖 ' + b.logo + ' 예약</a>';
    });
  } else {
    html += '<a class="gm" href="' + gurl + '" target="_blank">🗺 Google 지도</a>';
    html += '<a class="gm" href="' + nurl + '" target="_blank">🆎 네이버</a>';
  }
  html += '</div>';
  return html;
}

// ── Render list
function renderList(places) {
  if (!places.length) { showEmpty(); return; }
  var strip    = buildBkStrip(CBK[city] || []);
  var secHead  = '<div class="sec-head"><span class="sec-title">' + city + ' ' + catLabel[cat] + '</span><span class="sec-count">' + places.length + '곳</span></div>';
  var cardsHtml = '';
  places.forEach(function(p, i) {
    var isSaved = saved.some(function(s){ return s.name === p.name; });
    var pUrl    = photoUrl(p.photo_ref, i === 0 ? 600 : 400);
    var stars   = mkStars(p.rating);
    var statusHtml = p.open === true  ? '<span class="pc-open">● 영업중</span>'
                   : p.open === false ? '<span class="pc-closed">● 영업종료</span>' : '';
    cardsHtml +=
      '<div class="pc" data-idx="' + i + '" style="animation-delay:' + ((i%8)*.05) + 's">' +
        '<div class="pc-img">' +
          (pUrl ? '<img src="' + pUrl + '" alt="' + p.name + '" loading="lazy" onerror="this.style.display='none'">' : '') +
          '<div class="pc-grad"></div>' +
          '<div class="pc-rank">#' + (i+1) + '</div>' +
          '<div class="pc-badge">' + ((p.types || [catLabel[cat]])[0]) + '</div>' +
          '<button class="pc-heart' + (isSaved ? ' on' : '') + '" data-idx="' + i + '" data-name="' + p.name.replace(/"/g,'&quot;') + '">' + (isSaved ? '♥' : '♡') + '</button>' +
        '</div>' +
        '<div class="pc-info">' +
          '<div class="pc-name">' + p.name + '</div>' +
          '<div class="pc-addr">' + (p.addr || '') + '</div>' +
          '<div class="pc-meta"><div class="pc-stars">' + stars + '</div>' +
          '<span class="pc-rnum">' + (p.rating || '&mdash;') + '</span>' +
          '<span class="pc-rcnt">' + (p.cnt ? '(' + p.cnt.toLocaleString() + '건)' : '') + '</span>' +
          (statusHtml ? '<span class="pc-sep"></span>' + statusHtml : '') +
          '</div>' +
        '</div>' +
        buildCTA(p) +
      '</div>';
  });

  var mc = document.getElementById('mainContent');
  mc.innerHTML = strip + secHead + '<div class="place-list">' + cardsHtml + '</div>';

  // Attach events via delegation
  mc.addEventListener('click', function(e) {
    // Heart button
    var heartBtn = e.target.closest('.pc-heart');
    if (heartBtn) {
      e.stopPropagation();
      var idx  = parseInt(heartBtn.dataset.idx);
      var name = heartBtn.dataset.name;
      toggleSC(name, heartBtn, idx);
      return;
    }
    // Card click
    var card = e.target.closest('.pc');
    if (card && !e.target.closest('a')) {
      var idx = parseInt(card.dataset.idx);
      openDetail(idx);
    }
  }, {once: true});
}

// ── Save
function toggleSC(name, btn, idx) {
  var place = _places[idx] || {name: name};
  var i = saved.findIndex(function(s){ return s.name === name; });
  if (i === -1) {
    saved.push({name: name, city: city, cat: cat, data: place});
    btn.innerHTML = '♥';
    btn.classList.add('on');
  } else {
    saved.splice(i, 1);
    btn.innerHTML = '♡';
    btn.classList.remove('on');
  }
  localStorage.setItem('tabi_saved', JSON.stringify(saved));
  updateBadge();
}
function toggleSD(name) {
  var i   = saved.findIndex(function(s){ return s.name === name; });
  var btn = document.getElementById('dHeartBtn');
  if (i === -1) {
    var place = _places.find(function(p){ return p.name === name; }) || {name: name};
    saved.push({name: name, city: city, cat: cat, data: place});
    if (btn) { btn.innerHTML = '♥ 저장됨'; btn.classList.add('on'); }
  } else {
    saved.splice(i, 1);
    if (btn) { btn.innerHTML = '♡ 저장하기'; btn.classList.remove('on'); }
  }
  localStorage.setItem('tabi_saved', JSON.stringify(saved));
  updateBadge();
}
function clearAll() {
  if (!saved.length) return;
  if (confirm('저장한 모든 장소를 삭제할까요?')) {
    saved = [];
    localStorage.setItem('tabi_saved', JSON.stringify(saved));
    updateBadge();
    renderSaved();
  }
}
function updateBadge() {
  var b = document.getElementById('savedBadge');
  if (saved.length > 0) { b.textContent = saved.length; b.classList.add('show'); }
  else b.classList.remove('show');
}

// ── Saved page
function renderSaved() {
  var el = document.getElementById('savedContent');
  if (!saved.length) {
    el.innerHTML =
      '<div class="saved-empty"><div class="saved-empty-ic">🗺</div>' +
      '<div class="saved-empty-tx">아직 저장한 장소가 없어요.<br>탐색 탭에서 ♡ 버튼을 눌러 저장해보세요!</div></div>';
    return;
  }
  var groups = {};
  saved.forEach(function(s){ var k = s.city || '기타'; if (!groups[k]) groups[k] = []; groups[k].push(s); });
  var html = '';
  Object.keys(groups).forEach(function(c) {
    html += '<span class="saved-city-lbl">' + c + '</span><div class="place-list">';
    groups[c].forEach(function(s) {
      var p    = s.data || {name: s.name};
      var pUrl = photoUrl(p.photo_ref, 400);
      html +=
        '<div class="pc" data-sname="' + p.name.replace(/"/g,'&quot;') + '">' +
          '<div class="pc-img">' +
            (pUrl ? '<img src="' + pUrl + '" alt="' + p.name + '" loading="lazy" onerror="this.style.display='none'">' : '') +
            '<div class="pc-grad"></div>' +
            '<button class="pc-heart on" data-sname="' + p.name.replace(/"/g,'&quot;') + '">♥</button>' +
          '</div>' +
          '<div class="pc-info"><div class="pc-name">' + p.name + '</div>' +
          '<div class="pc-addr">' + (p.addr||'') + '</div>' +
          '<div class="pc-meta"><div class="pc-stars">' + mkStars(p.rating) + '</div>' +
          '<span class="pc-rnum">' + (p.rating || '&mdash;') + '</span></div></div>' +
          buildCTA(p) +
        '</div>';
    });
    html += '</div>';
  });
  el.innerHTML = html;

  el.addEventListener('click', function(e) {
    var heartBtn = e.target.closest('.pc-heart');
    if (heartBtn) {
      e.stopPropagation();
      removeSaved(heartBtn.dataset.sname);
      return;
    }
    var card = e.target.closest('.pc');
    if (card && !e.target.closest('a')) {
      openSavedDetail(card.dataset.sname);
    }
  }, {once: true});
}
function removeSaved(name) {
  var i = saved.findIndex(function(s){ return s.name === name; });
  if (i !== -1) { saved.splice(i, 1); localStorage.setItem('tabi_saved', JSON.stringify(saved)); }
  updateBadge();
  renderSaved();
}
function openSavedDetail(name) {
  var s = saved.find(function(x){ return x.name === name; });
  if (!s) return;
  _places = [s.data || {name: name}];
  openDetail(0);
}

// ── Detail

          '<div><div class="dbr-nm">' + b.nm + '</div><div class="dbr-dc">' + b.dc + '</div></div></div>' +
          '<div style="display:flex;align-items:center;gap:6px"><div>' +

    '<div class="d-info-sec"><div class="d-info-lbl">기본 정보</div><div class="d-grid">' +
      '<div class="d-cell"><div class="d-cell-lbl">📍 주소</div><div class="d-cell-val">' + (p.addr||'정보없음') + '</div></div>' +
      '<div class="d-cell"><div class="d-cell-lbl">🕐 영업</div><div class="d-cell-val" style="color:' + (p.open===true?'var(--ac)':p.open===false?'var(--red)':'var(--tx3)') + ';">' + (p.open===true?'🟢 영업중':p.open===false?'🔴 영업종료':'정보없음') + '</div></div>' +
    '</div></div>' +
    bkSec +

      '<button id="dHeartBtn" class="d-btn h' + (isSaved?' on':'') + '" data-name="' + p.name.replace(/"/g,'&quot;') + '">' + (isSaved?'♥ 저장됨':'♡ 저장하기') + '</button>' +
      '<button id="dGoogleBtn" class="d-btn p" data-url="' + gurl + '">🗺 Google 지도에서 보기</button>' +

function closeDetail() { document.getElementById('detailPanel').classList.remove('open'); }

// ── AI Map
function buildMap(di) {
  var d = window._tdays[di];
  var tc = window._triCity || '도쿄';
  var coords = CITY_COORDS[tc] || {lat:35.6762, lng:139.6503};
  var bbox = (coords.lng-.04) + '%2C' + (coords.lat-.03) + '%2C' + (coords.lng+.04) + '%2C' + (coords.lat+.03);
  var src = 'https://www.openstreetmap.org/export/embed.html?bbox=' + bbox + '&layer=mapnik&marker=' + coords.lat + '%2C' + coords.lng;
  var pts = [{x:72,y:60},{x:38,y:45},{x:60,y:28},{x:22,y:62},{x:58,y:76},{x:82,y:40}];
  var pins = '';
  d.places.forEach(function(pl, i) {
    var pos = pts[i] || {x:28+i*13, y:38+i*12};
    var gurl = 'https://maps.google.com/?q=' + encodeURIComponent(pl.name + ' ' + tc);
    pins += '<div class="tri-pin" style="left:' + pos.x + '%;top:' + pos.y + '%;background:' + d.col + '" data-url="' + gurl + '">' + (i+1) + '</div>';
  });
  return '<iframe src="' + src + '" loading="lazy"></iframe><div class="tri-map-pins">' + pins + '</div>';
}
function buildPlaces(di) {
  var d = window._tdays[di];
  var h = '<div class="tri-day-hd"><div class="tri-day-dot" style="background:' + d.col + '">' + (di+1) + '</div><div class="tri-day-lbl">' + d.label + '</div></div>';
  d.places.forEach(function(pl, pi) {
    var info = gpi(pl.name);
    var tip  = pl.tip || info.cm;
    h += '<div class="tri-place-row" id="tpi-' + di + '-' + pi + '">' +
         '<div class="tri-place-ic">' + info.ic + '</div>' +
         '<div class="tri-place-body">' +
         '<div class="tri-place-name">' + pl.name + '</div>' +
         '<div class="tri-place-tp">' + info.tp + '</div>' +
         '<div class="tri-place-cm">' + tip + '</div>' +
         (pl.time ? '<div class="tri-place-time">⏰ ' + pl.time + '</div>' : '') +
         '</div></div>';
  });
  return h;
}
function switchTD(di) {
  if (!window._tdays) return;
  document.querySelectorAll('.tri-daytab').forEach(function(t,i){ t.classList.toggle('on', i===di); });
  var m = document.getElementById('triMap');
  if (m) { m.innerHTML = buildMap(di); attachPinEvents(m); }
  var pl = document.getElementById('triPlaces');
  if (pl) pl.innerHTML = buildPlaces(di);
}
function attachPinEvents(container) {
  container.querySelectorAll('.tri-pin').forEach(function(pin) {
    pin.addEventListener('click', function() {
      window.open(this.dataset.url, '_blank');
    });
  });
}
function copyTri() {
  var text = (window._tdays||[]).map(function(d,i) {
    return '[DAY ' + (i+1) + ' - ' + d.label + ']
' + d.places.map(function(p){ return '  ' + (p.time||'') + ' ' + p.name; }).join('
');
  }).join('

');
  navigator.clipboard.writeText(text).then(function(){ alert('일정이 복사됐어요!'); }).catch(function(){ alert('복사에 실패했어요.'); });
}

function buildTriResult(days, aiCity, aiDays, aiStyle, aiPeople) {
  var total = parseInt(aiDays) + 1;
  window._tdays = days.map(function(d, i) {
    return {label: d.label, col: PIN_C[i % PIN_C.length], places: d.places.map(function(p){ return Object.assign({}, p); })};
  });
  window._triCity = aiCity;

  var tabs = '';
  days.forEach(function(_, i) {
    tabs += '<button class="tri-daytab' + (i===0?' on':'') + '" data-di="' + i + '">Day ' + (i+1) + '</button>';
  });
  var bud = aiStyle==='가성비' ? '8,000~12,000엔' : aiStyle==='럭셔리' ? '30,000~60,000엔' : '15,000~25,000엔';

  var html =
    '<div class="tri-wrap"><div class="tri-card">' +
    '<div class="tri-top"><div class="tri-em">' + aiCity.charAt(0) + '</div>' +
    '<div class="tri-title">' + aiCity + ' ' + aiDays + '박' + total + '일 <em>맞춤일정</em></div>' +
    '<div class="tri-sub">' + aiPeople + ' ' + aiStyle + ' 코스 · Claude AI 설계</div></div>' +
    '<div class="tri-map" id="triMap">' + buildMap(0) + '</div>' +
    '<div class="tri-daytabs">' + tabs + '</div>' +
    '<div class="tri-places" id="triPlaces">' + buildPlaces(0) + '</div>' +
    '<div class="tri-footer">' +
    '<div class="tri-tip"><div class="tri-tip-title">💡 여행 꿀팁</div>' +
    '<div class="tri-tip-item">· IC카드(Suica/ICOCA) 미리 충전 - 교통·편의점 결제 모두 가능</div>' +
    '<div class="tri-tip-item">· 인기 식당은 구글맵 사전 예약 or 개점 30분 전 줄서기</div>' +
    '<div class="tri-tip-item">· 100엔 숍(다이소·세리아) 기념품 - 가성비 최고!</div></div>' +
    '<div class="tri-budget"><span class="tri-bud-lbl">예상 하루 예산 (숙박 별도)</span><span class="tri-bud-val">약 ' + bud + '/인</span></div>' +
    '<div class="tri-acts">' +
    '<button class="tri-act s" id="triCopyBtn">📋 일정 복사</button>' +
    '<button class="tri-act p" id="triExploreBtn">🗺 장소 탐색</button>' +
    '</div></div></div></div>';

  document.getElementById('aiResult').innerHTML = html;

  // Attach events
  document.getElementById('triCopyBtn').addEventListener('click', copyTri);
  document.getElementById('triExploreBtn').addEventListener('click', function(){ switchPage('explore'); });
  document.querySelectorAll('.tri-daytab').forEach(function(btn) {
    btn.addEventListener('click', function() { switchTD(parseInt(this.dataset.di)); });
  });
  attachPinEvents(document.getElementById('triMap'));
}

async function genItinerary() {
  var btn      = document.getElementById('genBtn');
  var aiCity   = document.getElementById('ai-city').value;
  var aiDays   = document.getElementById('ai-days').value;
  var aiStyle  = document.getElementById('ai-style').value;
  var aiPeople = document.getElementById('ai-people').value;
  var interests = [];
  document.querySelectorAll('.ai-chip.on').forEach(function(c){ interests.push(c.textContent.trim()); });
  var totalDays = parseInt(aiDays) + 1;

  btn.disabled = true; btn.textContent = '생성 중...';
  document.getElementById('aiResult').innerHTML =
    '<div class="tri-wrap"><div class="tri-card"><div class="tri-loading">' +
    '<div class="tri-dots"><span></span><span></span><span></span></div>' +
    '<div class="tri-ltxt">Claude AI가 ' + aiCity + ' ' + aiDays + '박' + totalDays + '일 맞춤 일정을 설계하고 있어요...</div>' +
    '</div></div></div>';

  var prompt =
    '당신은 일본 여행 전문 컨설턴트입니다. 아래 조건에 맞는 여행 일정을 JSON으로 작성해주세요.

' +
    '조건: 도시=' + aiCity + ', 기간=' + aiDays + '박' + totalDays + '일, 스타일=' + aiStyle + ', 동행=' + aiPeople + ', 관심사=' + (interests.join(', ')||'전반적 관광') + '

' +
    '규칙: days 배열에 ' + totalDays + '개 day 객체, 각 day에 5~6개 장소, 장소명은 한국어, time은 HH:MM, tip은 실용적 꿀팁 1~2문장

' +
    '형식(JSON만, 다른 텍스트 없이): {"days":[{"label":"테마","places":[{"name":"장소명","time":"09:00","tip":"꿀팁"}]}]}';

  try {
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({model:'claude-sonnet-4-20250514', max_tokens:2500, messages:[{role:'user',content:prompt}]})
    });
    if (!res.ok) throw new Error('api ' + res.status);
    var data = await res.json();
    if (data.error) throw new Error(data.error.message);
    var text = (data.content||[]).map(function(b){ return b.text||''; }).join('');
    var days = null;
    try {
      var clean = text.replace(/\u0060{3}json|\u0060{3}/g, '').trim();
      days = JSON.parse(clean).days;
    } catch(e) {
      var match = text.match(/\{[\s\S]*"days"[\s\S]*\}/);
      if (match) try { days = JSON.parse(match[0]).days; } catch(e2) {}
    }
    if (days && days.length) {
      buildTriResult(days, aiCity, aiDays, aiStyle, aiPeople);
    } else throw new Error('parse failed');
  } catch(e) {
    console.warn('AI 폴백:', e.message);
    var fb = AI_DB[aiCity] || AI_DB['도쿄'];
    var sliced = fb.slice(0, totalDays).map(function(d){
      return {label:d.label, places:d.places.map(function(p){ return Object.assign({},p); })};
    });
    while (sliced.length < totalDays) {
      var idx = sliced.length % fb.length;
      sliced.push({label:fb[idx].label+' ('+(sliced.length+1)+'일차)', places:fb[idx].places.map(function(p){ return Object.assign({},p); })});
    }
    buildTriResult(sliced, aiCity, aiDays, aiStyle, aiPeople);
  }
  btn.disabled = false; btn.textContent = 'AI 맞춤 일정 생성하기';
}

})();
