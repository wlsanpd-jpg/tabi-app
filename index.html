<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TABI — 일본 여행</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f8f8f6;--white:#fff;--sf:#f2f1ef;--sf2:#e8e7e4;
  --bd:#e4e3e0;--bd2:#d0cfc9;
  --tx:#1a1a18;--tx2:#6b6a66;--tx3:#a8a7a2;
  --ac:#00c896;--ac2:#00b085;--ac-bg:#e6faf5;
  --red:#ff4757;--gold:#f0a500;
  --klook:#f4452a;--mrt:#ff6b35;
  --nav:58px;--safe:env(safe-area-inset-bottom);
  --f:"Noto Sans KR",sans-serif;--fd:"Playfair Display",serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;-webkit-font-smoothing:antialiased;}
body{font-family:var(--f);background:var(--bg);color:var(--tx);overflow-x:hidden;}
.app{max-width:480px;margin:0 auto;height:100%;background:var(--white);position:relative;}
.page{display:none;flex-direction:column;height:100vh;overflow:hidden;}
.page.active{display:flex;}
a,button{font-family:var(--f);}
::-webkit-scrollbar{display:none;}
img{display:block;}

/* HEADER */
.hd{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);}
.hd-inner{display:flex;align-items:center;gap:10px;padding:12px 16px 10px;}
.logo-wrap{flex:1;}
.logo{font-family:var(--fd);font-size:24px;font-weight:900;color:var(--tx);letter-spacing:-.5px;line-height:1;}
.logo span{color:var(--ac);}
.logo-sub{font-size:10px;color:var(--tx3);font-weight:400;letter-spacing:.5px;margin-top:1px;}
.hd-search{width:36px;height:36px;border-radius:50%;background:var(--sf);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx2);}
.hd-status{display:flex;align-items:center;gap:4px;background:var(--ac-bg);border-radius:20px;padding:4px 10px;font-size:10px;font-weight:700;color:var(--ac2);}
.hd-status-dot{width:5px;height:5px;border-radius:50%;background:var(--ac);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.search-bar{background:var(--white);border-bottom:1px solid var(--bd);padding:8px 16px 10px;display:flex;gap:8px;}
.search-bar.hidden{display:none;}
.sfield{flex:1;display:flex;align-items:center;gap:8px;background:var(--sf);border:1.5px solid var(--bd);border-radius:24px;padding:0 14px;transition:all .2s;}
.sfield:focus-within{border-color:var(--ac);background:var(--white);}
.sfield svg{color:var(--tx3);flex-shrink:0;}
.sfield input{background:none;border:none;outline:none;color:var(--tx);font-size:14px;font-family:var(--f);width:100%;padding:9px 0;}
.sfield input::placeholder{color:var(--tx3);}
.s-go{background:var(--ac);border:none;color:#fff;border-radius:24px;padding:0 18px;height:40px;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;}
.s-cancel{background:none;border:none;color:var(--tx2);font-size:13px;font-weight:700;cursor:pointer;padding:0 4px;white-space:nowrap;}

/* CITY/CAT TABS */
.city-row{display:flex;overflow-x:auto;background:var(--white);border-bottom:1px solid var(--bd);padding:0 12px;}
.city-btn{flex-shrink:0;background:none;border:none;color:var(--tx3);font-size:13px;font-weight:700;padding:10px 8px 8px;cursor:pointer;font-family:var(--f);position:relative;transition:color .15s;white-space:nowrap;}
.city-btn.on{color:var(--ac);}
.city-btn.on::after{content:"";position:absolute;bottom:0;left:4px;right:4px;height:2.5px;background:var(--ac);border-radius:2px;}
.cat-row{display:flex;gap:7px;overflow-x:auto;padding:10px 16px 8px;background:var(--white);border-bottom:1px solid var(--bd);}
.cat-btn{flex-shrink:0;display:flex;align-items:center;gap:4px;background:var(--sf);border:1.5px solid var(--bd);border-radius:20px;padding:6px 13px;font-size:12px;font-weight:700;color:var(--tx2);cursor:pointer;white-space:nowrap;transition:all .15s;font-family:var(--f);}
.cat-btn.on{background:var(--tx);border-color:var(--tx);color:#fff;}
.cat-btn:hover:not(.on){border-color:var(--ac);color:var(--ac);}

/* SCROLL CONTENT */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* BOOKING STRIP */
.bk-strip{background:var(--white);border-bottom:1px solid var(--bd);}
.bk-strip-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;}
.bk-strip-lbl{font-size:13px;font-weight:800;color:var(--tx);}
.bk-strip-badge{font-size:10px;font-weight:700;color:var(--ac);background:var(--ac-bg);border-radius:4px;padding:2px 7px;}
.bk-list{display:flex;gap:10px;padding:0 16px 14px;overflow-x:auto;}
.bk-card{flex-shrink:0;width:148px;background:var(--sf);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .2s;border:1.5px solid var(--bd);}
.bk-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1);}
.bk-card-img{height:74px;background:linear-gradient(135deg,#e8f5e9,#e3f2fd);display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;}
.bk-plat{position:absolute;top:5px;right:5px;font-size:9px;font-weight:800;color:#fff;padding:2px 5px;border-radius:3px;}
.bk-plat.kl{background:var(--klook);}.bk-plat.mr{background:var(--mrt);}
.bk-card-body{padding:8px 10px 10px;}
.bk-nm{font-size:11px;font-weight:700;color:var(--tx);line-height:1.35;margin-bottom:3px;}
.bk-price{font-size:12px;font-weight:900;color:var(--ac);}
.bk-comm{font-size:9px;font-weight:700;color:var(--gold);margin-top:2px;}

/* SECTION */
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:18px 16px 12px;background:var(--white);}
.sec-title{font-size:18px;font-weight:900;color:var(--tx);}
.sec-count{font-size:12px;color:var(--tx3);}

/* PLACE CARD */
.place-list{display:flex;flex-direction:column;}
.pc{background:var(--white);border-bottom:1px solid var(--bd);cursor:pointer;animation:fadeUp .3s cubic-bezier(.16,1,.3,1) both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.pc:active{background:var(--sf);}
.pc-img{width:100%;height:200px;background:var(--sf2);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:56px;}
.pc-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s;}
.pc:hover .pc-img img{transform:scale(1.03);}
.pc-img-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0) 50%,rgba(0,0,0,.35) 100%);}
.pc-rank{position:absolute;top:12px;left:12px;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);color:#fff;font-size:11px;font-weight:800;padding:4px 9px;border-radius:6px;}
.pc-cat-badge{position:absolute;bottom:12px;left:12px;background:rgba(255,255,255,.92);color:var(--tx);font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;}
.pc-save-btn{position:absolute;top:10px;right:10px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.9);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--tx3);box-shadow:0 2px 8px rgba(0,0,0,.12);}
.pc-save-btn.on{color:var(--red);}
.pc-info{padding:13px 16px 8px;}
.pc-name{font-size:17px;font-weight:800;color:var(--tx);margin-bottom:4px;letter-spacing:-.3px;line-height:1.25;}
.pc-addr{font-size:12px;color:var(--tx3);margin-bottom:9px;}
.pc-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.pc-stars{display:flex;gap:1px;}
.pc-star{font-size:11px;color:var(--bd2);}.pc-star.on{color:var(--gold);}
.pc-rnum{font-size:13px;font-weight:800;color:var(--tx);}
.pc-rcnt{font-size:11px;color:var(--tx3);}
.pc-sep{width:1px;height:11px;background:var(--bd2);}
.pc-open{font-size:11px;font-weight:700;color:var(--ac);}
.pc-closed{font-size:11px;font-weight:700;color:var(--red);}
.pc-cta{display:flex;border-top:1.5px solid var(--bd);margin-top:10px;}
.pc-cta a{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:11px 6px;text-decoration:none;font-size:12px;font-weight:800;font-family:var(--f);transition:background .15s;color:var(--tx2);}
.pc-cta a+a{border-left:1.5px solid var(--bd);}
.pc-cta a.kl{color:var(--klook);}.pc-cta a.kl:hover{background:rgba(244,69,42,.06);}
.pc-cta a.mr{color:var(--mrt);}.pc-cta a.mr:hover{background:rgba(255,107,53,.06);}
.pc-cta a.gm:hover{background:var(--sf);}

/* LOADING/EMPTY */
.loading{padding:80px 20px;text-align:center;}
.spinner{width:32px;height:32px;border:3px solid var(--bd2);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;color:var(--tx3);}
.empty{padding:80px 20px;text-align:center;}
.empty-ic{font-size:48px;margin-bottom:12px;}
.empty-tx{font-size:13px;color:var(--tx3);line-height:1.7;}

/* BOTTOM NAV */
.bot-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:300;background:rgba(255,255,255,.97);backdrop-filter:blur(20px);border-top:1px solid var(--bd);display:flex;align-items:stretch;height:calc(var(--nav) + var(--safe));padding-bottom:var(--safe);}
.nav-it{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;font-family:var(--f);font-size:10px;font-weight:700;color:var(--tx3);transition:color .15s;position:relative;padding-top:6px;}
.nav-it.on{color:var(--ac);}
.nav-ic-wrap{position:relative;display:flex;align-items:center;justify-content:center;}
.nav-ic{font-size:22px;line-height:1;}
.nav-badge{position:absolute;top:-4px;right:-6px;background:var(--red);color:#fff;font-size:9px;font-weight:800;border-radius:10px;padding:1px 5px;min-width:16px;text-align:center;display:none;line-height:1.4;}
.nav-badge.show{display:block;}

/* AI PAGE */
.ai-pg{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;}
.ai-hero{padding:28px 20px 24px;background:linear-gradient(160deg,#0a1628 0%,#1a2d1a 40%,#0a2018 100%);position:relative;overflow:hidden;}
.ai-hero::before{content:"";position:absolute;right:-30px;top:-30px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(0,200,150,.15),transparent 70%);}
.ai-hero-sub{font-size:11px;font-weight:700;color:var(--ac);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;}
.ai-hero-title{font-family:var(--fd);font-size:28px;font-weight:900;color:#fff;line-height:1.2;margin-bottom:6px;}
.ai-hero-title em{color:var(--ac);font-style:italic;}
.ai-hero-desc{font-size:13px;color:rgba(255,255,255,.6);line-height:1.65;}
.ai-form{margin:16px;background:var(--white);border-radius:16px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.07);border:1px solid var(--bd);}
.ai-form-sec{padding:16px 16px 0;}
.ai-lbl{font-size:10px;font-weight:800;color:var(--tx3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:7px;display:block;}
.ai-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.ai-sel{width:100%;background:var(--sf);border:1.5px solid var(--bd);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--tx);font-family:var(--f);font-weight:600;outline:none;transition:border-color .2s;appearance:none;}
.ai-sel:focus{border-color:var(--ac);}
.ai-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.ai-chip{background:var(--sf);border:1.5px solid var(--bd);border-radius:20px;padding:6px 12px;font-size:12px;font-weight:700;color:var(--tx2);cursor:pointer;transition:all .15s;font-family:var(--f);}
.ai-chip.on{background:var(--tx);border-color:var(--tx);color:#fff;}
.ai-gen-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--ac);color:#fff;border:none;padding:16px;font-size:15px;font-weight:900;cursor:pointer;font-family:var(--f);transition:background .2s;}
.ai-gen-btn:hover{background:var(--ac2);}
.ai-gen-btn:disabled{opacity:.5;cursor:not-allowed;}

/* AI RESULT */
.tri-wrap{margin:16px;}
.tri-card{background:var(--white);border-radius:16px;overflow:hidden;border:1px solid var(--bd);box-shadow:0 2px 16px rgba(0,0,0,.07);}
.tri-top{padding:20px 18px 16px;background:linear-gradient(135deg,#0a1628,#1a2d1a);text-align:center;border-bottom:1px solid var(--bd);}
.tri-em{font-size:40px;margin-bottom:10px;}
.tri-title{font-family:var(--fd);font-size:20px;color:#fff;font-weight:700;margin-bottom:4px;line-height:1.3;}
.tri-title em{color:var(--ac);font-style:italic;}
.tri-sub{font-size:12px;color:rgba(255,255,255,.5);}
.tri-map{height:220px;position:relative;overflow:hidden;background:#e8eaf0;}
.tri-map iframe{width:100%;height:100%;border:none;display:block;}
.tri-map-pins{position:absolute;inset:0;pointer-events:none;}
.tri-pin{position:absolute;transform:translate(-50%,-50%);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;cursor:pointer;z-index:2;box-shadow:0 2px 8px rgba(0,0,0,.25);transition:transform .2s;font-family:var(--f);border:2px solid rgba(255,255,255,.8);pointer-events:all;}
.tri-pin:hover{transform:translate(-50%,-50%) scale(1.2);}
.tri-daytabs{display:flex;gap:6px;padding:12px 14px;border-bottom:1px solid var(--bd);overflow-x:auto;}
.tri-daytab{flex-shrink:0;padding:7px 18px;border-radius:20px;font-size:12px;font-weight:800;cursor:pointer;border:1.5px solid var(--bd2);background:var(--white);color:var(--tx3);transition:all .2s;font-family:var(--f);}
.tri-daytab.on{background:var(--tx);border-color:var(--tx);color:#fff;}
.tri-places{padding:4px 0;}
.tri-day-hd{display:flex;align-items:center;gap:8px;padding:12px 16px 8px;}
.tri-day-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;}
.tri-day-lbl{font-size:14px;font-weight:800;color:var(--tx);}
.tri-place-row{display:flex;gap:12px;padding:10px 16px 10px 46px;position:relative;cursor:pointer;transition:background .12s;}
.tri-place-row:hover{background:var(--sf);}
.tri-place-row::before{content:"";position:absolute;left:26px;top:0;bottom:0;width:1.5px;background:var(--bd2);}
.tri-place-row:last-child::before{height:50%;}
.tri-place-ic{width:50px;height:50px;border-radius:12px;flex-shrink:0;background:var(--sf2);display:flex;align-items:center;justify-content:center;font-size:22px;border:1px solid var(--bd);}
.tri-place-body{flex:1;min-width:0;}
.tri-place-name{font-size:14px;font-weight:800;color:var(--tx);margin-bottom:2px;}
.tri-place-tp{font-size:11px;color:var(--tx3);margin-bottom:4px;}
.tri-place-cm{font-size:11px;color:var(--ac2);font-weight:700;line-height:1.5;}
.tri-place-cm::before{content:"Tip. ";}
.tri-place-time{font-size:10px;color:var(--tx3);margin-top:3px;}
.tri-footer{border-top:1px solid var(--bd);}
.tri-tip{padding:14px 16px;background:var(--ac-bg);}
.tri-tip-title{font-size:11px;font-weight:900;color:var(--ac2);margin-bottom:6px;}
.tri-tip-item{font-size:12px;color:var(--tx2);line-height:1.65;margin-bottom:2px;}
.tri-budget{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--bd);}
.tri-budget-lbl{font-size:11px;color:var(--tx3);font-weight:600;}
.tri-budget-val{font-size:14px;font-weight:900;color:var(--tx);}
.tri-actions{display:flex;gap:8px;padding:12px 16px 14px;border-top:1px solid var(--bd);}
.tri-act{flex:1;padding:12px;border-radius:10px;border:none;font-size:13px;font-weight:800;cursor:pointer;font-family:var(--f);transition:all .2s;}
.tri-act.p{background:var(--ac);color:#fff;}
.tri-act.s{background:var(--sf);color:var(--tx);border:1.5px solid var(--bd2);}
.tri-loading{padding:40px 20px;text-align:center;}
.tri-dots{display:flex;justify-content:center;gap:7px;margin-bottom:14px;}
.tri-dots span{width:9px;height:9px;border-radius:50%;background:var(--ac);animation:bounce .8s ease-in-out infinite;}
.tri-dots span:nth-child(2){animation-delay:.14s;}
.tri-dots span:nth-child(3){animation-delay:.28s;background:var(--bd2);}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}
.tri-loading-txt{font-size:13px;color:var(--tx3);font-weight:600;}

/* SAVED */
.saved-hd{padding:24px 20px 16px;border-bottom:1px solid var(--bd);background:var(--white);}
.saved-hd-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.saved-title{font-family:var(--fd);font-size:24px;font-weight:900;color:var(--tx);}
.saved-clear{background:none;border:none;font-size:12px;font-weight:700;color:var(--tx3);cursor:pointer;font-family:var(--f);}
.saved-clear:hover{color:var(--red);}
.saved-desc{font-size:13px;color:var(--tx3);}
.saved-city-lbl{font-size:10px;font-weight:800;letter-spacing:.8px;color:var(--tx3);text-transform:uppercase;padding:16px 16px 8px;display:block;background:var(--bg);}
.saved-empty{padding:80px 20px;text-align:center;background:var(--white);}
.saved-empty-ic{font-size:52px;margin-bottom:14px;opacity:.4;}
.saved-empty-tx{font-size:14px;color:var(--tx3);line-height:1.7;}

/* DETAIL */
.detail{position:fixed;inset:0;z-index:400;background:var(--white);overflow-y:auto;transform:translateX(100%);transition:transform .32s cubic-bezier(.16,1,.3,1);}
.detail.open{transform:translateX(0);}
.d-nav{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);padding:12px 16px;display:flex;align-items:center;gap:12px;}
.d-back{background:var(--sf);border:none;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--tx2);}
.d-nav-title{font-size:15px;font-weight:800;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.d-hero{width:100%;height:260px;background:var(--sf2);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:80px;}
.d-hero img{width:100%;height:100%;object-fit:cover;}
.d-hero-fade{position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(transparent,var(--white));}
.d-body{padding:0 0 120px;}
.d-title-sec{padding:16px 16px 14px;border-bottom:1px solid var(--bd);}
.d-name{font-family:var(--fd);font-size:24px;font-weight:900;color:var(--tx);letter-spacing:-.4px;margin-bottom:4px;line-height:1.2;}
.d-type{font-size:12px;color:var(--tx3);}
.d-rating-sec{padding:16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:16px;}
.d-big{font-family:var(--fd);font-size:48px;font-weight:900;color:var(--tx);line-height:1;}
.d-stars{display:flex;gap:2px;margin-bottom:3px;}
.d-star{font-size:16px;color:var(--gold);}.d-star.off{color:var(--bd2);}
.d-rcnt{font-size:12px;color:var(--tx3);}
.d-info-sec{padding:14px 16px;border-bottom:1px solid var(--bd);background:var(--bg);}
.d-info-lbl{font-size:10px;font-weight:800;color:var(--tx3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;}
.d-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.d-cell{background:var(--white);border-radius:12px;padding:11px 12px;border:1px solid var(--bd);}
.d-cell-lbl{font-size:9px;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;font-weight:800;}
.d-cell-val{font-size:13px;color:var(--tx);font-weight:700;line-height:1.4;}
.d-bk-sec{background:var(--white);border-bottom:1px solid var(--bd);}
.d-bk-hd{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;}

.d-btn{width:100%;padding:14px;border-radius:12px;border:none;font-size:14px;font-weight:800;cursor:pointer;font-family:var(--f);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px;}

function load(){fetchPlaces(cityEn+' '+catLabel[cat],cat);}

async function fetchPlaces(query,type){
  showLoading();
  try{
    var params=new URLSearchParams({query:query,language:'ko'});
    if(type)params.append('type',type);
    var res=await fetch(PROXY+'/api/places?'+params);
    var data=await res.json();
    if(!data.results||!data.results.length){showEmpty();return;}
    _places=data.results.map(function(r){return{
      name:r.name,addr:r.formatted_address,rating:r.rating,
      cnt:r.user_ratings_total,open:r.opening_hours&&r.opening_hours.open_now,
      icon:catEmoji[cat]||'📍',types:(r.types||[]).slice(0,3),
      photo_ref:r.photos&&r.photos[0]&&r.photos[0].photo_reference,
      place_id:r.place_id,url:'https://maps.google.com/?cid='+r.place_id,
    };});
    renderList(_places);
  }catch(e){console.error(e);showError();}
}
function photoUrl(ref,size){
  if(!ref)return null;
  return PROXY+'/api/photo?photo_reference='+ref+'&maxwidth='+(size||400);
}
function showLoading(){
  document.getElementById('mainContent').innerHTML='<div class="loading"><div class="spinner"></div><div class="loading-txt">'+city+' 정보를 불러오는 중...</div></div>';
}

function mkStars(r){

      +'<div class="bk-card-img"><span>'+b.em+'</span><span class="bk-plat '+b.cls+'">'+b.logo+'</span></div>'
      +'<div class="bk-card-body"><div class="bk-nm">'+b.nm+'</div>'
      +'<div class="bk-price">'+b.pr+'</div>'

    +'<span class="bk-strip-badge">제휴 할인</span></div><div class="bk-list">'+cards+'</div></div>';

    return'<div class="pc-cta">'
      +'<a class="gm" href="'+gurl+'" target="_blank" onclick="event.stopPropagation()">🗺 Google 지도</a>'
      +'<a class="gm" href="'+nurl+'" target="_blank" onclick="event.stopPropagation()">🆎 네이버 지도</a>'

function renderList(places){
  if(!places.length){showEmpty();return;}

    var isSaved=saved.some(function(s){return s.name===p.name;});

      +'<span class="pc-rnum">'+(p.rating||'—')+'</span>'
      +'<span class="pc-rcnt">'+(p.cnt?'('+p.cnt.toLocaleString()+'건)':'')+'</span>'
      +(statusHtml?'<span class="pc-sep"></span>'+statusHtml:'')
      +'</div></div>'+buildCTA(p)+'</div>';
  }).join('');
  document.getElementById('mainContent').innerHTML=strip+secHead+'<div class="place-list">'+cards+'</div>';

function buildMap(di){
  var d=window._tdays[di];
  var triCity=window._triCity||'도쿄';
  var coords=CITY_COORDS[triCity]||{lat:35.6762,lng:139.6503};
  var zoom=13;
  var bbox=(coords.lng-.04)+'%2C'+(coords.lat-.03)+'%2C'+(coords.lng+.04)+'%2C'+(coords.lat+.03);
  var src='https://www.openstreetmap.org/export/embed.html?bbox='+bbox+'&layer=mapnik&marker='+coords.lat+'%2C'+coords.lng;
  var pts=[{x:72,y:60},{x:38,y:45},{x:60,y:28},{x:22,y:62},{x:58,y:76},{x:82,y:40}];
  var pins=d.places.map(function(pl,i){
    var pos=pts[i]||{x:28+i*13,y:38+i*12};
    var gurl='https://maps.google.com/?q='+encodeURIComponent(pl.name+' '+triCity);
    return'<div class="tri-pin" style="left:'+pos.x+'%;top:'+pos.y+'%;background:'+d.col+'" onclick="window.open(''+gurl+'','_blank')" title="'+pl.name+'">'+(i+1)+'</div>';
  }).join('');
  return'<iframe src="'+src+'" loading="lazy"></iframe><div class="tri-map-pins">'+pins+'</div>';
}
function buildPlaces(di){
  var d=window._tdays[di];
  var h='<div class="tri-day-hd"><div class="tri-day-dot" style="background:'+d.col+'">'+(di+1)+'</div><div class="tri-day-lbl">'+d.label+'</div></div>';

    var info=gpi(pl.name);
    var tipTxt=pl.tip||info.cm;
    h+='<div class="tri-place-row" id="tpi-'+di+'-'+pi+'">'
      +'<div class="tri-place-ic">'+info.ic+'</div>'
      +'<div class="tri-place-body">'

  var aiStyle=document.getElementById('ai-style').value;
  var aiPeople=document.getElementById('ai-people').value;
  var interests=Array.from(document.querySelectorAll('.ai-chip.on')).map(function(c){return c.textContent.trim();}).join(', ');
  var totalDays=parseInt(aiDays)+1;
  btn.disabled=true;btn.textContent='생성 중...';
  resultEl.innerHTML='<div class="tri-wrap"><div class="tri-card"><div class="tri-loading">'
    +'<div class="tri-dots"><span></span><span></span><span></span></div>'
    +'<div class="tri-loading-txt">Claude AI가 '+aiCity+' '+aiDays+'박'+totalDays+'일<br>맞춤 일정을 설계하고 있어요...</div>'
    +'</div></div></div>';
  var prompt='당신은 일본 여행 전문 컨설턴트입니다. 아래 조건에 맞는 여행 일정을 JSON으로 작성해주세요.\n\n'
    +'조건: 도시='+aiCity+', 기간='+aiDays+'박'+totalDays+'일, 스타일='+aiStyle+', 동행='+aiPeople+', 관심사='+(interests||'전반적 관광')+'\n\n'
    +'rules: days 배열에 '+totalDays+'개 day, 각 day에 5~6개 장소, 장소명은 한국어, label은 한국어 테마, time은 HH:MM, tip은 실용적 꿀팁 1~2문장\n\n'
    +'형식(JSON만, 다른 텍스트 없이): {"days":[{"label":"테마","places":[{"name":"장소명","time":"09:00","tip":"꿀팁"}]}]}';
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2500,messages:[{role:'user',content:prompt}]})
    });
    if(!res.ok)throw new Error('api '+res.status);
    var data=await res.json();
    if(data.error)throw new Error(data.error.message);
    var text=(data.content||[]).map(function(b){return b.text||'';}).join('');
    var days=null;
    try{
      var clean=text.replace(/\u0060{3}json|\u0060{3}/g,'').trim();
      days=JSON.parse(clean).days;
    }catch(e){
      var match=text.match(/\{[\s\S]*"days"[\s\S]*\}/);
      if(match)try{days=JSON.parse(match[0]).days;}catch(e2){}
    }
    if(days&&days.length){
      resultEl.innerHTML=buildTriResult(days,aiCity,aiDays,aiStyle,aiPeople);
    }else throw new Error('parse failed');
  }catch(e){
    console.warn('AI 폴백:', e.message);
    var fb=AI_DB[aiCity]||AI_DB['도쿄'];
    var sliced=fb.slice(0,totalDays).map(function(d){return{label:d.label,places:d.places.map(function(p){return Object.assign({},p);})};});
    while(sliced.length<totalDays){
      var idx=sliced.length%fb.length;
      sliced.push({label:fb[idx].label+' ('+(sliced.length+1)+'일차)',places:fb[idx].places.map(function(p){return Object.assign({},p);})});
    }
    resultEl.innerHTML=buildTriResult(sliced,aiCity,aiDays,aiStyle,aiPeople);
  }
  btn.disabled=false;btn.textContent='AI 맞춤 일정 생성하기';
}

window.onload=function(){initUI();load();updateBadge();};

</script>
</body>
</html>
