<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TABI — 일본 여행 가이드</title>
<meta name="description" content="AI가 설계하는 맞춤 일본 여행 일정 · 실시간 장소 추천">
<meta name="theme-color" content="#00c896">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
</head>
<body>
<div class="app">
<div class="page active" id="page-explore">
  <div class="hd">
    <div class="hd-inner">
      <div class="logo-wrap">
        <div class="logo">TABI<span class="logo-dot">.</span></div>
        <div class="logo-sub">일본 여행 가이드</div>
      </div>
      <button class="hd-srch" id="btnSrch">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
      <div class="hd-live"><span class="hd-dot"></span><span>실시간</span></div>
    </div>
    <div class="srch-bar off" id="srchBar">
      <div class="sf">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="srchInput" placeholder="장소, 음식, 지역 검색...">
      </div>
      <button class="s-go" id="btnSrchGo">검색</button>
      <button class="s-x" id="btnSrchX">취소</button>
    </div>
  </div>
  <div class="city-row" id="cityRow"></div>
  <div class="cat-row" id="catRow"></div>
  <!-- 필터 바 (드로어 트리거) -->
  <div class="filter-bar" id="filterBar" style="display:none">
    <div class="filter-active-row" id="filterActiveRow"></div>
    <button class="filter-open-btn" id="btnFilterOpen">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
      필터
      <span class="filter-cnt-badge" id="filterCntBadge" style="display:none">0</span>
    </button>
  </div>
  <div class="scroll" id="mainContent" style="padding-bottom:calc(var(--nav) + var(--safe) + 16px)"></div>
</div>
<div class="page" id="page-ai">
  <div class="ai-pg" style="padding-bottom:calc(var(--nav) + var(--safe) + 16px)">
    <div class="ai-hero">
      <div class="ai-hero-sub">Claude AI 맞춤 추천</div>
      <div class="ai-hero-h">나만의 일정, AI가 설계해요</div>
      <div class="ai-hero-p">도시·기간·스타일을 선택하면<br>Claude AI가 최적 동선으로 일정을 짜드려요</div>
    </div>
    <div class="ai-form">
      <div class="ai-sec">
        <label class="ai-lbl">여행 도시 &amp; 기간</label>
        <div class="ai-grid">
          <select class="ai-sel" id="aiCity"></select>
          <select class="ai-sel" id="aiDays">
            <option value="1">1박 2일</option>
            <option value="2" selected>2박 3일</option>
            <option value="3">3박 4일</option>
            <option value="4">4박 5일</option>
          </select>
        </div>
        <label class="ai-lbl">스타일 &amp; 동행</label>
        <div class="ai-grid">
          <select class="ai-sel" id="aiStyle">
            <option value="가성비">가성비</option>
            <option value="럭셔리">럭셔리</option>
            <option value="힐링">힐링</option>
            <option value="미식">미식</option>
            <option value="역사문화">역사·문화</option>
          </select>
          <select class="ai-sel" id="aiPeople">
            <option value="혼자">혼자</option>
            <option value="커플">커플</option>
            <option value="가족">가족</option>
            <option value="친구들">친구들</option>
          </select>
        </div>
        <label class="ai-lbl">관심사</label>
        <div class="ai-chips" id="chips">
          <div class="ai-chip">벚꽃·단풍</div>
          <div class="ai-chip">라멘·초밥</div>
          <div class="ai-chip">쇼핑</div>
          <div class="ai-chip">신사·절</div>
          <div class="ai-chip">온천</div>
          <div class="ai-chip">애니·게임</div>
          <div class="ai-chip">해변·자연</div>
          <div class="ai-chip">카페</div>
        </div>
      </div>
      <button class="ai-gen" id="btnGen">AI 맞춤 일정 생성하기</button>
    </div>
    <div id="aiResult"></div>
  </div>
</div>
<div class="page" id="page-companion">
  <div class="comp-hd">
    <div class="comp-hd-top">
      <div class="comp-hd-title-wrap">
        <span class="comp-hd-ttl">동행 구하기</span>
        <span class="comp-hd-sub">같이 여행할 친구를 찾아보세요</span>
      </div>
      <button class="comp-write-btn" id="btnCompWrite">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        글쓰기
      </button>
    </div>
    <div class="comp-chips-scroll">
      <div class="comp-city-row" id="compCityRow"></div>
      <button class="comp-cal-toggle" id="btnCompCal">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        날짜
      </button>
    </div>
    <!-- 날짜 필터 칩 -->
    <div class="comp-date-filter-row" id="compDateFilterRow" style="display:none">
      <span class="comp-date-filter-chip" id="compDateFilterChip"></span>
      <button class="comp-date-clear" id="btnCompDateClear">✕ 초기화</button>
    </div>
    <!-- 캘린더 -->
    <div class="comp-cal" id="compCal" style="display:none">
      <div class="comp-cal-nav">
        <button class="comp-cal-arr" id="btnCalPrev">‹</button>
        <span class="comp-cal-title" id="calTitle"></span>
        <button class="comp-cal-arr" id="btnCalNext">›</button>
      </div>
      <div class="comp-cal-dow">
        <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
      </div>
      <div class="comp-cal-grid" id="calGrid"></div>
    </div>
  </div>
  <div class="scroll" id="compList" style="padding-bottom:calc(var(--nav) + var(--safe) + 16px)"></div>
</div>
<div class="page" id="page-saved">
  <div class="scroll" style="padding-bottom:calc(var(--nav) + var(--safe) + 16px)">
    <div class="saved-hd">
      <div class="saved-hd-row">
        <div class="saved-title">저장 목록</div>
        <button class="saved-clear" id="btnClearAll">전체 삭제</button>
      </div>
      <div style="font-size:13px;color:var(--tx3)">하트 눌러 저장한 장소들이에요</div>
      <button class="itin-make-btn" id="btnMakeItin">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        일정표 만들기
      </button>
    </div>
    <div id="savedContent"></div>
  </div>
</div>
<nav class="bot-nav">
  <button class="nav-it on" id="nav-explore">
    <span class="nav-ic">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
    </span>
    <span>탐색</span>
  </button>
  <button class="nav-it" id="nav-ai">
    <span class="nav-ic">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>
    </span>
    <span>AI 일정</span>
  </button>
  <button class="nav-it" id="nav-saved">
    <span class="nav-ic">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span class="nav-badge" id="savedBadge"></span>
    </span>
    <span>저장</span>
  </button>
  <button class="nav-it" id="nav-companion">
    <span class="nav-ic">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span class="nav-badge" id="compBadge"></span>
    </span>
    <span>동행</span>
  </button>
</nav>
<div class="detail" id="detailPanel">
  <div class="d-nav">
    <button class="d-back" id="btnBack"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="d-nav-ttl" id="dTitle"></span>
  </div>
  <div class="d-hero" id="dHero"><div class="d-hero-fade"></div></div>
  <div class="d-body" id="dBody"></div>
</div>
<!-- Companion Detail Panel -->
<div class="detail" id="compDetail">
  <div class="d-nav">
    <button class="d-back" id="btnCompBack"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="d-nav-ttl">동행 정보</span>
  </div>
  <div class="comp-detail-body" id="compDetailBody"></div>
</div>
<!-- Companion Write Panel -->
<div class="flt-ov" id="compWriteOv"></div>
<div class="comp-write-panel" id="compWritePanel">
  <div class="flt-dw-handle"></div>
  <div class="flt-dw-hd">
    <span class="flt-dw-ttl">동행 글쓰기</span>
    <button class="flt-dw-reset" id="compWriteX">닫기</button>
  </div>
  <div class="comp-form" id="compForm">
    <label class="comp-lbl">여행 도시</label>
    <select class="ai-sel" id="compCity" style="width:100%;margin-bottom:12px"></select>
    <label class="comp-lbl">여행 날짜 &amp; 시간</label>
    <div class="comp-datetime-row">
      <input class="comp-input" type="date" id="compFrom">
      <input class="comp-input comp-time-input" type="time" id="compFromTime" value="09:00">
    </div>
    <div class="comp-datetime-row" style="margin-bottom:12px">
      <input class="comp-input" type="date" id="compTo">
      <input class="comp-input comp-time-input" type="time" id="compToTime" value="21:00">
    </div>
    <label class="comp-lbl">여행 스타일</label>
    <div class="comp-chips" id="compStyleChips">
      <div class="comp-chip" data-v="가성비">가성비</div>
      <div class="comp-chip" data-v="럭셔리">럭셔리</div>
      <div class="comp-chip" data-v="힐링">힐링</div>
      <div class="comp-chip" data-v="미식">미식</div>
      <div class="comp-chip" data-v="역사문화">역사문화</div>
    </div>
    <label class="comp-lbl">모집 인원</label>
    <div class="comp-chips" id="compPeopleChips">
      <div class="comp-chip" data-v="1명">1명</div>
      <div class="comp-chip" data-v="2명">2명</div>
      <div class="comp-chip" data-v="3명 이상">3명 이상</div>
    </div>
    <label class="comp-lbl">성별 (선택)</label>
    <div class="comp-chips" id="compGenderChips">
      <div class="comp-chip on" data-v="공개안함">공개안함</div>
      <div class="comp-chip" data-v="여성">여성</div>
      <div class="comp-chip" data-v="남성">남성</div>
    </div>
    <label class="comp-lbl">자기소개</label>
    <textarea class="comp-textarea" id="compIntro" placeholder="여행 스타일, 원하는 동행 유형 등을 자유롭게 적어주세요 (최대 150자)" maxlength="150"></textarea>
    <label class="comp-lbl">카카오톡 ID 또는 오픈채팅 URL <span style="color:var(--red)">*</span></label>
    <input class="comp-input" id="compKakao" placeholder="카카오톡 ID 또는 오픈채팅 링크" style="width:100%;margin-bottom:20px">
    <button class="ai-gen" id="btnCompSubmit">동행 글 올리기</button>
  </div>
</div>
<!-- Bottom Sheet -->
<div class="sheet-overlay" id="sheetOverlay"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-hd">
    <span class="sheet-hd-ttl" id="sheetHdTtl">예약 정보</span>
    <button class="sheet-x" id="sheetX">✕</button>
  </div>
  <div class="sheet-body">
    <div class="sheet-plat-row">
      <span class="sheet-badge" id="sheetBadge"></span>
      <span class="sheet-plat-lbl" id="sheetPlatLbl"></span>
    </div>
    <div class="sheet-nm" id="sheetNm"></div>
    <div class="sheet-dc" id="sheetDc"></div>
    <div class="sheet-pr" id="sheetPr"></div>
    <button class="sheet-go" id="sheetGo">사이트에서 보기 →</button>
    <button class="sheet-cancel" id="sheetCancel">닫기</button>
  </div>
</div>
<!-- Filter Drawer -->
<div class="flt-ov" id="fltOv"></div>
<div class="flt-dw" id="fltDw">
  <div class="flt-dw-handle"></div>
  <div class="flt-dw-hd">
    <span class="flt-dw-ttl">필터</span>
    <button class="flt-dw-reset" id="fltReset">초기화</button>
  </div>
  <div class="flt-dw-body" id="fltBody"></div>
  <div class="flt-dw-ft">
    <button class="flt-dw-apply" id="fltApply">결과 보기</button>
  </div>
</div>

<!-- Itinerary Panel -->
<div class="itin-panel" id="itinPanel">
  <div class="itin-nav">
    <button class="d-back" id="btnItinBack"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="d-nav-ttl">내 여행 일정표</span>
  </div>
  <div class="itin-scroll" id="itinScroll"></div>
  <div class="itin-ft">
    <button class="itin-copy-btn" id="btnItinCopy">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="display:inline;vertical-align:middle;margin-right:5px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      텍스트 복사
    </button>
  </div>
</div>

<script src="/data.js"></script>
<script src="/app.js"></script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('/sw.js')
      .then(function(){console.log('SW registered');})
      .catch(function(e){console.warn('SW error',e);});
  });
}
</script>
</body>
</html>
