<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TABI — 일본 여행</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
/* ═══ TABI — Triple-style White Theme ═══════════════════════ */
:root {
  --bg:#f8f8f6; --white:#ffffff; --sf:#f2f1ef; --sf2:#e8e7e4;
  --bd:#e4e3e0; --bd2:#d0cfc9;
  --tx:#1a1a18; --tx2:#6b6a66; --tx3:#a8a7a2;
  --ac:#00c896; --ac2:#00b085; --ac-bg:#e6faf5;
  --red:#ff4757; --gold:#f0a500;
  --klook:#f4452a; --mrt:#ff6b35;
  --nav:58px; --safe:env(safe-area-inset-bottom);
  --f:'Noto Sans KR',sans-serif;
  --fdis:'Playfair Display',serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;-webkit-font-smoothing:antialiased;}
body{font-family:var(--f);background:var(--bg);color:var(--tx);overflow-x:hidden;}
.app{max-width:480px;margin:0 auto;min-height:100%;background:var(--white);position:relative;}
.page{display:none;flex-direction:column;min-height:100vh;}
.page.active{display:flex;}
.pb{padding-bottom:calc(var(--nav) + var(--safe) + 16px);}
a,button{font-family:var(--f);}
::-webkit-scrollbar{display:none;}
img{display:block;}

/* ── HEADER ─────────────────────────────────── */
.hd{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.95);
  backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);}
.hd-inner{display:flex;align-items:center;gap:10px;padding:12px 16px 10px;}
.logo-wrap{flex:1;}
.logo{font-family:var(--fdis);font-size:24px;font-weight:900;
  color:var(--tx);letter-spacing:-.5px;line-height:1;}
.logo span{color:var(--ac);}
.logo-sub{font-size:10px;color:var(--tx3);font-weight:400;letter-spacing:.5px;margin-top:1px;}
.hd-search{width:36px;height:36px;border-radius:50%;background:var(--sf);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--tx2);transition:all .2s;}
.hd-search:hover{background:var(--sf2);}
.hd-status{display:flex;align-items:center;gap:4px;background:var(--ac-bg);
  border-radius:20px;padding:4px 10px;font-size:10px;font-weight:700;color:var(--ac2);}
.hd-status-dot{width:5px;height:5px;border-radius:50%;background:var(--ac);
  animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* search bar slide-in */
.search-bar{background:var(--white);border-bottom:1px solid var(--bd);padding:8px 16px 10px;
  display:flex;gap:8px;transition:all .2s;}
.search-bar.hidden{display:none;}
.sfield{flex:1;display:flex;align-items:center;gap:8px;background:var(--sf);
  border:1.5px solid var(--bd);border-radius:24px;padding:0 14px;transition:all .2s;}
.sfield:focus-within{border-color:var(--ac);background:var(--white);}
.sfield svg{color:var(--tx3);flex-shrink:0;}
.sfield input{background:none;border:none;outline:none;color:var(--tx);
  font-size:14px;font-family:var(--f);width:100%;padding:9px 0;}
.sfield input::placeholder{color:var(--tx3);}
.s-go{background:var(--ac);border:none;color:#fff;border-radius:24px;padding:0 18px;
  height:40px;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;}
.s-cancel{background:none;border:none;color:var(--tx2);font-size:13px;
  font-weight:700;cursor:pointer;padding:0 4px;white-space:nowrap;}

/* ── CITY TABS ──────────────────────────────── */
.city-row{display:flex;overflow-x:auto;background:var(--white);
  border-bottom:1px solid var(--bd);padding:0 12px;}
.city-btn{flex-shrink:0;background:none;border:none;color:var(--tx3);
  font-size:13px;font-weight:700;padding:10px 8px 8px;cursor:pointer;
  font-family:var(--f);position:relative;transition:color .15s;white-space:nowrap;}
.city-btn.on{color:var(--ac);}
.city-btn.on::after{content:'';position:absolute;bottom:0;left:4px;right:4px;
  height:2.5px;background:var(--ac);border-radius:2px;}

/* ── CATEGORY BAR ───────────────────────────── */
.cat-row{display:flex;gap:7px;overflow-x:auto;padding:10px 16px 8px;
  background:var(--white);border-bottom:1px solid var(--bd);}
.cat-btn{flex-shrink:0;display:flex;align-items:center;gap:4px;background:var(--sf);
  border:1.5px solid var(--bd);border-radius:20px;padding:6px 13px;
  font-size:12px;font-weight:700;color:var(--tx2);cursor:pointer;
  white-space:nowrap;transition:all .15s;font-family:var(--f);}
.cat-btn.on{background:var(--tx);border-color:var(--tx);color:var(--white);}
.cat-btn:hover:not(.on){border-color:var(--ac);color:var(--ac);}

/* ── BOOKING STRIP ──────────────────────────── */
.bk-strip{background:var(--white);border-bottom:1px solid var(--bd);}
.bk-strip-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;}
.bk-strip-lbl{font-size:13px;font-weight:800;color:var(--tx);}
.bk-strip-badge{font-size:10px;font-weight:700;color:var(--ac);
  background:var(--ac-bg);border-radius:4px;padding:2px 7px;}
.bk-list{display:flex;gap:10px;padding:0 16px 14px;overflow-x:auto;}
.bk-card{flex-shrink:0;width:148px;background:var(--sf);border-radius:14px;
  overflow:hidden;cursor:pointer;transition:all .2s;border:1.5px solid var(--bd);}
.bk-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1);}
.bk-card-img{height:74px;background:linear-gradient(135deg,#e8f5e9,#e3f2fd);
  display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;}
.bk-plat{position:absolute;top:5px;right:5px;font-size:9px;font-weight:800;
  color:#fff;padding:2px 5px;border-radius:3px;}
.bk-plat.kl{background:var(--klook);}.bk-plat.mr{background:var(--mrt);}
.bk-card-body{padding:8px 10px 10px;}
.bk-nm{font-size:11px;font-weight:700;color:var(--tx);line-height:1.35;margin-bottom:3px;}
.bk-price{font-size:12px;font-weight:900;color:var(--ac);}
.bk-price span{font-size:10px;font-weight:400;color:var(--tx3);}
.bk-comm{font-size:9px;font-weight:700;color:var(--gold);margin-top:2px;}

/* ── SECTION HEAD ───────────────────────────── */
.sec-head{display:flex;align-items:center;justify-content:space-between;
  padding:18px 16px 12px;}
.sec-title{font-size:18px;font-weight:900;color:var(--tx);letter-spacing:-.3px;}
.sec-count{font-size:12px;color:var(--tx3);}

/* ── PLACE CARD — Triple style ──────────────── */
.place-list{display:flex;flex-direction:column;gap:0;}
.pc{background:var(--white);border-bottom:1px solid var(--bd);
  cursor:pointer;transition:background .12s;animation:fadeUp .3s cubic-bezier(.16,1,.3,1) both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.pc:active{background:var(--sf);}

/* image area */
.pc-img{width:100%;height:200px;background:var(--sf2);position:relative;overflow:hidden;}
.pc-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease;}
.pc:hover .pc-img img{transform:scale(1.03);}
.pc-img-grad{position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,.0) 50%,rgba(0,0,0,.35) 100%);}
.pc-rank{position:absolute;top:12px;left:12px;
  background:rgba(0,0,0,.55);backdrop-filter:blur(6px);
  color:#fff;font-size:11px;font-weight:800;padding:4px 9px;border-radius:6px;}
.pc-cat-badge{position:absolute;bottom:12px;left:12px;
  background:rgba(255,255,255,.92);color:var(--tx);
  font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;}
.pc-save-btn{position:absolute;top:10px;right:10px;
  width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,.9);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--tx3);transition:all .2s;
  box-shadow:0 2px 8px rgba(0,0,0,.12);}
.pc-save-btn.on{color:var(--red);}

/* info area */
.pc-info{padding:13px 16px 8px;}
.pc-name{font-size:17px;font-weight:800;color:var(--tx);
  margin-bottom:4px;letter-spacing:-.3px;line-height:1.25;}
.pc-addr{font-size:12px;color:var(--tx3);margin-bottom:9px;}
.pc-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.pc-rating{display:flex;align-items:center;gap:3px;}
.pc-stars{display:flex;gap:1px;}
.pc-star{font-size:11px;color:var(--bd2);}.pc-star.on{color:var(--gold);}
.pc-rnum{font-size:13px;font-weight:800;color:var(--tx);}
.pc-rcnt{font-size:11px;color:var(--tx3);}
.pc-sep{width:1px;height:11px;background:var(--bd2);}
.pc-open{font-size:11px;font-weight:700;color:var(--ac);}
.pc-closed{font-size:11px;font-weight:700;color:var(--red);}

/* CTA row */
.pc-cta{display:flex;border-top:1.5px solid var(--bd);margin-top:10px;}
.pc-cta a{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;
  padding:11px 6px;text-decoration:none;font-size:12px;font-weight:800;
  font-family:var(--f);transition:background .15s;color:var(--tx2);}
.pc-cta a+a{border-left:1.5px solid var(--bd);}
.pc-cta a.kl{color:var(--klook);}.pc-cta a.kl:hover{background:rgba(244,69,42,.06);}
.pc-cta a.mr{color:var(--mrt);}.pc-cta a.mr:hover{background:rgba(255,107,53,.06);}
.pc-cta a.gm:hover{background:var(--sf);}

/* ── LOADING / EMPTY ────────────────────────── */
.loading{padding:80px 20px;text-align:center;}
.spinner{width:32px;height:32px;border:3px solid var(--bd2);
  border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;
  margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;color:var(--tx3);}
.empty{padding:80px 20px;text-align:center;}
.empty-ic{font-size:48px;margin-bottom:12px;}
.empty-tx{font-size:13px;color:var(--tx3);line-height:1.7;}

/* ═══ BOTTOM NAV ════════════════════════════ */
.bot-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;z-index:300;
  background:rgba(255,255,255,.97);backdrop-filter:blur(20px);
  border-top:1px solid var(--bd);
  display:flex;align-items:stretch;
  height:calc(var(--nav) + var(--safe));
  padding-bottom:var(--safe);
}
.nav-it{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;background:none;border:none;
  cursor:pointer;font-family:var(--f);font-size:10px;font-weight:700;
  color:var(--tx3);transition:color .15s;position:relative;padding-top:6px;
}
.nav-it.on{color:var(--ac);}
.nav-it.on .nav-ic-wrap::after{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:20px;height:2.5px;background:var(--ac);border-radius:0 0 3px 3px;
  top:-6px;
}
.nav-ic-wrap{position:relative;display:flex;align-items:center;justify-content:center;}
.nav-ic{font-size:22px;line-height:1;}
.nav-badge{position:absolute;top:-4px;right:-6px;background:var(--red);color:#fff;
  font-size:9px;font-weight:800;border-radius:10px;padding:1px 5px;
  min-width:16px;text-align:center;display:none;line-height:1.4;}
.nav-badge.show{display:block;}

/* ═══ AI PAGE ═══════════════════════════════ */
.ai-pg{overflow-y:auto;flex:1;background:var(--bg);}
.ai-hero{padding:28px 20px 24px;
  background:linear-gradient(160deg,#0a1628 0%,#1a2d1a 40%,#0a2018 100%);
  position:relative;overflow:hidden;}
.ai-hero::before{content:'';position:absolute;right:-30px;top:-30px;
  width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,200,150,.15),transparent 70%);}
.ai-hero-sub{font-size:11px;font-weight:700;color:var(--ac);
  letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;}
.ai-hero-title{font-family:var(--fdis);font-size:28px;font-weight:900;
  color:#fff;line-height:1.2;letter-spacing:-.5px;margin-bottom:6px;}
.ai-hero-title em{color:var(--ac);font-style:italic;}
.ai-hero-desc{font-size:13px;color:rgba(255,255,255,.6);line-height:1.65;}
.ai-form{margin:16px;background:var(--white);border-radius:16px;
  overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.07);border:1px solid var(--bd);}
.ai-form-sec{padding:16px 16px 0;}
.ai-lbl{font-size:10px;font-weight:800;color:var(--tx3);letter-spacing:.8px;
  text-transform:uppercase;margin-bottom:7px;display:block;}
.ai-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.ai-sel{width:100%;background:var(--sf);border:1.5px solid var(--bd);
  border-radius:10px;padding:10px 12px;font-size:13px;color:var(--tx);
  font-family:var(--f);font-weight:600;outline:none;transition:border-color .2s;appearance:none;}
.ai-sel:focus{border-color:var(--ac);}
.ai-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.ai-chip{background:var(--sf);border:1.5px solid var(--bd);border-radius:20px;
  padding:6px 12px;font-size:12px;font-weight:700;color:var(--tx2);
  cursor:pointer;transition:all .15s;font-family:var(--f);}
.ai-chip.on{background:var(--tx);border-color:var(--tx);color:#fff;}
.ai-gen-btn{display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;background:var(--ac);color:#fff;border:none;padding:16px;
  font-size:15px;font-weight:900;cursor:pointer;font-family:var(--f);
  transition:background .2s;}
.ai-gen-btn:hover{background:var(--ac2);}
.ai-gen-btn:disabled{opacity:.5;cursor:not-allowed;}

/* AI result */
.tri-wrap{margin:16px;}
.tri-card{background:var(--white);border-radius:16px;overflow:hidden;
  border:1px solid var(--bd);box-shadow:0 2px 16px rgba(0,0,0,.07);}
.tri-top{padding:20px 18px 16px;background:linear-gradient(135deg,#0a1628,#1a2d1a);
  text-align:center;border-bottom:1px solid var(--bd);}
.tri-em{font-size:40px;margin-bottom:10px;}
.tri-title{font-family:var(--fdis);font-size:20px;color:#fff;font-weight:700;
  margin-bottom:4px;line-height:1.3;}
.tri-title em{color:var(--ac);font-style:italic;}
.tri-sub{font-size:12px;color:rgba(255,255,255,.5);}
.tri-map{height:190px;position:relative;background:linear-gradient(135deg,#e8f5e9,#e3f2fd,#fce4ec);overflow:hidden;}
.tri-map-grid{position:absolute;inset:0;opacity:.5;
  background-image:linear-gradient(rgba(0,0,0,.06) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,0,0,.06) 1px,transparent 1px);
  background-size:26px 26px;}
.road-h{position:absolute;left:0;right:0;background:rgba(255,255,255,.7);border-radius:2px;}
.road-v{position:absolute;top:0;bottom:0;background:rgba(255,255,255,.7);border-radius:2px;}
.tri-svg{position:absolute;inset:0;width:100%;height:100%;}
.tri-pin{position:absolute;transform:translate(-50%,-50%);width:28px;height:28px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:900;color:#fff;cursor:pointer;z-index:2;
  box-shadow:0 2px 8px rgba(0,0,0,.2);transition:transform .2s;
  font-family:var(--f);border:2px solid rgba(255,255,255,.8);}
.tri-pin:hover,.tri-pin.hl{transform:translate(-50%,-50%) scale(1.2);}
.tri-daytabs{display:flex;gap:6px;padding:12px 14px;border-bottom:1px solid var(--bd);overflow-x:auto;}
.tri-daytab{flex-shrink:0;padding:7px 18px;border-radius:20px;font-size:12px;
  font-weight:800;cursor:pointer;border:1.5px solid var(--bd2);
  background:var(--white);color:var(--tx3);transition:all .2s;font-family:var(--f);}
.tri-daytab.on{background:var(--tx);border-color:var(--tx);color:#fff;}
.tri-places{padding:4px 0;}
.tri-day-hd{display:flex;align-items:center;gap:8px;padding:12px 16px 8px;}
.tri-day-dot{width:22px;height:22px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;}
.tri-day-lbl{font-size:14px;font-weight:800;color:var(--tx);}
.tri-place-row{display:flex;gap:12px;padding:10px 16px 10px 46px;
  position:relative;cursor:pointer;transition:background .12s;}
.tri-place-row:hover{background:var(--sf);}
.tri-place-row::before{content:'';position:absolute;left:26px;top:0;bottom:0;
  width:1.5px;background:var(--bd2);}
.tri-place-row:last-child::before{height:50%;}
.tri-place-ic{width:50px;height:50px;border-radius:12px;flex-shrink:0;
  background:var(--sf2);display:flex;align-items:center;justify-content:center;
  font-size:22px;border:1px solid var(--bd);}
.tri-place-body{flex:1;min-width:0;}
.tri-place-name{font-size:14px;font-weight:800;color:var(--tx);margin-bottom:2px;}
.tri-place-tp{font-size:11px;color:var(--tx3);margin-bottom:4px;}
.tri-place-cm{font-size:11px;color:var(--ac2);font-weight:700;line-height:1.5;}
.tri-place-cm::before{content:'Tip. ';}
.tri-place-time{font-size:10px;color:var(--tx3);margin-top:3px;}
.tri-footer{border-top:1px solid var(--bd);}
.tri-tip{margin:0;padding:14px 16px;background:var(--ac-bg);}
.tri-tip-title{font-size:11px;font-weight:900;color:var(--ac2);margin-bottom:6px;}
.tri-tip-item{font-size:12px;color:var(--tx2);line-height:1.65;margin-bottom:2px;}
.tri-budget{display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-top:1px solid var(--bd);}
.tri-budget-lbl{font-size:11px;color:var(--tx3);font-weight:600;}
.tri-budget-val{font-size:14px;font-weight:900;color:var(--tx);}
.tri-actions{display:flex;gap:8px;padding:12px 16px 14px;border-top:1px solid var(--bd);}
.tri-act{flex:1;padding:12px;border-radius:10px;border:none;
  font-size:13px;font-weight:800;cursor:pointer;font-family:var(--f);transition:all .2s;}
.tri-act.p{background:var(--ac);color:#fff;}
.tri-act.s{background:var(--sf);color:var(--tx);border:1.5px solid var(--bd2);}
.tri-loading{padding:40px 20px;text-align:center;}
.tri-dots{display:flex;justify-content:center;gap:7px;margin-bottom:14px;}
.tri-dots span{width:9px;height:9px;border-radius:50%;background:var(--ac);
  animation:bounce .8s ease-in-out infinite;}
.tri-dots span:nth-child(2){animation-delay:.14s;}
.tri-dots span:nth-child(3){animation-delay:.28s;background:var(--bd2);}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}
.tri-loading-txt{font-size:13px;color:var(--tx3);font-weight:600;}

/* ═══ SAVED PAGE ════════════════════════════ */
.saved-hd{padding:24px 20px 16px;border-bottom:1px solid var(--bd);
  background:var(--white);}
.saved-hd-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.saved-title{font-family:var(--fdis);font-size:24px;font-weight:900;color:var(--tx);}
.saved-clear{background:none;border:none;font-size:12px;font-weight:700;
  color:var(--tx3);cursor:pointer;font-family:var(--f);}
.saved-clear:hover{color:var(--red);}
.saved-desc{font-size:13px;color:var(--tx3);}
.saved-city-lbl{font-size:10px;font-weight:800;letter-spacing:.8px;color:var(--tx3);
  text-transform:uppercase;padding:16px 16px 8px;display:block;background:var(--bg);}
.saved-empty{padding:80px 20px;text-align:center;background:var(--white);}
.saved-empty-ic{font-size:52px;margin-bottom:14px;opacity:.4;}
.saved-empty-tx{font-size:14px;color:var(--tx3);line-height:1.7;}

/* ═══ DETAIL ════════════════════════════════ */
.detail{position:fixed;inset:0;z-index:400;background:var(--white);
  overflow-y:auto;transform:translateX(100%);
  transition:transform .32s cubic-bezier(.16,1,.3,1);}
.detail.open{transform:translateX(0);}
.d-nav{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.95);
  backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);
  padding:12px 16px;display:flex;align-items:center;gap:12px;}
.d-back{background:var(--sf);border:1.5px solid var(--bd2);border-radius:10px;
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;

// ── INIT ──────────────────────────────────
function initUI(){
  document.getElementById('cityRow').innerHTML=CITIES.map((c,i)=>

  ).join('');
  document.getElementById('catRow').innerHTML=CATEGORIES.map((c,i)=>

  ).join('');
  document.getElementById('ai-city').innerHTML=CITIES.map(c=>
    '<option value="'+c.kr+'">'+c.kr+'</option>'
  ).join('');
}

function toggleSearch(){
  searchOpen=!searchOpen;
  document.getElementById('searchBar').classList.toggle('hidden',!searchOpen);
  if(searchOpen)setTimeout(()=>document.getElementById('searchInput').focus(),50);
}

// ── PAGE ──────────────────────────────────
function switchPage(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav-it').forEach(x=>x.classList.remove('on'));
  document.getElementById('page-'+p).classList.add('active');
  document.getElementById('nav-'+p).classList.add('on');
  if(p==='saved')renderSaved();
}

// ── NAV ───────────────────────────────────
function setCity(btn,c,en){
  document.querySelectorAll('.city-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');city=c;cityEn=en;load();
}
function setCat(btn,c){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');cat=c;load();
}
function doSearch(){
  const q=document.getElementById('searchInput').value.trim();
  if(!q)return;
  fetchPlaces(q+' Japan',null);
  if(searchOpen)toggleSearch();
}

// ── FETCH ─────────────────────────────────
function load(){fetchPlaces(cityEn+' '+catLabel[cat],cat);}
async function fetchPlaces(query,type){
  showLoading();
  try{
    const params=new URLSearchParams({query,language:'ko'});
    if(type)params.append('type',type);
    const res=await fetch(PROXY+'/api/places?'+params);
    const data=await res.json();
    if(!data.results||!data.results.length){showEmpty();return;}
    _places=data.results.map(r=>({
      name:r.name,addr:r.formatted_address,rating:r.rating,
      cnt:r.user_ratings_total,open:r.opening_hours&&r.opening_hours.open_now,
      icon:catEmoji[cat]||'📍',types:(r.types||[]).slice(0,3),
      photo_ref:r.photos&&r.photos[0]&&r.photos[0].photo_reference,
      place_id:r.place_id,url:'https://maps.google.com/?cid='+r.place_id,
    }));
    renderList(_places);
  }catch(e){console.error(e);showError();}
}
function photoUrl(ref,size){
  if(!ref)return null;
  return PROXY+'/api/photo?photo_reference='+ref+'&maxwidth='+(size||400);
}
function showLoading(){
  document.getElementById('mainContent').innerHTML=
    '<div class="loading"><div class="spinner"></div><div class="loading-txt">'+city+' 정보를 불러오는 중...</div></div>';
}
function showEmpty(){
  document.getElementById('mainContent').innerHTML=
    '<div class="empty"><div class="empty-ic">🔍</div><div class="empty-tx">검색 결과가 없습니다.</div></div>';
}
function showError(){
  document.getElementById('mainContent').innerHTML=
    '<div class="empty"><div class="empty-ic">⚠️</div><div class="empty-tx">데이터를 불러오지 못했어요.<br>잠시 후 다시 시도해 주세요.</div></div>';
}

// ── RENDER ────────────────────────────────
function mkStars(r){
  if(!r)return'<span style="font-size:10px;color:var(--tx3)">평점없음</span>';
  return Array.from({length:5},(_,i)=>'<span class="pc-star'+(r>=i+1?' on':'')+'">&#9733;</span>').join('');
}
function buildBkStrip(data){
  if(!data||!data.length)return'';
  const cards=data.map(b=>
    '<div class="bk-card" onclick="window.open(\''+b.url+'\',\'_blank\')">'
    +'<div class="bk-card-img"><span>'+(b.em||'🎟')+'</span><span class="bk-plat '+b.cls+'">'+b.logo+'</span></div>'
    +'<div class="bk-card-body"><div class="bk-nm">'+b.nm+'</div>'
    +'<div class="bk-price">'+b.pr+' <span>부터</span></div>'
    +'<div class="bk-comm">'+b.cm+'</div></div></div>'
  ).join('');
  return'<div class="bk-strip"><div class="bk-strip-hd"><span class="bk-strip-lbl">예약 추천</span>'
    +'<span class="bk-strip-badge">제휴 할인</span></div><div class="bk-list">'+cards+'</div></div>';
}
function buildCTA(p){
  const gurl=p.url||'https://maps.google.com/?q='+encodeURIComponent(p.name);
  const nurl='https://map.naver.com/v5/search/'+encodeURIComponent(p.name+' '+city);
  const bk=BKP[p.name];
  if(!bk){
    return'<div class="pc-cta">'
      +'<a class="gm" href="'+gurl+'" target="_blank" onclick="event.stopPropagation()">🗺 Google 지도</a>'
      +'<a class="gm" href="'+nurl+'" target="_blank" onclick="event.stopPropagation()">🟢 네이버 지도</a>'
      +'</div>';
  }
  return'<div class="pc-cta">'+bk.slice(0,2).map(b=>
    '<a class="'+b.cls+'" href="'+b.url+'" target="_blank" onclick="event.stopPropagation()">🔖 '+b.logo+' 예약</a>'
  ).join('')+'</div>';
}
function renderList(places){
  if(!places.length){showEmpty();return;}
  const strip=buildBkStrip(CBK[city]);
  const secHead='<div class="sec-head"><span class="sec-title">'+city+' '+catLabel[cat]+'</span>'
    +'<span class="sec-count">'+places.length+'곳</span></div>';
  const cards=places.map(function(p,i){
    const isSaved=saved.some(s=>s.name===p.name);
    const pUrl=photoUrl(p.photo_ref,i===0?600:400);
    const stars=mkStars(p.rating);
    const statusHtml=p.open===true?'<span class="pc-open">● 영업중</span>'
      :p.open===false?'<span class="pc-closed">● 영업종료</span>':'';
    const sn=p.name.replace(/'/g,"\\'");
    return'<div class="pc" style="animation-delay:'+((i%8)*.05)+'s" onclick="openDetail('+i+')">'
      +'<div class="pc-img">'
      +(pUrl?'<img src="'+pUrl+'" alt="'+p.name+'" loading="lazy" onerror="this.style.display=\'none\'">'
        :'<span style="font-size:56px">'+(p.icon||catEmoji[cat]||'📍')+'</span>')
      +'<div class="pc-img-grad"></div>'
      +'<div class="pc-rank"># '+(i+1)+'</div>'
      +'<div class="pc-cat-badge">'+((p.types||[catLabel[cat]])[0])+'</div>'
      +'<button class="pc-save-btn'+(isSaved?' on':'')+'" onclick="event.stopPropagation();toggleSC(\''+sn+'\',this,'+i+')">'+(isSaved?'♥':'♡')+'</button>'
      +'</div>'
      +'<div class="pc-info"><div class="pc-name">'+p.name+'</div>'
      +'<div class="pc-addr">'+(p.addr||'')+'</div>'
      +'<div class="pc-meta"><div class="pc-rating"><div class="pc-stars">'+stars+'</div>'
      +'<span class="pc-rnum">'+(p.rating||'—')+'</span>'
      +'<span class="pc-rcnt">'+(p.cnt?'('+p.cnt.toLocaleString()+'건)':'')+'</span></div>'
      +(statusHtml?'<span class="pc-sep"></span>'+statusHtml:'')
      +'</div></div>'+buildCTA(p)+'</div>';
  }).join('');
  document.getElementById('mainContent').innerHTML=strip+secHead+'<div class="place-list">'+cards+'</div>';
}

// ── SAVE ──────────────────────────────────
function toggleSC(name,btn,idx){
  const place=_places[idx]||{name};
  const i=saved.findIndex(s=>s.name===name);
  if(i===-1){saved.push({name,city,cat,data:place});btn.textContent='♥';btn.classList.add('on');}
  else{saved.splice(i,1);btn.textContent='♡';btn.classList.remove('on');}
  localStorage.setItem('tabi_saved',JSON.stringify(saved));updateBadge();
}
function toggleSD(name){
  const i=saved.findIndex(s=>s.name===name);
  const btn=document.getElementById('dHeartBtn');
  if(i===-1){const place=_places.find(p=>p.name===name)||{name};saved.push({name,city,cat,data:place});if(btn){btn.textContent='♥ 저장됨';btn.classList.add('on');}}
  else{saved.splice(i,1);if(btn){btn.textContent='♡ 저장하기';btn.classList.remove('on');}}
  localStorage.setItem('tabi_saved',JSON.stringify(saved));updateBadge();
}
function clearAll(){
  if(!saved.length)return;
  if(confirm('저장한 모든 장소를 삭제할까요?')){saved=[];localStorage.setItem('tabi_saved',JSON.stringify(saved));updateBadge();renderSaved();}
}
function updateBadge(){
  const b=document.getElementById('savedBadge');
  if(saved.length>0){b.textContent=saved.length;b.classList.add('show');}
  else b.classList.remove('show');
}

// ── SAVED PAGE ────────────────────────────
function renderSaved(){
  const el=document.getElementById('savedContent');
  if(!saved.length){el.innerHTML='<div class="saved-empty"><div class="saved-empty-ic">🗺</div><div class="saved-empty-tx">아직 저장한 장소가 없어요.<br>탐색 탭에서 ♡ 버튼을 눌러 저장해보세요!</div></div>';return;}
  const groups={};saved.forEach(s=>{const k=s.city||'기타';if(!groups[k])groups[k]=[];groups[k].push(s);});
  let html='';
  Object.keys(groups).forEach(c=>{
    html+='<span class="saved-city-lbl">'+c+'</span><div class="place-list">';
    groups[c].forEach(s=>{
      const p=s.data||{name:s.name};
      const pUrl=photoUrl(p.photo_ref,400);
      const sn=s.name.replace(/'/g,"\\'");
      html+='<div class="pc" onclick="openSavedDetail(\''+sn+'\')">'
        +'<div class="pc-img">'+(pUrl?'<img src="'+pUrl+'" alt="'+p.name+'" loading="lazy" onerror="this.style.display=\'none\'">':'<span style="font-size:56px">📍</span>')
        +'<div class="pc-img-grad"></div>'
        +'<button class="pc-save-btn on" onclick="event.stopPropagation();removeSaved(\''+sn+'\')">♥</button>'
        +'</div><div class="pc-info"><div class="pc-name">'+p.name+'</div>'
        +'<div class="pc-addr">'+(p.addr||'')+'</div>'
        +'<div class="pc-meta"><div class="pc-rating"><div class="pc-stars">'+mkStars(p.rating)+'</div>'
        +'<span class="pc-rnum">'+(p.rating||'—')+'</span></div></div></div>'+buildCTA(p)+'</div>';
    });
    html+='</div>';
  });
  el.innerHTML=html;
}
function removeSaved(name){const i=saved.findIndex(s=>s.name===name);if(i!==-1){saved.splice(i,1);localStorage.setItem('tabi_saved',JSON.stringify(saved));}updateBadge();renderSaved();}
function openSavedDetail(name){const s=saved.find(x=>x.name===name);if(!s)return;_places=[s.data||{name}];openDetail(0);}

// ── DETAIL ────────────────────────────────

    +'<button class="d-btn p" onclick="window.open(\''+gurl+'\',\'_blank\')">🗺 Google 지도에서 보기</button>'

function closeDetail(){document.getElementById('detailPanel').classList.remove('open');}

// ── AI ────────────────────────────────────
function buildTriResult(days,aiCity,aiDays,aiStyle,aiPeople){
  const em=cityEmoji[aiCity]||'🗾';
  const total=parseInt(aiDays)+1;
  window._tdays=days.map((d,i)=>Object.assign({},d,{col:PIN_C[i%PIN_C.length]}));
  function rMap(di){
    const d=window._tdays[di];
    const pts=[{x:70,y:60},{x:40,y:45},{x:58,y:30},{x:25,y:58},{x:55,y:74},{x:80,y:38}];
    const pos=d.places.map((_,i)=>pts[i]||{x:30+i*12,y:40+i*10});
    let path='';if(pos.length>1){path='M '+pos[0].x+' '+pos[0].y;for(let i=1;i<pos.length;i++)path+=' L '+pos[i].x+' '+pos[i].y;}
    const svg=path?'<svg class="tri-svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="'+path+'" fill="none" stroke="'+d.col+'" stroke-width="2" stroke-dasharray="5,3.5" opacity=".8"/></svg>':'';
    const pins=pos.map((p,i)=>'<div class="tri-pin" style="left:'+p.x+'%;top:'+p.y+'%;background:'+d.col+'" onclick="hlPin('+i+')">'+(i+1)+'</div>').join('');
    return'<div class="tri-map-grid"></div>'+svg+pins+'<div class="road-h" style="top:44%;height:5px"></div><div class="road-v" style="left:32%;width:5px"></div>';
  }
  function rPlaces(di){
    const d=window._tdays[di];
    let h='<div class="tri-day-hd"><div class="tri-day-dot" style="background:'+d.col+'">'+(di+1)+'</div><div class="tri-day-lbl">'+d.label+'</div></div>';
    d.places.forEach((pl,pi)=>{const info=gpi(pl.name);h+='<div class="tri-place-row" id="tpi-'+di+'-'+pi+'"><div class="tri-place-ic">'+info.ic+'</div><div class="tri-place-body"><div class="tri-place-name">'+pl.name+'</div><div class="tri-place-tp">'+info.tp+'</div><div class="tri-place-cm">'+info.cm+'</div>'+(pl.time?'<div class="tri-place-time">&#9200; '+pl.time+'</div>':'')+'</div></div>';});
    return h;
  }
  const tabs=days.map((_,i)=>'<button class="tri-daytab'+(i===0?' on':'')+'" onclick="switchTD('+i+')">Day '+(i+1)+'</button>').join('');
  const bud=aiStyle==='가성비'?'8,000~12,000엔':aiStyle==='럭셔리'?'30,000~60,000엔':'15,000~25,000엔';
  return'<div class="tri-wrap"><div class="tri-card">'
    +'<div class="tri-top"><div class="tri-em">'+em+'</div>'
    +'<div class="tri-title">'+aiCity+' '+aiDays+'박'+total+'일 <em>맞춤일정</em></div>'
    +'<div class="tri-sub">Claude AI가 설계한 '+aiPeople+' '+aiStyle+' 코스</div></div>'
    +'<div class="tri-map" id="triMap">'+rMap(0)+'</div>'
    +'<div class="tri-daytabs">'+tabs+'</div>'
    +'<div class="tri-places" id="triPlaces">'+rPlaces(0)+'</div>'
    +'<div class="tri-footer">'
    +'<div class="tri-tip"><div class="tri-tip-title">&#128161; 여행 꿀팁</div>'
    +'<div class="tri-tip-item">&#183; IC카드(Suica/ICOCA) 미리 충전 — 교통·편의점 결제 모두 가능</div>'
    +'<div class="tri-tip-item">&#183; 인기 식당은 구글맵 사전 예약 or 개점 30분 전 줄서기</div>'
    +'<div class="tri-tip-item">&#183; 100엔 숍(다이소·세리아) 기념품 — 가성비 최고!</div></div>'
    +'<div class="tri-budget"><span class="tri-budget-lbl">&#128180; 예상 하루 예산 (숙박 별도)</span><span class="tri-budget-val">약 '+bud+'/인</span></div>'
    +'<div class="tri-actions"><button class="tri-act s" onclick="copyTri()">&#128203; 일정 복사</button>'
    +'<button class="tri-act p" onclick="switchPage(\'explore\')">&#128506; 장소 탐색</button></div>'
    +'</div></div></div>';
}
function switchTD(di){
  if(!window._tdays)return;
  document.querySelectorAll('.tri-daytab').forEach((t,i)=>t.classList.toggle('on',i===di));
  const d=window._tdays[di];
  const pts=[{x:70,y:60},{x:40,y:45},{x:58,y:30},{x:25,y:58},{x:55,y:74},{x:80,y:38}];
  const pos=d.places.map((_,i)=>pts[i]||{x:30+i*12,y:40+i*10});
  let path='';if(pos.length>1){path='M '+pos[0].x+' '+pos[0].y;for(let i=1;i<pos.length;i++)path+=' L '+pos[i].x+' '+pos[i].y;}
  const svg=path?'<svg class="tri-svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="'+path+'" fill="none" stroke="'+d.col+'" stroke-width="2" stroke-dasharray="5,3.5" opacity=".8"/></svg>':'';
  const pins=pos.map((p,i)=>'<div class="tri-pin" style="left:'+p.x+'%;top:'+p.y+'%;background:'+d.col+'" onclick="hlPin('+i+')">'+(i+1)+'</div>').join('');
  const m=document.getElementById('triMap');
  if(m)m.innerHTML='<div class="tri-map-grid"></div>'+svg+pins+'<div class="road-h" style="top:44%;height:5px"></div><div class="road-v" style="left:32%;width:5px"></div>';
  let h='<div class="tri-day-hd"><div class="tri-day-dot" style="background:'+d.col+'">'+(di+1)+'</div><div class="tri-day-lbl">'+d.label+'</div></div>';
  d.places.forEach((pl,pi)=>{const info=gpi(pl.name);h+='<div class="tri-place-row" id="tpi-'+di+'-'+pi+'"><div class="tri-place-ic">'+info.ic+'</div><div class="tri-place-body"><div class="tri-place-name">'+pl.name+'</div><div class="tri-place-tp">'+info.tp+'</div><div class="tri-place-cm">'+info.cm+'</div>'+(pl.time?'<div class="tri-place-time">&#9200; '+pl.time+'</div>':'')+'</div></div>';});
  const pl=document.getElementById('triPlaces');if(pl)pl.innerHTML=h;
}
function hlPin(pi){
  document.querySelectorAll('.tri-pin').forEach((p,i)=>p.classList.toggle('hl',i===pi));
  let di=0;document.querySelectorAll('.tri-daytab').forEach((t,i)=>{if(t.classList.contains('on'))di=i;});
  const el=document.getElementById('tpi-'+di+'-'+pi);
  if(el){el.scrollIntoView({behavior:'smooth',block:'nearest'});el.style.background='var(--ac-bg)';setTimeout(()=>el.style.background='',1500);}
}
function copyTri(){
  const text=(window._tdays||[]).map((d,i)=>'[DAY '+(i+1)+' — '+d.label+']\n'+d.places.map(p=>'  '+(p.time||'')+' '+p.name).join('\n')).join('\n\n');
  navigator.clipboard.writeText(text).then(()=>alert('일정이 복사됐어요!')).catch(()=>alert('복사에 실패했어요.'));
}
async function genItinerary(){
  const btn=document.getElementById('genBtn');
  const resultEl=document.getElementById('aiResult');
  const aiCity=document.getElementById('ai-city').value;
  const aiDays=document.getElementById('ai-days').value;
  const aiStyle=document.getElementById('ai-style').value;
  const aiPeople=document.getElementById('ai-people').value;
  const interests=Array.from(document.querySelectorAll('.ai-chip.on')).map(c=>c.textContent.trim()).join(', ');
  btn.disabled=true;btn.textContent='&#10006; 생성 중...';
  resultEl.innerHTML='<div class="tri-wrap"><div class="tri-card"><div class="tri-loading"><div class="tri-dots"><span></span><span></span><span></span></div><div class="tri-loading-txt">Claude AI가 '+aiCity+' 맞춤 일정을 설계하고 있어요...</div></div></div></div>';
  const prompt='일본 여행 전문가입니다. JSON만 응답. 다른 텍스트 없이 순수 JSON만.\n조건: 도시:'+aiCity+' / 기간:'+aiDays+'박'+(parseInt(aiDays)+1)+'일 / 스타일:'+aiStyle+' / 동행:'+aiPeople+' / 관심사:'+(interests||'전반적 관광')+'\n{"days":[{"label":"테마","places":[{"name":"장소명(한국어)","time":"09:00"}]}]}\ndays 배열 '+(parseInt(aiDays)+1)+'개, 각 day 4~5장소';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,messages:[{role:'user',content:prompt}]})});
    if(!res.ok)throw new Error('fail');
    const data=await res.json();
    const text=(data.content||[]).map(b=>b.text||'').join('');
    let days=null;
    try{days=JSON.parse(text.replace(/```json|```/g,'').trim()).days;}catch(e){}
    if(days&&days.length){resultEl.innerHTML=buildTriResult(days,aiCity,aiDays,aiStyle,aiPeople);}
    else throw new Error('parse failed');
  }catch(e){
    const fb=AI_DB[aiCity]||AI_DB['도쿄'];
    resultEl.innerHTML=buildTriResult(fb.slice(0,parseInt(aiDays)+1),aiCity,aiDays,aiStyle,aiPeople);
  }
  btn.disabled=false;btn.textContent='&#10022; AI 맞춤 일정 생성하기';
}

window.onload=()=>{initUI();load();updateBadge();};
</script>
